---
- name: "loki"
  show_in_selector: false
  matchkeys:
    - pod_name: "loki-"
  parser_rules:
    - name: "ts_8601"
    - name: "glog"
    - name: "json"
    - name: "key_value"
      options:
        versions:
          - "version"
    - name: "override_severity"
      overrides:
        - matchtype: "startswith"
          matchkey: "http: TLS handshake error"
          loglevel: "error"
