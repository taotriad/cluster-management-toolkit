---
- name: "metallb"
  show_in_selector: false
  matchkeys:
    - pod_name: "controller"
      image_name: "/metallb/controller"
    - pod_name: "speaker"
      image_name: "/metallb/speaker"
    - image_name: "/metallb/frr-k8"
  parser_rules:
    - name: "glog"
    - name: "json"
    - name: "override_severity"
      overrides:
        - matchtype: "startswith"
          matchkey: "MetalLB controller starting version"
          loglevel: "notice"
        - matchtype: "startswith"
          matchkey: "MetalLB speaker starting version"
          loglevel: "notice"
        - matchtype: "startswith"
          matchkey: "Trace["
          loglevel: "debug"
- name: "metallb"
  show_in_selector: false
  matchkeys:
    - image_name: "/frrouting/frr"
  parser_rules:
    - name: "glog"
    - name: "json"
    - name: "custom_splitter"
      options:
        # yamllint disable-line rule:line-length
        regex: '^\d{4}\/\d\d\/\d\d \d\d:\d\d:\d\d ([A-Z]+): (\[[A-Z0-9]{5}-[A-Z0-9]{5}\].*)'
        facility:
          fields:
            - 1
        message:
          field: 2
    - name: "custom_splitter"
      options:
        # yamllint disable-line rule:line-length
        regex: '^\d{4}\/\d\d\/\d\d \d\d:\d\d:\d\d\.\d\d\d ([A-Z]+): (\[[A-Z0-9]{5}-[A-Z0-9]{5}\].*)'
        facility:
          fields:
            - 1
        message:
          field: 2
    - name: "custom_splitter"
      options:
        # yamllint disable-line rule:line-length
        regex: '^\d{4}-\d\d-\d\d \d\d:\d\d:\d\d,\d\d\d\s+([A-Z]+): (.*)'
        severity:
          field: 1
        message:
          field: 2
