---
- name: "kueue"
  show_in_selector: false
  matchkeys:
    - image_name: "/kueue/kueueviz-backend"
    - image_name: "/kueue/kueueviz-frontend"
  parser_rules:
    - name: "ts_8601"
    - name: "custom_splitter"
      options:
        regex: '^\s*([A-Z]+)\s+(.+)'
        severity:
          field: 1
          transform: "str"
        message:
          field: 2
    - name: "override_severity"
      overrides:
        - matchtype: "startswith"
          matchkey: "[GIN-debug]"
          loglevel: "debug"
- name: "kueue"
  show_in_selector: false
  matchkeys:
    - image_name: "/kueue/kueue"
  parser_rules:
    - name: "glog"
    - name: "json"
      options:
        versions:
          - "gitVersion"
