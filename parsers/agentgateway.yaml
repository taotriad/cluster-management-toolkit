---
- name: "agentgateway"
  show_in_selector: false
  matchkeys:
    - image_name: "cr.agentgateway.dev/controller"
  parser_rules:
    - name: "tab_separated"
    - name: "json"
- name: "agentgateway"
  show_in_selector: false
  matchkeys:
    - image_name: "cr.agentgateway.dev/agentgateway"
  parser_rules:
    - name: "tab_separated"
    - name: "yaml_line"
      options:
        block_start:
          - matchtype: "startswith"
            matchkey: "running with config"
            matchline: "any"
            format_block_start: false
        block_end:
          - matchtype: "empty"
            format_block_end: false
            process_block_end: false
