---
- name: "llm-d"
  show_in_selector: false
  matchkeys:
    - image_name: "/llm-d/llm-d-hpu"
  parser_rules:
    - name: "custom_splitter"
      options:
        # yamllint disable-line rule:line-length
        regex: '^\((.+) pid=\d+\) ([A-Z]+) \d\d-\d\d \d\d:\d\d:\d\d \[(.+:\d+)\] (.*)'
        severity:
          field: 2
          transform: "str"
        facility:
          fields:
            - 1
            - 3
        message:
          field: 4
    - name: "custom_splitter"
      options:
        # yamllint disable-line rule:line-length
        regex: '^([A-Z]+) \d\d-\d\d \d\d:\d\d:\d\d \[(.+:\d+)\] (.*)'
        severity:
          field: 1
          transform: "str"
        facility:
          fields:
            - 2
        message:
          field: 3
    - name: "custom_splitter"
      options:
        # yamllint disable-line rule:line-length
        regex: '^\((.+) pid=\d+\) (.*)'
        facility:
          fields:
            - 1
        message:
          field: 2
    - name: "override_severity"
      overrides:
        - matchtype: "startswith"
          matchkey: "Internal Error: "
          loglevel: "error"
