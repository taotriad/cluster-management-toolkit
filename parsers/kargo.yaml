---
- name: "kargo"
  show_in_selector: false
  matchkeys:
    - image_name: "/akuity/kargo"
  parser_rules:
    - name: "tab_separated"
    - name: "override_severity"
      overrides:
        - matchtype: "startswith"
          matchkey: "Error "
          loglevel: "error"
        - matchtype: "startswith"
          matchkey: "[GIN-debug]"
          loglevel: "debug"
