---
- name: "intel-gpu-resource-driver"
  show_in_selector: false
  matchkeys:
    - pod_name: "intel-gpu-resource-driver-"
    # yamllint disable-line rule:line-length
    - image_name: "/intel/intel-resource-drivers-for-kubernetes/intel-gpu-resource-driver"
  parser_rules:
    - name: "glog"
    - name: "diff_line"
      options:
        block_start:
          - matchtype: "regex"
            matchkey: "^\"updated object\".+diff=<$"
            matchline: "any"
        block_end:
          - matchtype: "startswith"
            matchkey: " >"
        indent: "\t"
    - name: "custom_line"
      options:
        block_start:
          - matchtype: "startswith"
            matchkey: "Driver Name: "
            matchline: "any"
            format_block_start: true
        block_end:
          - matchtype: "startswith"
            matchkey: "Platform: "
            format_block_end: true
        loglevel: "info"
        overrides:
          - matchtype: "startswith"
            matchkey: "Driver Version: "
            loglevel: "notice"
    - name: "key_value_with_leading_message"
    - name: "custom_splitter"
      options:
        regex: '^\[\d{4}-\d\d-\d\d \d\d:\d\d:\d\d\.\d+\] \[([a-z]+)\] (.*)'
        severity:
          field: 1
          transform: "str"
        message:
          field: 2
    - name: "override_severity"
      overrides:
        - matchtype: "startswith"
          matchkey: "DriverVersion: "
          loglevel: "notice"
        - matchtype: "startswith"
          matchkey: "\"Warning:"
          loglevel: "warning"
