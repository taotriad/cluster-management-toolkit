---
- name: "node-feature-discovery"
  show_in_selector: false
  matchkeys:
    - image_name: "/nfd/node-feature-discovery"
  parser_rules:
    - name: "ts_8601"
    - name: "glog"
    - name: "json_line"
      options:
        block_start:
          - matchtype: "endswith"
            matchkey: "Resolver state updated: {"
            matchline: "any"
            format_block_start: false
        block_end:
          - matchtype: "startswith"
            matchkey: "}"
            format_block_end: false
            process_block_end: false
    - name: "yaml_line"
      options:
        block_start:
          - matchtype: "endswith"
            matchkey: '"configuration successfully updated" configuration=<'
            matchline: "any"
            format_block_start: false
        block_end:
          - matchtype: "startswith"
            matchkey: " >"
            format_block_end: true
            process_block_end: true
    - name: "override_severity"
      overrides:
        - matchtype: "startswith"
          matchkey: "\"Node Feature Discovery Master\" version"
          loglevel: "notice"
        - matchtype: "startswith"
          matchkey: "\"Node Feature Discovery Worker\" version"
          loglevel: "notice"
        - matchtype: "startswith"
          matchkey: "Node Feature Discovery Master v"
          loglevel: "notice"
        - matchtype: "startswith"
          matchkey: "Node Feature Discovery Worker v"
          loglevel: "notice"
        - matchtype: "startswith"
          matchkey: "Node Feature Discovery Topology Updater v"
          loglevel: "notice"
        - matchtype: "startswith"
          matchkey: "NodeName:"
          loglevel: "notice"
        - matchtype: "startswith"
          matchkey: "Trace["
          loglevel: "debug"
    - name: "key_value_with_leading_message"
      options:
        versions:
          - "version"
- name: "node-feature-discovery"
  show_in_selector: false
  matchkeys:
    - pod_name: "nfd-controller-manager"
  parser_rules:
    - name: "glog"
    - name: "key_value_with_leading_message"
