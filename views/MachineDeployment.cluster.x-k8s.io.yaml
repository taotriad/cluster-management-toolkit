---
kind: "MachineDeployment"
api_family: "cluster.x-k8s.io"
default_command: "machinedeployments"
command:
  - "machinedeploys"
  - "machinedeploy"
  - "machinedeps"
  - "machinedep"
  - "x-md"
listview:
  name: "Machine Deployments"
  group: "Cluster Configuration"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "cluster", "ready_replicas",
               "uptodate_replicas", "paused", "phase", "age", "version"]
      sortcolumn: "namespace"
  fields:
    cluster:
      header: "Cluster:"
      path: "spec#clusterName"
      default: "<none>"
      type: "str"
    paused:
      header: "Paused:"
      path: "spec#paused"
      default: false
      type: "bool"
    phase:
      header: "Phase:"
      path: "status#phase"
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            ScalingDown:
              field_colors:
                - context: "main"
                  type: "status_pending"
            ScalingUp:
              field_colors:
                - context: "main"
                  type: "status_pending"
            Running:
              field_colors:
                - context: "main"
                  type: "status_ok"
            Failed:
              field_colors:
                - context: "main"
                  type: "status_not_ok"
            Unknown:
              field_colors:
                - context: "main"
                  type: "status_unknown"
    ready_replicas:
      header: "Ready Replicas:"
      paths:
        - path: ["status#readyReplicas", "status#replicas"]
          pathtype: "comparison"
          default: [0, 0]
      formatter: "value_mapper"
      formatting:
        mapping:
          ranges:
            - min: 0
              max: 1
              field_colors:
                - context: "main"
                  type: "status_ok"
            - min: -1
              max: 0
              field_colors:
                - context: "main"
                  type: "status_pending"
            - default: true
              field_colors:
                - context: "main"
                  type: "status_not_ok"
      align: "right"
    uptodate_replicas:
      header: "Up to Date:"
      paths:
        - path: ["status#upToDateReplicas",
                 "status#updatedReplicas"]
          pathtype: "value"
      default: 0
      type: "int"
      formatter: "numerical"
      align: "right"
    version:
      header: "Version:"
      path: "spec#template#spec#version"
      type: "str"
      formatting:
        field_colors:
          - type: "version"
infoview:
  name: "Machine Deployment Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["cluster", "label_selector", "set_based_selector",
                 "max_in_flight_remediations",
                 "replicas", "update_strategy", "template_header",
                 "template_machine_name",
                 "template_bootstrap", "template_infrastructure",
                 "phase"]
    rows:
      cluster:
        header: [["Cl", ["main", "infoheader"]],
                 ["u", ["main", "infoheader_shortcut"]],
                 ["ster:", ["main", "infoheader"]]]
        path: "spec#clusterName"
        default: "<none>"
        type: "str"
      label_selector:
        header: [["La", ["main", "infoheader"]],
                 ["b", ["main", "infoheader_shortcut"]],
                 ["el Selector:", ["main", "infoheader"]]]
        paths:
          - path: ["spec#selector#matchLabels"]
            pathtype: "key_value"
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "selector"
      max_in_flight_remediations:
        header: [["Max In Flight Remediations:", ["main", "infoheader"]]]
        path: "spec#remediation#maxInFlight"
        default: "ALL"
        type: "raw"
        formatter: "numerical"
      phase:
        header: [["Phase:", ["main", "infoheader"]]]
        path: "status#phase"
        type: "str"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              ScalingDown:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              ScalingUp:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              Running:
                field_colors:
                  - context: "main"
                    type: "status_ok"
              Failed:
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
              Unknown:
                field_colors:
                  - context: "main"
                    type: "status_unknown"
      replicas:
        header: [["Replicas:", ["main", "infoheader"]]]
        paths:
          - path: [["status#replicas"],
                   " Desired",
                   ["status#upToDateReplicas"],
                   " Up to Date",
                   ["status#readyReplicas"],
                   " Ready"]
            pathtype: "tuple"
            default: [0, "", 0, "", 0, ""]
        formatter: "list"
        formatting:
          field_colors:
            - type: "numerical"
            - type: "generic"
            - type: "numerical"
            - type: "generic"
            - type: "numerical"
            - type: "generic"
          field_separators:
            - type: "no_pad"
            - type: "fraction_spaced"
            - type: "no_pad"
            - type: "fraction_spaced"
            - type: "no_pad"
      set_based_selector:
        header: [["Set-based Selector:", ["main", "infoheader"]]]
        paths:
          - path: "spec#selector#matchExpressions"
            pathtype: "match_expression"
            default: "<none>"
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "operator"
            - type: "value"
          field_separators:
            - type: "space"
            - type: "no_pad"
      template_bootstrap:
        header: [["  B", ["main", "infoheader"]],
                 ["o", ["main", "infoheader_shortcut"]],
                 ["otstrap:", ["main", "infoheader"]]]
        paths:
          - path: [["spec#template#spec#bootstrap#configRef#kind"],
                   ["spec#template#spec#bootstrap#configRef#apiVersion"],
                   ["spec#template#spec#bootstrap#configRef#name"]]
            pathtype: "tuple"
            type: ["kind", "api_group", "name"]
        default: "<none>"
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
      template_header:
        header: [["Template:", ["main", "infoheader"]]]
      template_infrastructure:
        header: [["  ", ["main", "infoheader"]],
                 ["I", ["main", "infoheader_shortcut"]],
                 ["nfrastructure:", ["main", "infoheader"]]]
        paths:
          - path: [["spec#template#spec#infrastructureRef#kind"],
                   ["spec#template#spec#infrastructureRef#apiVersion"],
                   ["spec#template#spec#infrastructureRef#name"]]
            pathtype: "tuple"
            type: ["kind", "api_group", "name"]
        default: "<none>"
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
      template_machine_name:
        header: [["  Machine Name:", ["main", "infoheader"]]]
        path: "spec#machineNaming#template"
        default: "`{{ .machineSet.name }}-{{ .random }}`"
        type: "str"
      update_strategy:
        header: [["Update Strategy:", ["main", "infoheader"]]]
        paths:
          - path: [["spec#rollout#strategy#type"],
                   " (", "Max Surge: ",
                   ["spec#rollout#strategy#rollingUpdate#maxSurge"],
                   "Max Unavailable: ",
                   ["spec#rollout#strategy#rollingUpdate#maxUnavailable"], ")"]
            pathtype: "tuple"
            when:
              - key: "spec#rollout#strategy#type"
                eq: "RollingUpdate"
          - path: [["spec#rollout#strategy#type"]]
            pathtype: "tuple"
            when:
              - key: "spec#rollout#strategy#type"
                eq: "Recreate"
        formatter: "list"
        formatting:
          field_colors:
            - type: "generic"
            - type: "generic"
            - context: "main"
              type: "infoheader"
            # Ideally we want to achieve numerical with unit here
            - type: "numerical"
            - context: "main"
              type: "infoheader"
            # Ideally we want to achieve numerical with unit here
            - type: "numerical"
            - type: "generic"
          field_separators:
            - type: "no_pad"
            - type: "no_pad"
            - type: "no_pad"
            - type: "list"
            - type: "no_pad"
            - type: "no_pad"
  logpad:
    infogetter: "logpad_formatted"
    infogetter_args:
      formatter: "format_yaml"
      path: "spec#template"
    timestamps: false
  shortcuts:
    "Label Selector":
      key: "b"
      read_only: true
      helptext: "Show label selector"
      widget: "windowwidget"
      title: "Label Selector:"
      headers: ["Key:", "Value:"]
      itemgetter: "get_key_value"
      itemgetter_args:
        path: "spec#selector#matchLabels"
    "Open Cluster":
      key: "u"
      read_only: true
      helptext: "Open info page for Cluster"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind: "Cluster"
        api_family: "cluster.x-k8s.io"
        namespace_path: "metadata#namespace"
        name_path: "spec#clusterName"
    "Open bootstrap":
      key: "o"
      read_only: true
      helptext: "Open info page for bootstrap"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        api_version_path: "spec#template#spec#bootstrap#configRef#apiVersion"
        kind_path: "spec#template#spec#bootstrap#configRef#kind"
        namespace_path: "metadata#namespace"
        name_path: "spec#template#spec#bootstrap#configRef#name"
    "Open infrastructure":
      key: "i"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for infrastructure"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        api_version_path: "spec#template#spec#infrastructureRef#apiVersion"
        kind_path: "spec#template#spec#infrastructureRef#kind"
        namespace_path: "metadata#namespace"
        name_path: "spec#template#spec#infrastructureRef#name"
