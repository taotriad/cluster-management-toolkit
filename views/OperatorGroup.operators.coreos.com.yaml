---
kind: "OperatorGroup"
api_family: "operators.coreos.com"
default_command: "operatorgroups"
command:
  - "og"
listview:
  name: "Operator Groups"
  group: "API & Extendability"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "controller", "upgrade_strategy", "age"]
      sortcolumn: "namespace"
  fields:
    controller:
      header: "Controller:"
      paths:
        - path: "metadata#ownerReferences"
          pathtype: "items"
          subpaths:
            - "kind"
            - "apiVersion"
            - "name"
          when:
            - key: "controller"
              eq: true
          type: ["kind", "api_group", "name"]
      formatter: "list"
      formatting:
        field_colors:
          - type: "kind"
          - type: "api_group"
          - type: "generic"
        field_separators:
          - type: "kind_api_group"
          - type: "kind"
    upgrade_strategy:
      header: "Upgrade Strategy:"
      path: "spec#upgradeStrategy"
      default: "<unset>"
      type: "str"
infoview:
  name: "Operator Group Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["controller", "static_provided_apis",
                 "target_namespaces", "namespace_label_selector",
                 "namespaces", "service_account",
                 "upgrade_strategy", "last_updated"]
    rows:
      controller:
        header: [["C", ["main", "infoheader_shortcut"]],
                 ["ontroller:", ["main", "infoheader"]]]
        paths:
          - path: "metadata#ownerReferences"
            pathtype: "items"
            subpaths:
              - "kind"
              - "apiVersion"
              - "name"
            when:
              - key: "controller"
                eq: true
            type: ["kind", "api_group", "name"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
      last_updated:
        header: [["Last Updated:", ["main", "infoheader"]]]
        path: "status#lastUpdated"
        default: -1
        type: "timestamp"
        formatter: "timestamp"
      namespace_label_selector:
        header: [["Namespace La", ["main", "infoheader"]],
                 ["b", ["main", "infoheader_shortcut"]],
                 ["el Selector:", ["main", "infoheader"]]]
        paths:
          - path: ["spec#selector#matchLabels"]
            pathtype: "key_value"
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "selector"
      namespaces:
        header: [["Name", ["main", "infoheader"]],
                 ["s", ["main", "infoheader_shortcut"]],
                 ["paces:", ["main", "infoheader"]]]
        path: "status#namespaces"
        default: ["<none>"]
        type: "raw"
        formatter: "list"
        formatting:
          field_colors:
            - type: "namespace"
      service_account:
        header: [["S", ["main", "infoheader_shortcut"]],
                 ["ervice Account:", ["main", "infoheader"]]]
        path: "spec#serviceAccountName"
        default: "<unset>"
        type: "str"
      static_provided_apis:
        header: [["Static Provided APIs:", ["main", "infoheader"]]]
        path: "spec#staticProvidedAPIs"
        default: "<unset>"
        type: "bool"
      target_namespaces:
        header: [["T", ["main", "infoheader_shortcut"]],
                 ["arget Namespaces:", ["main", "infoheader"]]]
        path: "spec#targetNamespaces"
        default: ["ALL NAMESPACES"]
        type: "raw"
        formatter: "list"
        formatting:
          field_colors:
            - type: "namespace"
      upgrade_strategy:
        header: [["Upgrade Strategy:", ["main", "infoheader"]]]
        path: "spec#upgradeStrategy"
        default: "<unset>"
        type: "str"
  shortcuts:
    "Open controller":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for controller"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        owner_reference_path: "metadata#ownerReferences"
        namespace_path: "metadata#namespace"
    "Namespace Label Selector":
      key: "b"
      read_only: true
      helptext: "Show namespace label selector"
      widget: "windowwidget"
      title: "Namespace Label Selector:"
      headers: ["Key:", "Value:"]
      itemgetter: "get_key_value"
      itemgetter_args:
        path: "spec#selector#matchLabels"
    "Service Account":
      key: "s"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for Service Account"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind: "ServiceAccount"
        namespace_path: "metadata#namespace"
        name_path: "spec#serviceAccountName"
    "Show Namespace list":
      key: "s"
      read_only: true
      helptext: "List Namespaces"
      widget: "windowwidget"
      title: "Namespaces:"
      selectable: true
      itemgetter: "get_list_as_list"
      itemgetter_args:
        paths: ["status#namespaces"]
      # Not supported for now
      sortcolumn: "namespace"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        kind: "Namespace"
        name_path: 0
    "Show target Namespace list":
      key: "t"
      modifier: "shift"
      read_only: true
      helptext: "List target Namespaces"
      widget: "windowwidget"
      title: "Target Namespaces:"
      selectable: true
      itemgetter: "get_list_as_list"
      itemgetter_args:
        paths: ["spec#targetNamespaces"]
      # Not supported for now
      sortcolumn: "namespace"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        kind: "Namespace"
        name_path: 0
