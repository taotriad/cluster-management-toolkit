---
kind: "OLM"
api_family: "operator.openshift.io"
default_command: "olms"
command:
  - "olms.operator"
  - "olm.operator"
listview:
  name: "OLMs"
  group: "OpenShift"
  field_indexes:
    Normal:
      fields: ["name", "age"]
infoview:
  name: "OLM Info"
  infopad:
    row_indexes:
      Normal:
        fields:
          - "loglevel"
          - "operator_loglevel"
          - "management_state"
    rows:
      loglevel:
        header: [["Loglevel:", ["main", "infoheader"]]]
        path: "spec#logLevel"
        default: "<unset>"
        type: "str"
      management_state:
        header: [["Management State:", ["main", "infoheader"]]]
        path: "spec#managementState"
        default: "<unset>"
        type: "str"
      operator_loglevel:
        header: [["Operator Loglevel:", ["main", "infoheader"]]]
        path: "spec#operatorLogLevel"
        default: "<unset>"
        type: "str"
  logpad:
    infogetter: "logpad_formatted"
    infogetter_args:
      path: "spec#observedConfig"
      formatter: "format_yaml"
    timestamps: false
  shortcuts:
    "List generations":
      key: "g"
      read_only: true
      helptext: "List generations"
      widget: "windowwidget"
      widget_args:
        title: "Generations:"
        headers: ["Resource:", "Group:", "Namespace:", "Name:"]
        selectable: true
        itemgetter: "get_list_fields"
        itemgetter_args:
          path: "status#generations"
          fields:
            - "resource"
            - "group"
            - "namespace"
            - "name"
        # Not supported for now
        sortcolumn: "resource"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        kind_path: 0
        api_group_path: 1
        namespace_path: 2
        name_path: 3
    "View observed configuration":
      key: "o"
      read_only: true
      helptext: "Show observed configuration"
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "Observed Configuration"
        _pass_obj: true
        path: "spec#observedConfig"
