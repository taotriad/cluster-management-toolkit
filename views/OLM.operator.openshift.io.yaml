---
kind: "OLM"
api_family: "operator.openshift.io"
default_command: "olms"
command:
  - "olms.operator"
  - "olm.operator"
listview:
  name: "OLMs"
  group: "OpenShift"
  field_indexes:
    Normal:
      fields: ["name", "age"]
infoview:
  name: "OLM Info"
  infopad:
  shortcuts:
    "List generations":
      key: "g"
      read_only: true
      helptext: "List generations"
      widget: "windowwidget"
      title: "Generations:"
      selectable: true
      headers: ["Resource:", "Group:", "Namespace:", "Name:"]
      itemgetter: "get_list_fields"
      itemgetter_args:
        path: "status#generations"
        fields:
          - "resource"
          - "group"
          - "namespace"
          - "name"
      # Not supported for now
      sortcolumn: "resource"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        kind_path: 0
        api_group_path: 1
        namespace_path: 2
        name_path: 3
