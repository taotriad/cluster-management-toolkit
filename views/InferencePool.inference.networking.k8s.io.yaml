---
kind: "InferencePool"
api_family: "inference.networking.k8s.io"
default_command: "inferencepools"
listview:
  name: "Inference Pools"
  group: "Machine Learning"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "app_protocol", "age"]
      sortcolumn: "namespace"
  fields:
    app_protocol:
      header: "App Protocol:"
      path: "spec#appProtocol"
      default: "<unset>"
      type: "str"
      formatting:
        field_colors:
          - type: "protocol"
infoview:
  name: "Inference Pool Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["label_selector",
                 "app_protocol",
                 "target_ports",
                 "endpoint_picker_header",
                 "endpoint_picker_reference",
                 "endpoint_picker_port",
                 "endpoint_picker_failure_mode"]
    rows:
      app_protocol:
        header: [["App Protocol:", ["main", "infoheader"]]]
        path: "spec#appProtocol"
        default: "<unset>"
        type: "str"
        formatting:
          field_colors:
            - type: "protocol"
      endpoint_picker_failure_mode:
        header: [["  Failure Mode:", ["main", "infoheader"]]]
        path: "spec#endpointPickerRef#failureMode"
        default: "<unset>"
        type: "str"
      endpoint_picker_header:
        header: [["Endpoint Picker:", ["main", "infoheader"]]]
      endpoint_picker_port:
        header: [["  Port:", ["main", "infoheader"]]]
        path: "spec#endpointPickerRef#port#number"
        default: "<unset>"
        type: "int"
        formatting:
          field_colors:
            - type: "port"
      endpoint_picker_reference:
        header: [["  ", ["main", "infoheader"]],
                 ["R", ["main", "infoheader_shortcut"]],
                 ["eference:", ["main", "infoheader"]]]
        paths:
          - path: [["spec#endpointPickerRef#kind"],
                   ["spec#endpointPickerRef#group"],
                   ["spec#endpointPickerRef#name"]]
            pathtype: "tuple"
            default: ["<unset>"]
            type: ["kind", "api_group", "name"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
      label_selector:
        header: [["La", ["main", "infoheader"]],
                 ["b", ["main", "infoheader_shortcut"]],
                 ["el Selector:", ["main", "infoheader"]]]
        paths:
          - path: ["spec#selector#matchLabels"]
            pathtype: "key_value"
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "selector"
      target_ports:
        header: [["Target Ports:", ["main", "infoheader"]]]
        paths:
          - path: "spec#targetPorts"
            pathtype: "items"
            subpaths:
              - "number"
            default: ["<unset>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "port"
  listpad:
    listgetter: "listgetter_path"
    listgetter_args:
      path: "status#parents"
    infogetter: "generic_infogetter"
    on_activation:
      call: "resourceinfodispatch_with_lookup"
      kind_path: "parentRef#kind"
      api_group_path: "parentRef#group"
      namespace_path: "parentRef#namespace"
      name_path: "parentRef#name"
    field_indexes:
      Normal:
        fields: ["kind", "namespace", "name", "conditions"]
        sortcolumn: "namespace"
    fields:
      conditions:
        header: "Conditions:"
        paths:
          - path: "conditions"
            pathtype: "items"
            subpaths:
              - "type"
              - "status"
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "keyvalue"
      kind:
        header: "Kind:"
        paths:
          - path: [["parentRef#kind"],
                   ["parentRef#group"]]
            pathtype: "tuple"
            default: ["<unset>"]
            type: ["kind", "api_group"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
          field_separators:
            - type: "kind_api_group"
      name:
        header: "Name:"
        path: "parentRef#name"
        default: "<unset>"
        type: "str"
      namespace:
        header: "Namespace:"
        path: "parentRef#namespace"
        default: "<unset>"
        type: "str"
        formatting:
          field_colors:
            - type: "namespace"
  shortcuts:
    "Label Selector":
      key: "b"
      read_only: true
      helptext: "Show label selector"
      widget: "windowwidget"
      title: "Label Selector:"
      headers: ["Key:", "Value:"]
      itemgetter: "get_key_value"
      itemgetter_args:
        path: "spec#selector#matchLabels"
    "Open extension reference":
      key: "r"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for endpoint picker reference"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind_path: "spec#endpointPickerRef#kind"
        api_group_path: "spec#endpointPickerRef#group"
        name_path: "spec#endpointPickerRef#name"
        namespace_path: "metadata#namespace"
