---
kind: "Subscription"
api_family: "operators.coreos.com"
default_command: "subscriptions"
command:
  - "subs"
  - "sub"
listview:
  name: "Subscriptions"
  group: "API & Extendability"
  field_indexes:
    Wide:
      fields: ["namespace", "name", "csv", "source", "channel", "state", "age"]
      sortcolumn: "namespace"
    Normal:
      fields: ["namespace", "name", "channel", "state", "age"]
      sortcolumn: "namespace"
  fields:
    channel:
      header: "Channel:"
      path: "spec#channel"
      default: "<unset>"
      type: "str"
    csv:
      header: "Cluster Service Version:"
      paths:
        - path: ["status#installedCSV", "status#currentCSV"]
          pathtype: "value"
    source:
      header: "Source:"
      path: "spec#source"
      type: "str"
    state:
      header: "State:"
      path: "status#state"
      default: "Unknown"
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            AtLatestKnown:
              field_colors:
                - context: "main"
                  type: "status_ok"
            Unknown:
              field_colors:
                - context: "main"
                  type: "status_unknown"
            UpgradeFailed:
              field_colors:
                - context: "main"
                  type: "status_warning"
            UpgradeAvailable:
              field_colors:
                - context: "main"
                  type: "status_highlight"
            UpgradePending:
              field_colors:
                - context: "main"
                  type: "status_pending"
  actions:
    actionlist:
      "Delete resource":
        description: "Delete resource"
        category: "Resource Level"
        confirm: true
        actionfunc: "delete_resource"
infoview:
  name: "Subscription Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["source", "channel", "install_plan_approval", "install_plan",
                 "current_csv", "installed_csv", "state"]
    rows:
      channel:
        header: [["Channel:", ["main", "infoheader"]]]
        path: "spec#channel"
        default: "<unset>"
        type: "str"
      current_csv:
        header: [["Current Cluster Service Version:", ["main", "infoheader"]]]
        path: "status#currentCSV"
        type: "str"
      installed_csv:
        header: [["Installed ", ["main", "infoheader"]],
                 ["C", ["main", "infoheader_shortcut"]],
                 ["luster Service Version:", ["main", "infoheader"]]]
        path: "status#installedCSV"
        type: "str"
      install_plan:
        header: [["I", ["main", "infoheader_shortcut"]],
                 ["nstall Plan:", ["main", "infoheader"]]]
        paths:
          - path: [["status#installPlanRef#namespace"],
                   ["status#installPlanRef#name"]]
            pathtype: "tuple"
            default: ["", "<none>"]
            type: ["name", "name"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "namespace"
            - type: "generic"
          field_separators:
            - type: "namespace"
      install_plan_approval:
        header: [["Install Plan Approval:", ["main", "infoheader"]]]
        path: "spec#installPlanApproval"
        type: "str"
      source:
        header: [["S", ["main", "infoheader_shortcut"]],
                 ["ource:", ["main", "infoheader"]]]
        paths:
          - path: [["spec#sourceNamespace"], ["spec#source"]]
            pathtype: "tuple"
            default: ["", "<none>"]
            type: ["name", "name"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "namespace"
            - type: "generic"
          field_separators:
            - type: "namespace"
      state:
        header: [["State:", ["main", "infoheader"]]]
        path: "status#state"
        default: "Unknown"
        type: "str"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              AtLatestKnown:
                field_colors:
                  - context: "main"
                    type: "status_ok"
              Unknown:
                field_colors:
                  - context: "main"
                    type: "status_unknown"
              UpgradeFailed:
                field_colors:
                  - context: "main"
                    type: "status_warning"
              UpgradeAvailable:
                field_colors:
                  - context: "main"
                    type: "status_highlight"
              UpgradePending:
                field_colors:
                  - context: "main"
                    type: "status_pending"
  listpad:
    on_activation:
      call: "resourceinfodispatch_with_lookup"
      kind_path: "catalogSourceRef#kind"
      api_version_path: "catalogSourceRef#apiVersion"
      namespace_path: ["catalogSourceRef#namespace", "_extra_data#namespace"]
      name_path: "catalogSourceRef#name"
    listgetter: "listgetter_path"
    listgetter_args:
      path: "status#catalogHealth"
    infogetter: "generic_infogetter"
    field_indexes:
      Normal:
        fields: ["kind", "namespace", "name", "healthy"]
        sortcolumn: "namespace"
    fields:
      healthy:
        header: "Healthy:"
        path: "healthy"
        type: "str"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              "True":
                field_colors:
                  - context: "main"
                    type: "status_ok"
              "False":
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
      kind:
        header: "Kind:"
        paths:
          - path: [["catalogSourceRef#kind"], ["catalogSourceRef#apiVersion"]]
            pathtype: "tuple"
            type: ["kind", "api_group"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
          field_separators:
            - type: "kind_api_group"
      name:
        header: "Name:"
        path: "catalogSourceRef#name"
        type: "str"
      namespace:
        header: "Namespace:"
        path: "catalogSourceRef#namespace"
        type: "str"
        formatting:
          field_colors:
            - type: "namespace"
  shortcuts:
    "CSV":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for Cluster Service Version"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind: "ClusterServiceVersion"
        api_family: "operators.coreos.com"
        name_path: "status#installedCSV"
        namespace_path: "metadata#namespace"
    "Install Plan":
      key: "i"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for Install Plan"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind: "InstallPlan"
        api_family: "operators.coreos.com"
        name_path: "status#installPlanRef#name"
        namespace_path: "status#installPlanRef#namespace"
    "Source":
      key: "s"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for Operator Source"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind: "CatalogSource"
        api_family: "operators.coreos.com"
        name_path: "spec#source"
        namespace_path: "spec#sourceNamespace"
