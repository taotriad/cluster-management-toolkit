---
kind: "ClusterInformation"
api_family: "crd.projectcalico.org"
default_command: "clusterinformations"
listview:
  name: "Cluster Informations"
  group: "Calico"
  field_indexes:
    Normal:
      fields: ["name", "cluster_type", "datastore_ready", "age"]
  fields:
    cluster_type:
      header: "Cluster Type:"
      paths:
        - path: "spec#clusterType"
          pathtype: "split"
          type: "str"
      formatter: "list"
    datastore_ready:
      header: "Datastore Ready:"
      path: "spec#datastoreReady"
      type: "bool"
infoview:
  name: "Cluster Information Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["calico_version", "cluster_guid",
                 "cluster_type", "datastore_ready"]
    rows:
      calico_version:
        header: [["Calico Version:", ["main", "infoheader"]]]
        path: "spec#calicoVersion"
        default: "<unset>"
        type: "str"
        formatting:
          field_colors:
            - type: "version"
      cluster_guid:
        header: [["Cluster GUID:", ["main", "infoheader"]]]
        path: "spec#clusterGUID"
        type: "numerical"
        formatter: "hex"
      cluster_type:
        header: [["Cluster Type:", ["main", "infoheader"]]]
        paths:
          - path: "spec#clusterType"
            pathtype: "split"
            type: "str"
        formatter: "list"
      datastore_ready:
        header: [["Datastore Ready:", ["main", "infoheader"]]]
        path: "spec#datastoreReady"
        type: "bool"
