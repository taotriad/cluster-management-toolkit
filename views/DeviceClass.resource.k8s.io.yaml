---
kind: "DeviceClass"
api_family: "resource.k8s.io"
default_command: "deviceclasses"
command:
  - "devclasses"
  - "devclass"
listview:
  name: "Device Classes"
  group: "Dynamic Resource Allocation"
  field_indexes:
    Normal:
      fields: ["name", "extended_name", "controller", "age"]
  fields:
    controller:
      header: "Controller:"
      paths:
        - path: "metadata#ownerReferences"
          pathtype: "items"
          subpaths:
            - "kind"
            - "apiVersion"
            - "name"
          when:
            - key: "controller"
              eq: true
          type: ["kind", "api_group", "name"]
      default: "<none>"
      formatter: "list"
      formatting:
        field_colors:
          - type: "kind"
          - type: "api_group"
          - type: "generic"
        field_separators:
          - type: "kind_api_group"
          - type: "kind"
    extended_name:
      header: "Extended Name:"
      path: "spec#extendedResourceName"
      default: "<unset>"
      type: "str"
infoview:
  name: "Device Class Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["controller", "device_cel_selectors", "extended_name"]
    rows:
      device_cel_selectors:
        header: [["Device CEL ", ["main", "infoheader"]],
                 ["S", ["main", "infoheader_shortcut"]],
                 ["electors:", ["main", "infoheader"]]]
        paths:
          - path: "spec#selectors"
            pathtype: "items"
            subpaths:
              - "cel#expression"
        formatter: "list"
      controller:
        header: [["C", ["main", "infoheader_shortcut"]],
                 ["ontroller:", ["main", "infoheader"]]]
        paths:
          - path: "metadata#ownerReferences"
            pathtype: "items"
            subpaths:
              - "kind"
              - "apiVersion"
              - "name"
            when:
              - key: "controller"
                eq: true
            type: ["kind", "api_group", "name"]
        default: "<none>"
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
      extended_name:
        header: [["Extended Name:", ["main", "infoheader"]]]
        path: "spec#extendedResourceName"
        default: "<unset>"
        type: "str"
  shortcuts:
    "Open controller":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for controller"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        namespace_path: "metadata#namespace"
        owner_reference_path: "metadata#ownerReferences"
    "Device class configuration":
      key: "c"
      read_only: true
      helptext: "Show device class configuration"
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "Device Class Configuration"
        _pass_obj: true
        path: "spec#config"
    "Device Selectors":
      key: "s"
      modifier: "shift"
      read_only: true
      helptext: "Show device selectors"
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "Device Selectors"
        _pass_obj: true
        path: "spec#selectors"
        include_root: true
