---
kind: "DeviceClass"
api_family: "resource.k8s.io"
default_command: "deviceclasses"
command:
  - "devclasses"
  - "devclass"
listview:
  name: "Device Classes"
  group: "Dynamic Resource Allocation"
  field_indexes:
    Normal:
      fields: ["name", "extended_name", "age"]
  fields:
    extended_name:
      header: "Extended Name:"
      path: "spec#extendedResourceName"
      default: "<unset>"
      type: "str"
infoview:
  name: "Device Class Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["extended_name"]
    rows:
      extended_name:
        header: [["Extended Name:", ["main", "infoheader"]]]
        path: "spec#extendedResourceName"
        default: "<unset>"
        type: "str"
  shortcuts:
    "Device class configuration":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Show device class configuration"
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "Device Class Configuration"
        _pass_obj: true
        path: "spec#config"
    "Device Selectors":
      key: "s"
      read_only: true
      helptext: "Show device selectors"
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "Device Selectors"
        _pass_obj: true
        path: "spec#selectors"
        include_root: true
