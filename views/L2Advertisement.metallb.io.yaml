---
kind: "L2Advertisement"
api_family: "metallb.io"
default_command: "l2advertisements"
command:
  - "l2ads"
  - "l2ad"
listview:
  name: "L2 Advertisements"
  group: "Network"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "age"]
      sortcolumn: "namespace"
infoview:
  name: "L2 Advertisement Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["interfaces", "ip_address_pools",
                 "ip_address_pool_label_selector",
                 "ip_address_pool_set_based_selector",
                 "node_selectors"]
    rows:
      interfaces:
        header: [["Interfaces:", ["main", "infoheader"]]]
        path: "spec#interfaces"
        default: ["<unset>"]
        type: "raw"
        formatter: "list"
      ip_address_pools:
        header: [["IP-Address ", ["main", "infoheader"]],
                 ["P", ["main", "infoheader_shortcut"]],
                 ["ools:", ["main", "infoheader"]]]
        path: "spec#ipAddressPools"
        default: ["<unset>"]
        type: "raw"
        formatter: "list"
      ip_address_pool_label_selector:
        header: [["IP-A", ["main", "infoheader"]],
                 ["d", ["main", "infoheader_shortcut"]],
                 ["dress Pool Node Label Selector:", ["main", "infoheader"]]]
        paths:
          - path: ["spec#ipAddressPoolSelectors#matchLabels"]
            pathtype: "key_value"
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "selector"
      ip_address_pool_set_based_selector:
        header: [["IP-Address Pool Set-based Selector:",
                  ["main", "infoheader"]]]
        paths:
          - path: "spec#ipAddressPoolSelectors#matchExpressions"
            pathtype: "match_expression"
            default: "<none>"
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "operator"
            - type: "value"
          field_separators:
            - type: "space"
            - type: "no_pad"
      node_selectors:
        header: [["Node ", ["main", "infoheader"]],
                 ["S", ["main", "infoheader_shortcut"]],
                 ["electors:", ["main", "infoheader"]]]
        paths:
          - path: ["spec#nodeSelectors"]
            pathtype: "selectors"
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "selector"
  shortcuts:
    "IP-Address Pools":
      key: "p"
      modifier: "shift"
      read_only: true
      helptext: "List IP-Address Pools"
      widget: "windowwidget"
      title: "IP-Address Pools:"
      itemgetter: "get_list_as_list"
      itemgetter_args:
        path: "spec#ipAddressPools"
    "IP-Address Pool Label Selector":
      key: "d"
      read_only: true
      helptext: "Show IP-address label selector"
      widget: "windowwidget"
      title: "IP-Address Label Selector:"
      headers: ["Key:", "Value:"]
      itemgetter: "get_key_value"
      itemgetter_args:
        path: "spec#nodeSelectors#matchLabels"
    "Node Selectors":
      key: "s"
      modifier: "shift"
      read_only: true
      helptext: "Show node selectors"
      widget: "windowwidget"
      title: "Node Selectors:"
      itemgetter: "get_selector_list"
      itemgetter_args:
        path: "spec#nodeSelectors"
