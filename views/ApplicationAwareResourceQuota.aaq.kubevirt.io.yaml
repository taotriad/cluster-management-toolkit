---
kind: "ApplicationAwareResourceQuota"
api_family: "aaq.kubevirt.io"
default_command: "applicationawareresourcequotas"
command:
  - "aaquotas"
  - "aaquota"
  - "aarqs"
  - "aarq"
listview:
  name: "Application Aware Resource Quotas"
  group: "Policy"
  field_indexes:
    Wide:
      fields: ["namespace", "name", "age", "request", "limit"]
      sortcolumn: "namespace"
    Normal:
      fields: ["namespace", "name", "age"]
      sortcolumn: "namespace"
  fields:
    limit:
      header: "Limit:"
      paths:
        - path: "spec#hard"
          pathtype: "key_value"
          when:
            - key_startswith: "limits."
      formatter: "list"
      formatting:
        field_colors:
          - type: "key"
          # Ideally we'd use numerical_with_units
          - type: "numerical"
        field_separators:
          - type: "keyvalue"
    request:
      header: "Request:"
      paths:
        - path: "spec#hard"
          pathtype: "key_value"
          when:
            - key_notstartswith: "limits."
      formatter: "list"
      formatting:
        field_colors:
          - type: "key"
          # Ideally we'd use numerical_with_units
          - type: "numerical"
        field_separators:
          - type: "keyvalue"
infoview:
  name: "Application Aware Resource Quota Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["scope_set_based_selector"]
    rows:
      scope_set_based_selector:
        header: [["Scope Set-Based Selector:", ["main", "infoheader"]]]
        paths:
          - path: "spec#scopeSelector#matchExpressions"
            pathtype: "match_expression"
            default: "<none>"
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "operator"
            - type: "value"
          field_separators:
            - type: "space"
            - type: "no_pad"
  listpad:
    listgetter: "listgetter_path"
    listgetter_args:
      path: ""
    infogetter: "get_rq_item_info"
    field_indexes:
      Normal:
        fields: ["resource", "used", "hard"]
    fields:
      hard:
        header: "Hard:"
        path: "hard"
        type: "str"
        formatter: "numerical"
        align: "right"
      resource:
        header: "Resource:"
        path: "resource"
        type: "str"
      used:
        header: "Used:"
        path: "used"
        type: "str"
        formatter: "numerical"
        align: "right"
