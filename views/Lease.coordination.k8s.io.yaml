---
kind: "Lease"
api_family: "coordination.k8s.io"
default_command: "leases"
listview:
  name: "Leases"
  group: "Coordination"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "holder", "age"]
      sortcolumn: "namespace"
  fields:
    holder:
      header: "Holder:"
      path: "spec#holderIdentity"
      type: "str"
  actions:
    actionlist:
      "Delete resource":
        description: "Delete resource"
        category: "Resource Level"
        confirm: true
        actionfunc: "delete_resource"
infoview:
  name: "Lease Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["holder_identity", "lease_duration", "lease_transitions",
                 "acquire_time", "renew_time"]
    rows:
      acquire_time:
        header: [["Acquire Time:", ["main", "infoheader"]]]
        path: "spec#acquireTime"
        type: "timestamp"
        formatter: "timestamp"
      holder_identity:
        header: [["Holder Identity:", ["main", "infoheader"]]]
        path: "spec#holderIdentity"
        type: "str"
      lease_duration:
        header: [["Lease Duration:", ["main", "infoheader"]]]
        path: "spec#leaseDurationSeconds"
        type: "raw"
        formatter: "age"
      lease_transitions:
        header: [["Lease Transitions:", ["main", "infoheader"]]]
        path: "spec#leaseTransitions"
        type: "int"
        formatter: "numerical"
      renew_time:
        header: [["Renew Time:", ["main", "infoheader"]]]
        path: "spec#renewTime"
        type: "timestamp"
        formatter: "timestamp"
