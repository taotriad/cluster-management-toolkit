---
kind: "ClusterServiceVersion"
api_family: "operators.coreos.com"
default_command: "clusterserviceversions"
command:
  - "csvs"
  - "csv"
listview:
  name: "Cluster Service Versions"
  group: "API & Extendability"
  field_indexes:
    Wide:
      fields: ["namespace", "name", "display_name", "version",
               "reason", "phase", "age", "message"]
      sortcolumn: "namespace"
    Normal:
      fields: ["namespace", "name", "version", "phase", "age"]
      sortcolumn: "namespace"
  fields:
    display_name:
      header: "Display Name:"
      path: "spec#displayName"
      type: "str"
    message:
      header: "Message:"
      path: "status#message"
      default: "<unset>"
      type: "str"
    phase:
      header: "Phase:"
      path: "status#phase"
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            Failed:
              field_colors:
                - context: "main"
                  type: "status_not_ok"
            Installing:
              field_colors:
                - context: "main"
                  type: "status_pending"
            Pending:
              field_colors:
                - context: "main"
                  type: "status_pending"
            Succeeded:
              field_colors:
                - context: "main"
                  type: "status_ok"
    reason:
      header: "Reason:"
      path: "status#reason"
      default: "<unset>"
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            Copied:
              field_colors:
                - context: "main"
                  type: "status_done"
            InstallSucceeded:
              field_colors:
                - context: "main"
                  type: "status_ok"
    version:
      header: "Version:"
      path: "spec#version"
      type: "str"
      formatting:
        field_colors:
          - type: "version"
  actions:
    actionlist:
      "Delete resource":
        description: "Delete resource"
        category: "Resource Level"
        confirm: true
        actionfunc: "delete_resource"
infoview:
  name: "Cluster Service Version Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["display_name", "keywords", "maturity", "version",
                 "minimum_kubernetes_version", "reason", "message", "phase"]
    rows:
      display_name:
        header: [["Display Name:", ["main", "infoheader"]]]
        path: "spec#displayName"
        type: "str"
      keywords:
        header: [["Keywords:", ["main", "infoheader"]]]
        path: "spec#keywords"
        type: "raw"
        formatter: "list"
      maturity:
        header: [["Maturity:", ["main", "infoheader"]]]
        path: "spec#maturity"
        type: "str"
      message:
        header: [["Message:", ["main", "infoheader"]]]
        path: "status#message"
        default: "<unset>"
        type: "str"
      minimum_kubernetes_version:
        header: [["Minimum Kubernetes Version:", ["main", "infoheader"]]]
        path: "spec#minKubeVersion"
        type: "str"
        formatting:
          field_colors:
            - type: "version"
      phase:
        header: [["Phase:", ["main", "infoheader"]]]
        path: "status#phase"
        type: "str"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              Failed:
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
              Installing:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              Pending:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              Succeeded:
                field_colors:
                  - context: "main"
                    type: "status_ok"
      reason:
        header: [["Reason:", ["main", "infoheader"]]]
        path: "status#reason"
        default: "<unset>"
        type: "str"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              Copied:
                field_colors:
                  - context: "main"
                    type: "status_done"
              InstallSucceeded:
                field_colors:
                  - context: "main"
                    type: "status_ok"
      version:
        header: [["Version:", ["main", "infoheader"]]]
        path: "spec#version"
        type: "str"
        formatting:
          field_colors:
            - type: "version"
  shortcuts:
    "Description":
      key: "d"
      modifier: "shift"
      read_only: true
      helptext: "Show description"
      widget: "windowwidget"
      title: "Description:"
      itemgetter: "get_strings_from_string"
      itemgetter_args:
        path: "spec#description"
    "Maintainers":
      key: "m"
      read_only: true
      helptext: "Show maintainers"
      widget: "windowwidget"
      title: "Maintainers:"
      headers: ["Name:", "E-mail:"]
      itemgetter: "get_list_fields"
      itemgetter_args:
        path: "spec#maintainers"
        fields:
          - "name"
          - "email"
    "Installation Spec":
      key: "i"
      read_only: true
      helptext: "Show installation specification"
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "Installation Specification"
        _pass_obj: true
        path: "spec#install"
        include_root: true
    "Supported Installation Modes":
      key: "i"
      modifier: "shift"
      read_only: true
      helptext: "Show supported installation modes"
      widget: "windowwidget"
      title: "Supported installation modes:"
      headers: ["Mode:", "Supported:"]
      itemgetter: "get_list_fields"
      itemgetter_args:
        path: "spec#installModes"
        fields:
          - "type"
          - "supported"
      formatting: [["windowwidget", "default"], ["windowwidget", "highlight"]]
      # This isn't supported for now
      "sortcolumn": "type"
    "Custom Resource Definitions":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Show custom resource definitions"
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "Custom Resource Definitions"
        _pass_obj: true
        path: "spec#customresourcedefinitions"
        include_root: true
