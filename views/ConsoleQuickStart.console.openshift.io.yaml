---
kind: "ConsoleQuickStart"
api_family: "console.openshift.io"
default_command: "consolequickstarts"
listview:
  name: "Console Quick Starts"
  group: "OpenShift"
  field_indexes:
    Wide:
      fields: ["name", "display_name", "controller", "duration", "tasks", "age"]
    Normal:
      fields: ["name", "duration", "tasks", "age"]
  fields:
    controller:
      header: "Controller:"
      paths:
        - path: "metadata#ownerReferences"
          pathtype: "items"
          subpaths:
            - "kind"
            - "apiVersion"
            - "name"
          when:
            - key: "controller"
              eq: true
          type: ["kind", "api_group", "name"]
          default: ["<none>"]
      formatter: "list"
      formatting:
        field_colors:
          - type: "kind"
          - type: "api_group"
          - type: "generic"
        field_separators:
          - type: "kind_api_group"
          - type: "kind"
    display_name:
      header: "Display Name:"
      path: "spec#displayName"
      default: "<unset>"
      type: "str"
    duration:
      header: "Duration:"
      path: "spec#durationMinutes"
      type: "int"
      formatter: "numerical"
      formatting:
        unit: "m"
      align: "right"
    tasks:
      header: "Tasks:"
      path: "spec#tasks"
      type: "len"
      formatter: "numerical"
      align: "right"
infoview:
  name: "Console Quick Start Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["controller", "display_name",
                 "description", "duration", "prerequisites", "tags"]
    rows:
      controller:
        header: [["C", ["main", "infoheader_shortcut"]],
                 ["ontroller:", ["main", "infoheader"]]]
        paths:
          - path: "metadata#ownerReferences"
            pathtype: "items"
            subpaths:
              - "kind"
              - "apiVersion"
              - "name"
            when:
              - key: "controller"
                eq: true
            type: ["kind", "api_group", "name"]
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
      description:
        header: [["Description:", ["main", "infoheader"]]]
        path: "spec#description"
        default: "<unset>"
        type: "str"
      display_name:
        header: [["Display Name:", ["main", "infoheader"]]]
        path: "spec#displayName"
        default: "<unset>"
        type: "str"
      duration:
        header: [["Duration:", ["main", "infoheader"]]]
        path: "spec#durationMinutes"
        type: "str"
        formatter: "numerical"
        formatting:
          unit: "m"
      prerequisites:
        header: [["P", ["main", "infoheader_shortcut"]],
                 ["rerequisites:", ["main", "infoheader"]]]
        path: "spec#prerequisites"
        type: "raw"
        default: ["<none>"]
        formatter: "list"
      tags:
        header: [["Tags:", ["main", "infoheader"]]]
        path: "spec#tags"
        type: "raw"
        default: "<none>"
        formatter: "list"
  listpad:
    on_activation:
      call: "resourceinfodispatch"
      kind: "__ConsoleQuickStartTask"
      api_family: "console.openshift.io"
      title_path: "title"
    listgetter: "listgetter_path"
    listgetter_args:
      path: "spec#tasks"
    infogetter: "generic_infogetter"
    field_indexes:
      Normal:
        fields: ["title"]
        sortcolumn: "data"
    fields:
      title:
        header: "Title:"
        path: "title"
        type: "str"
  shortcuts:
    "Open controller":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for controller"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        namespace_path: "metadata#namespace"
        owner_reference_path: "metadata#ownerReferences"
    "Conclusion":
      key: "c"
      read_only: true
      helptext: "Show conclusion"
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "Conclusion"
        _pass_obj: true
        path: "spec#conclusion"
    "Introduction":
      key: "i"
      modifier: "shift"
      read_only: true
      helptext: "Show introduction"
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "Introduction"
        _pass_obj: true
        path: "spec#introduction"
    "Show prerequisites":
      key: "p"
      modifier: "shift"
      read_only: true
      helptext: "List prerequisites (if any)"
      widget: "windowwidget"
      title: "Prerequisites:"
      itemgetter: "get_list_as_list"
      itemgetter_args:
        path: "spec#prerequisites"
      # Not supported for now
      sortcolumn: "name"
    "Show Next Quickstart":
      key: "q"
      modifier: "shift"
      read_only: true
      helptext: "List next QuickStart (if any)"
      widget: "windowwidget"
      title: "Name:"
      selectable: true
      itemgetter: "get_list_as_list"
      itemgetter_args:
        path: "spec#nextQuickStart"
      # Not supported for now
      sortcolumn: "name"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        kind: "ConsoleQuickStart"
        api_family: "console.openshift.io"
        name_path: 0
