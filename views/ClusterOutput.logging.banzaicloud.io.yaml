---
kind: "ClusterOutput"
api_family: "logging.banzaicloud.io"
default_command: "clusteroutputs"
command:
  - "clroutputs"
  - "clroutput"
listview:
  name: "Cluster Outputs"
  group: "Logging"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "active", "age", "problems"]
      sortcolumn: "namespace"
  fields:
    active:
      header: "Active:"
      path: "status#active"
      default: "<unset>"
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            "True":
              field_colors:
                - context: "main"
                  type: "status_ok"
            "False":
              field_colors:
                - context: "main"
                  type: "status_pending"
    problems:
      header: "Problems:"
      path: "status#problems"
      default: "<unset>"
      type: "str"
infoview:
  name: "Cluster Output Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["problems", "active"]
    rows:
      active:
        header: [["Active:", ["main", "infoheader"]]]
        path: "status#active"
        default: "<unset>"
        type: "str"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              "True":
                field_colors:
                  - context: "main"
                    type: "status_ok"
              "False":
                field_colors:
                  - context: "main"
                    type: "status_pending"
      problems:
        header: [["Problems:", ["main", "infoheader"]]]
        path: "status#problems"
        default: "<unset>"
        type: "str"
  logpad:
    infogetter: "logpad_formatted"
    infogetter_args:
      formatter: "format_yaml"
      path: "spec"
    timestamps: false
