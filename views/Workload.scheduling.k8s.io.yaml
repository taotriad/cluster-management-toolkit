---
kind: "Workload"
api_family: "scheduling.k8s.io"
default_command: "workloads"
command:
  - "wls"
  - "wl"
listview:
  name: "Workloads"
  group: "Workloads"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "controller", "age"]
  fields:
    controller:
      header: "Controller:"
      paths:
        - path: [["spec#controllerRef#kind"], ["spec#controllerRef#apiGroup"],
                 ["spec#controllerRef#name"]]
          pathtype: "tuple"
          default: ["<unset>"]
      formatter: "list"
      formatting:
        field_colors:
          - type: "kind"
          - type: "api_group"
          - type: "generic"
        field_separators:
          - type: "kind_api_group"
          - type: "kind"
infoview:
  name: "Workload Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["controller"]
    rows:
      controller:
        header: [["C", ["main", "infoheader_shortcut"]],
                 ["ontroller:", ["main", "infoheader"]]]
        paths:
          - path: [["spec#controllerRef#kind"], ["spec#controllerRef#apiGroup"],
                   ["spec#controllerRef#name"]]
            pathtype: "tuple"
            default: ["<unset>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
  listpad:
    listgetter: "listgetter_path"
    listgetter_args:
      path: "spec#podGroups"
    infogetter: "generic_infogetter"
    field_indexes:
      Normal:
        fields: ["pod_group", "policy", "gang_minimum_count"]
        sortcolumn: "pod_group"
    fields:
      pod_group:
        header: "Pod Group:"
        path: "name"
        default: "<unset>"
        type: "str"
      gang_minimum_count:
        header: "Gang Minimum Count:"
        path: "policy#gang#minCount"
        default: "<none>"
        type: "int"
        formatter: "numerical"
        align: "right"
      policy:
        header: "Policy:"
        paths:
          - path: "policy"
            pathtype: "substitution"
            when:
              - key: "basic"
                notnone: true
            substitute: "Basic"
          - path: "policy"
            pathtype: "substitution"
            when:
              - key: "gang"
                notnone: true
            substitute: "Gang"
        default: ["<unset>"]
        formatter: "list"
  shortcuts:
    "Open controller":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for controller"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind_path: "spec#controllerRef#kind"
        api_group_path: "spec#controllerRef#apiGroup"
        namespace_path: "metadata#namespace"
        name_path: "spec#controllerRef#name"
