---
kind: "RKECluster"
api_family: "rke.cattle.io"
default_command: "rkeclusters"
listview:
  name: "RKE Clusters"
  group: "Rancher"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "endpoint", "ready", "age"]
      sortcolumn: "namespace"
  fields:
    endpoint:
      header: "Endpoint:"
      paths:
        - path: [["spec#controlPlaneEndpoint#host"],
                 ["spec#controlPlaneEndpoint#port"]]
          pathtype: "tuple"
          default: ["<unset>"]
      formatter: "list"
      formatting:
        field_colors:
          - type: "generic"
          - type: "port"
        field_separators:
          - type: "port"
    ready:
      header: "Ready:"
      path: "status#ready"
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            "True":
              field_colors:
                - context: "main"
                  type: "status_ok"
            "False":
              field_colors:
                - context: "main"
                  type: "status_not_ok"
            "<unset>":
              field_colors:
                - context: "types"
                  type: "unset"
infoview:
  name: "RKE Cluster Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["ready"]
    rows:
      ready:
        header: [["Ready:", ["main", "infoheader"]]]
        path: "status#ready"
        type: "str"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              "True":
                field_colors:
                  - context: "main"
                    type: "status_ok"
              "False":
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
              "<unset>":
                field_colors:
                  - context: "types"
                    type: "unset"
