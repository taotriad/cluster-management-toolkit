---
kind: "Authentication"
api_family: "config.openshift.io"
default_command: "authentications.config.openshift.io"
command:
  - "authentications.config"
  - "authentication.config"
listview:
  name: "Authentications"
  group: "OpenShift"
  field_indexes:
    Normal:
      fields: ["name", "age"]
infoview:
  name: "Authentication Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["oauth_metadata",
                 "integrated_oauth_metadata", "service_account_issuer",
                 "webhook_token_authenticator_config", "oidc_clients", "type"]
    rows:
      integrated_oauth_metadata:
        header: [["I", ["main", "infoheader_shortcut"]],
                 ["ntegrated OAuth Metadata:", ["main", "infoheader"]]]
        path: "status#integratedOAuthMetadata#name"
        type: "str"
      oauth_metadata:
        header: [["O", ["main", "infoheader"]],
                 ["A", ["main", "infoheader_shortcut"]],
                 ["uth Metadata:", ["main", "infoheader"]]]
        path: "spec#oauthMetadata#name"
        default: "<unset>"
        fallback_on_empty: true
        type: "str"
      oidc_clients:
        header: [["OIDC ", ["main", "infoheader"]],
                 ["C", ["main", "infoheader_shortcut"]],
                 ["lients:", ["main", "infoheader"]]]
        paths:
          - path: "status#oidcClients"
            pathtype: "items"
            subpaths:
              - "componentNamespace"
              - "componentName"
            default: ["<none>"]
        formatter: "list"
      service_account_issuer:
        header: [["Service Account Issuer:", ["main", "infoheader"]]]
        path: "spec#serviceAccountIssuer"
        fallback_on_empty: true
        default: "https://kubernetes.default.svc"
        type: "str"
      type:
        header: [["Type:", ["main", "infoheader"]]]
        path: "spec#type"
        default: "IntegratedOAuth"
        fallback_on_empty: true
        type: "str"
      webhook_token_authenticator_config:
        header: [["Webhook ", ["main", "infoheader"]],
                 ["T", ["main", "infoheader_shortcut"]],
                 ["oken Authenticator Config:", ["main", "infoheader"]]]
        path: "spec#webhookTokenAuthenticator#kubeConfig#name"
        type: "str"
  shortcuts:
    "Open integrated Oauth metadata":
      key: "i"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for integrated OAuth metadata"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        name_path: "status#integratedOAuthMetadata#name"
        namespace: "openshift-config-managed"
        kind: "ConfigMap"
    "Open Oauth metadata":
      key: "a"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for OAuth metadata"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        name_path: "spec#oauthMetadata#name"
        namespace: "openshift-config"
        kind: "ConfigMap"
    "Open webhook token authenticator config":
      key: "t"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for webhook token authenticator config"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        name_path: "spec#webhookTokenAuthenticator#kubeConfig#name"
        namespace: "openshift-config"
        kind: "Secret"
    "List OIDC Clients":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "List OIDC Clients"
      widget: "windowwidget"
      widget_args:
        title: "OIDC Clients:"
        headers: ["Namespace:", "Name:"]
        itemgetter: "get_list_fields"
        itemgetter_args:
          path: "status#oidcClients"
          fields:
            - "componentNamespace"
            - "componentName"
        # This isn't supported for now
        sortcolumn: "namespace"
