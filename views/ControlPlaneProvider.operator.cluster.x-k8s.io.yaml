---
kind: "ControlPlaneProvider"
api_family: "operator.cluster.x-k8s.io"
default_command: "controlplaneproviders"
command:
  - "controlplaneprovs"
  - "controlplaneprov"
  - "cpprovs"
  - "cpprov"
listview:
  name: "Control Plane Providers"
  group: "Cluster Configuration"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "installed_version", "ready", "age"]
      sortcolumn: "namespace"
  fields:
    installed_version:
      header: "Installed Version:"
      path: "status#installedVersion"
      type: "str"
      formatting:
        field_colors:
          - type: "version"
    ready:
      header: "Ready:"
      paths:
        - path: "status#conditions"
          pathtype: "items"
          subpath: "status"
          when:
            - key: "type"
              eq: "Ready"
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            "True":
              field_colors:
                - context: "main"
                  type: "status_ok"
            "False":
              field_colors:
                - context: "main"
                  type: "status_not_ok"
infoview:
  name: "Control Plane Provider Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["installed_version", "contract", "ready"]
    rows:
      contract:
        header: [["Contract:", ["main", "infoheader"]]]
        path: "status#contract"
        type: "str"
        formatting:
          field_colors:
            - type: "version"
      installed_version:
        header: [["Installed Version:", ["main", "infoheader"]]]
        path: "status#installedVersion"
        type: "str"
        formatting:
          field_colors:
            - type: "version"
      ready:
        header: [["Ready:", ["main", "infoheader"]]]
        paths:
          - path: "status#conditions"
            pathtype: "items"
            subpath: "status"
            when:
              - key: "type"
                eq: "Ready"
        type: "str"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              "True":
                field_colors:
                  - context: "main"
                    type: "status_ok"
              "False":
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
