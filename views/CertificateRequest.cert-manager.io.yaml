---
kind: "CertificateRequest"
api_family: "cert-manager.io"
default_command: "certificaterequests"
command:
  - "certreqs"
  - "certreq"
listview:
  name: "Certificate Requests"
  group: "Certificate Management"
  field_indexes:
    Wide:
      fields: ["namespace", "name", "controller", "issuer",
               "condition_ready", "age", "status_message"]
      sortcolumn: "namespace"
    Normal:
      fields: ["namespace", "name", "issuer",
               "condition_ready", "age", "status_message"]
      sortcolumn: "namespace"
  fields:
    condition_ready:
      header: "Ready:"
      paths:
        - path: "status#conditions"
          pathtype: "items"
          subpath: "status"
          when:
            - key: "type"
              eq: "Ready"
          default: "<unknown>"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            "True":
              field_colors:
                - context: "main"
                  type: "status_ok"
            "False":
              field_colors:
                - context: "main"
                  type: "status_not_ok"
    controller:
      header: "Controller:"
      paths:
        - path: "metadata#ownerReferences"
          pathtype: "items"
          subpaths:
            - "kind"
            - "apiVersion"
            - "name"
          when:
            - key: "controller"
              eq: true
          type: ["kind", "api_group", "name"]
          default: ["<none>"]
      formatter: "list"
      formatting:
        field_colors:
          - type: "kind"
          - type: "api_group"
          - type: "generic"
        field_separators:
          - type: "kind_api_group"
          - type: "kind"
    issuer:
      header: "Issuer:"
      paths:
        - path: [["spec#issuerRef#kind"], ["spec#issuerRef#name"]]
          pathtype: "tuple"
          type: ["kind", "name"]
      formatter: "list"
      formatting:
        field_colors:
          - type: "kind"
          - type: "generic"
        field_separators:
          - type: "kind"
    status_message:
      header: "Status:"
      paths:
        - path: "status#conditions"
          pathtype: "items"
          subpath: "message"
          when:
            - key: "type"
              eq: "Ready"
          default: ""
infoview:
  name: "Certificate Request Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["controller", "issuer", "certificate", "username", "uid",
                 "groups", "condition_ready", "status_message"]
    rows:
      certificate:
        header: [["Cer", ["main", "infoheader"]],
                 ["t", ["main", "infoheader_shortcut"]],
                 ["ificate:", ["main", "infoheader"]]]
        paths:
          - path: "metadata#ownerReferences"
            pathtype: "items"
            subpaths:
              - "name"
            when:
              - key: "kind"
                eq: "Certificate"
        formatter: "list"
        formatting:
          field_colors:
            - type: "generic"
      condition_ready:
        header: [["Ready:", ["main", "infoheader"]]]
        paths:
          - path: "status#conditions"
            pathtype: "items"
            subpath: "status"
            when:
              - key: "type"
                eq: "Ready"
            default: "<unknown>"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              "True":
                field_colors:
                  - context: "main"
                    type: "status_ok"
              "False":
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
              "<unknown>":
                field_colors:
                  - context: "main"
                    type: "status_unknown"
      controller:
        header: [["C", ["main", "infoheader_shortcut"]],
                 ["ontroller:", ["main", "infoheader"]]]
        paths:
          - path: "metadata#ownerReferences"
            pathtype: "items"
            subpaths:
              - "kind"
              - "apiVersion"
              - "name"
            when:
              - key: "controller"
                eq: true
            type: ["kind", "api_group", "name"]
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
      groups:
        header: [["Groups:", ["main", "infoheader"]]]
        paths:
          - path: ["spec#groups"]
            pathtype: "list"
        formatter: "list"
        formatting:
          field_colors:
            - type: "group"
      issuer:
        header: [["I", ["main", "infoheader_shortcut"]],
                 ["ssuer:", ["main", "infoheader"]]]
        paths:
          - path: [["spec#issuerRef#kind"], ["spec#issuerRef#name"]]
            pathtype: "tuple"
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "generic"
          item_separator:
            type: "kind"
      status_message:
        header: [["Status:", ["main", "infoheader"]]]
        paths:
          - path: "status#conditions"
            pathtype: "items"
            subpath: "message"
            when:
              - key: "type"
                eq: "Ready"
            default: ""
      uid:
        header: [["UID:", ["main", "infoheader"]]]
        path: "spec#uid"
        type: "str"
        formatter: "hex"
      username:
        header: [["Username:", ["main", "infoheader"]]]
        path: "spec#username"
        type: "str"
        formatting:
          field_colors:
            - type: "user"
  shortcuts:
    "Open controller":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for controller"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        namespace_path: "metadata#namespace"
        owner_reference_path: "metadata#ownerReferences"
    "Certificate":
      key: "t"
      read_only: true
      helptext: "Open info page for Certificate"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind: "Certificate"
        api_family: "cert-manager.io"
        namespace_path: "metadata#namespace"
        owner_reference_path: "metadata#ownerReferences"
    "Issuer":
      key: "i"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for Issuer"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind_path: "spec#issuerRef#kind"
        api_family: "cert-manager.io"
        name_path: "spec#issuerRef#name"
        namespace_path: "metadata#namespace"
