---
kind: "Agent"
api_family: "kagent.dev"
default_command: "agents.kagent.dev"
command:
  - "kagents"
  - "kagent"
listview:
  name: "Agents"
  group: "API & Extendability"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "type", "age", "description"]
      sortcolumn: "namespace"
  fields:
    description:
      header: "Description:"
      path: "spec#description"
      fallback_on_empty: true
      default: "<empty>"
      type: "str"
    type:
      header: "Type:"
      path: "spec#type"
      default: "<empty>"
      type: "str"
infoview:
  name: "Agent Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["description",
                 "allowed_namespaces_header",
                 "allowed_namespaces_from",
                 "allowed_namespaces_selector_header",
                 "allowed_namespaces_label_selector",
                 "allowed_namespaces_set_based_selector",
                 "sandbox_header",
                 "sandbox_network_header",
                 "sandbox_network_allowed_domains",
                 "skill_header",
                 "skill_insecure_skip_verify",
                 "skill_refs",
                 "model_config",
                 "type"]
    rows:
      allowed_namespaces_header:
        header: [["Allowed Namespaces:", ["main", "infoheader"]]]
      allowed_namespaces_from:
        header: [["  From:", ["main", "infoheader"]]]
        path: "spec#allowedNamespaces#from"
        default: "Same"
        type: "str"
      allowed_namespaces_label_selector:
        header: [["    La", ["main", "infoheader"]],
                 ["b", ["main", "infoheader_shortcut"]],
                 ["el Selector:", ["main", "infoheader"]]]
        paths:
          - path: ["spec#allowedNamespaces#selector#matchLabels"]
            pathtype: "key_value"
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "selector"
      allowed_namespaces_selector_header:
        header: [["  Selector:", ["main", "infoheader"]]]
      allowed_namespaces_set_based_selector:
        header: [["    Set-based Selector:", ["main", "infoheader"]]]
        paths:
          - path: "spec#allowedNamespaces#selector#matchExpressions"
            pathtype: "match_expression"
            default: "<none>"
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "operator"
            - type: "value"
          field_separators:
            - type: "space"
            - type: "no_pad"
      description:
        header: [["Description:", ["main", "infoheader"]]]
        path: "spec#description"
        fallback_on_empty: true
        default: "<empty>"
        type: "str"
      model_config:
        header: [["Model ", ["main", "infoheader"]],
                 ["C", ["main", "infoheader_shortcut"]],
                 ["onfig:", ["main", "infoheader"]]]
        path: "spec#declarative#modelConfig"
        fallback_on_empty: true
        default: "<unset>"
        type: "str"
      sandbox_header:
        header: [["Sandbox:", ["main", "infoheader"]]]
      sandbox_network_header:
        header: [["  Network:", ["main", "infoheader"]]]
      sandbox_network_allowed_domains:
        header: [["    Allowed ", ["main", "infoheader"]],
                 ["D", ["main", "infoheader_shortcut"]],
                 ["omains:", ["main", "infoheader"]]]
        path: "spec#sandbox#network#allowedDomains"
        default: ["<none>"]
        type: "raw"
        formatter: "list"
      skill_header:
        header: [["Skill:", ["main", "infoheader"]]]
      skill_insecure_skip_verify:
        header: [["  Insecure Skip Verify:", ["main", "infoheader"]]]
        path: "spec#skills#insecureSkipVerify"
        default: false
        type: "bool"
      skill_refs:
        header: [["  Re", ["main", "infoheader"]],
                 ["f", ["main", "infoheader_shortcut"]],
                 ["s:", ["main", "infoheader"]]]
        path: "spec#skills#refs"
        default: ["<none>"]
        type: "raw"
        formatter: "list"
      type:
        header: [["Type:", ["main", "infoheader"]]]
        path: "spec#type"
        default: "<empty>"
        type: "str"
  logpad:
    infogetter: "logpad_formatted"
    infogetter_args:
      paths:
        - path: "spec#declarative"
        - path: "spec#byo"
      formatter: "format_yaml"
    timestamps: false
  shortcuts:
    "Allowed Namespaces Label Selector":
      key: "b"
      read_only: true
      helptext: "Show allowed Namespaces label selector"
      widget: "windowwidget"
      widget_args:
        title: "Allowed Namespaces Label Selector:"
        headers: ["Key:", "Value:"]
        itemgetter: "get_key_value"
        itemgetter_args:
          path: "spec#allowedNamespaces#selector#matchLabels"
    "List Allowed Domains":
      key: "d"
      modifier: "shift"
      read_only: true
      helptext: "List allowed domains"
      widget: "windowwidget"
      widget_args:
        title: "Allowed Domains:"
        itemgetter: "get_list_as_list"
        itemgetter_args:
          path: "spec#sandbox#network#allowedDomains"
        # Not supported for now
        sortcolumn: "domains"
    "List References":
      key: "f"
      read_only: true
      helptext: "List references"
      widget: "windowwidget"
      widget_args:
        title: "References:"
        itemgetter: "get_list_as_list"
        itemgetter_args:
          path: "spec#skills#refs"
        # Not supported for now
        sortcolumn: "reference"
    "Open Model Config":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for Model Config"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind: "ModelConfig"
        name_path: "spec#declarative#modelConfig"
        namespace_path: "metadata#namespace"
