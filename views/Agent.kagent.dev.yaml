---
kind: "Agent"
api_family: "kagent.dev"
default_command: "agent.kagent.dev"
command:
  - "kagents"
  - "kagent"
listview:
  name: "Agents"
  group: "API & Extendability"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "type", "age", "description"]
  fields:
    description:
      header: "Description:"
      path: "spec#description"
      default: "<empty>"
      type: "str"
    type:
      header: "Type:"
      path: "spec#type"
      default: "<empty>"
      type: "str"
infoview:
  name: "Agent Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["description", "type"]
    rows:
      description:
        header: [["Description:", ["main", "infoheader"]]]
        path: "spec#description"
        default: "<empty>"
        type: "str"
      type:
        header: [["Type:", ["main", "infoheader"]]]
        path: "spec#type"
        default: "<empty>"
        type: "str"
  logpad:
    infogetter: "logpad_formatted"
    infogetter_args:
      paths:
        - path: "spec#declarative"
        - path: "spec#byo"
      formatter: "format_yaml"
    timestamps: false
  shortcuts:
    "Show tools":
      key: "t"
      read_only: true
      helptext: "List tools"
      widget: "windowwidget"
      title: "Tools:"
      headers: ["Provider:", "Description:"]
      itemgetter: "get_list_fields"
      itemgetter_args:
        path: "spec#tools"
        fields:
          - "provider"
          - "description"
      # Not supported for now
      sortcolumn: "provider"
