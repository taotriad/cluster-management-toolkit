---
kind: "Stage"
api_family: "kargo.akuity.io"
default_command: "stages"
command:
  - "kargostages"
  - "kargostage"
listview:
  name: "Stages"
  group: "CI / CD"
  field_indexes:
    Wide:
      fields: ["namespace", "name", "current_freight",
               "health", "ready", "phase", "age", "message"]
      sortcolumn: "namespace"
    Normal:
      fields: ["namespace", "name", "current_freight", "health", "phase", "age"]
      sortcolumn: "namespace"
  fields:
    current_freight:
      header: "Current Freight:"
      path: "status#freightSummary"
      type: "str"
    health:
      header: "Health:"
      path: "status#health#status"
      default: "<unset>"
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            Healthy:
              field_colors:
                - context: "main"
                  type: "status_ok"
            Pending:
              field_colors:
                - context: "main"
                  type: "status_pending"
            Unhealthy:
              field_colors:
                - context: "main"
                  type: "status_not_ok"
            Unknown:
              field_colors:
                - context: "main"
                  type: "status_unknown"
            "<unset>":
              field_colors:
                - context: "types"
                  type: "unset"
    message:
      header: "Message:"
      paths:
        - path: "status#conditions"
          pathtype: "items"
          subpath: "message"
          when:
            - key: "type"
              eq: "Ready"
    phase:
      header: "Phase:"
      path: "status#currentPromotion#status#phase"
      default: "<unset>"
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            Aborted:
              field_colors:
                - context: "main"
                  type: "status_done"
            Error:
              field_colors:
                - context: "main"
                  type: "status_not_ok"
            Failed:
              field_colors:
                - context: "main"
                  type: "status_not_ok"
            Inconclusive:
              field_colors:
                - context: "main"
                  type: "status_warning"
            NotApplicable:
              field_colors:
                - context: "main"
                  type: "status_pending"
            Pending:
              field_colors:
                - context: "main"
                  type: "status_pending"
            Promoting:
              field_colors:
                - context: "main"
                  type: "status_pending"
            Running:
              field_colors:
                - context: "main"
                  type: "status_ok"
            Steady:
              field_colors:
                - context: "main"
                  type: "status_ok"
            Successful:
              field_colors:
                - context: "main"
                  type: "status_ok"
            Verifying:
              field_colors:
                - context: "main"
                  type: "status_pending"
            "<unset>":
              field_colors:
                - context: "types"
                  type: "unset"
    ready:
      header: "Ready:"
      paths:
        - path: "status#conditions"
          pathtype: "items"
          subpath: "status"
          when:
            - key: "type"
              eq: "Ready"
          default: ["<unset>"]
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            "True":
              field_colors:
                - context: "main"
                  type: "status_ok"
            "False":
              field_colors:
                - context: "main"
                  type: "status_not_ok"
            "<unset>":
              field_colors:
                - context: "types"
                  type: "unset"
infoview:
  name: "Stage Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["health", "phase", "message", "ready"]
    rows:
      current_freight:
        header: [["Current Freight:", ["main", "infoheader"]]]
        path: "status#freightSummary"
        type: "str"
      health:
        header: [["Health:", ["main", "infoheader"]]]
        path: "status#health#status"
        default: "<unset>"
        type: "str"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              Healthy:
                field_colors:
                  - context: "main"
                    type: "status_ok"
              Pending:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              Unhealthy:
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
              Unknown:
                field_colors:
                  - context: "main"
                    type: "status_unknown"
              "<unset>":
                field_colors:
                  - context: "types"
                    type: "unset"
      message:
        header: [["Message:", ["main", "infoheader"]]]
        paths:
          - path: "status#conditions"
            pathtype: "items"
            subpath: "message"
            when:
              - key: "type"
                eq: "Ready"
      phase:
        header: [["Phase:", ["main", "infoheader"]]]
        path: "status#currentPromotion#status#phase"
        default: "<unset>"
        type: "str"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              Aborted:
                field_colors:
                  - context: "main"
                    type: "status_done"
              Error:
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
              Failed:
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
              Inconclusive:
                field_colors:
                  - context: "main"
                    type: "status_warning"
              NotApplicable:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              Pending:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              Promoting:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              Running:
                field_colors:
                  - context: "main"
                    type: "status_ok"
              Steady:
                field_colors:
                  - context: "main"
                    type: "status_ok"
              Successful:
                field_colors:
                  - context: "main"
                    type: "status_ok"
              Verifying:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              "<unset>":
                field_colors:
                  - context: "types"
                    type: "unset"
      ready:
        header: [["Ready:", ["main", "infoheader"]]]
        paths:
          - path: "status#conditions"
            pathtype: "items"
            subpath: "status"
            when:
              - key: "type"
                eq: "Ready"
            default: ["<unset>"]
        type: "str"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              "True":
                field_colors:
                  - context: "main"
                    type: "status_ok"
              "False":
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
              "<unset>":
                field_colors:
                  - context: "types"
                    type: "unset"
  listpad:
    listgetter: "listgetter_path"
    listgetter_args:
      path: "spec#requestedFreight"
    infogetter: "generic_infogetter"
    infogetter_args:
      _extra_data:
        namespace: ["metadata#namespace"]
    on_activation:
      call: "resourceinfodispatch_with_lookup"
      kind_path: "origin#kind"
      api_family: "kargo.akuity.io"
      name_path: "origin#name"
      namespace_path: "_extra_data#namespace"
    field_indexes:
      Normal:
        fields: ["requested_freight", "stages", "direct"]
        sortcolumn: "requested_freight"
    fields:
      direct:
        header: "Direct:"
        path: "sources#direct"
        default: "False"
        type: "str"
      requested_freight:
        header: "Requested Freight:"
        paths:
          - path: [["origin#kind"], ["origin#name"]]
            pathtype: "tuple"
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "generic"
          field_separators:
            - type: "kind"
      stages:
        header: "Stages:"
        path: "sources#stages"
        default: ["<none>"]
        type: "raw"
        formatter: "list"
  shortcuts:
    "Promotion Mechanisms":
      key: "p"
      modifier: "shift"
      helptext: "Show promotion mechanisms"
      read_only: true
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "Promotion Mechanisms"
        _pass_obj: true
        path: "spec#promotionMechanisms"
    "View Promotion Template":
      key: "t"
      read_only: true
      helptext: "Show Promotion Template"
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "Promotion Template"
        _named_title: true
        _pass_obj: true
        path: "spec#promotionTemplate"
