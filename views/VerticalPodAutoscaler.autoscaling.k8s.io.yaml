---
kind: "VerticalPodAutoscaler"
api_family: "autoscaling.k8s.io"
default_command: "verticalpodautoscalers"
command:
  - "vpa"
listview:
  name: "Vertical Pod Autoscalers"
  group: "Scheduling & Scaling"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "update_mode", "provided", "age"]
      sortcolumn: "namespace"
  fields:
    provided:
      header: "Provided:"
      paths:
        - path: "status#conditions"
          pathtype: "items"
          subpath: "status"
          when:
            - key: "type"
              eq: "RecommendationProvided"
          default: ["<unknown>"]
      type: "str"
    update_mode:
      header: "Update Mode:"
      path: "spec#updatePolicy#updateMode"
      default: "Auto"
      type: "str"
  actions:
    actionlist:
      "Delete resource":
        description: "Delete resource"
        category: "Resource Level"
        confirm: true
        actionfunc: "delete_resource"
infoview:
  name: "Vertical Pod Autoscaler Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["target_reference", "update_mode", "provided"]
    rows:
      provided:
        header: [["Provided:", ["main", "infoheader"]]]
        paths:
          - path: "status#conditions"
            subpath: "status"
            pathtype: "items"
            when:
              - key: "type"
                eq: "RecommendationProvided"
            default: ["<unknown>"]
        type: "str"
      target_reference:
        header: [["Target ", ["main", "infoheader"]],
                 ["R", ["main", "infoheader_shortcut"]],
                 ["eference:", ["main", "infoheader"]]]
        paths:
          - path: [["spec#targetRef#kind"],
                   ["spec#targetRef#apiVersion"],
                   ["spec#targetRef#name"]]
            pathtype: "tuple"
            type: ["kind", "api_group", "name"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
      update_mode:
        header: [["Update Mode:", ["main", "infoheader"]]]
        path: "spec#updatePolicy#updateMode"
        default: "Auto"
        type: "str"
  listpad:
    listgetter: "listgetter_path"
    listgetter_args:
      paths:
        - key_name: "type"
          key_value: "Policy"
          type: "list"
          path: "spec#resourcePolicy#containerPolicies"
        - key_name: "type"
          key_value: "Recommendation"
          type: "list"
          path: "status#recommendation#containerRecommendations"
    infogetter: "generic_infogetter"
    field_indexes:
      Normal:
        fields: ["type", "container_name", "controlled_resources",
                 "min_allowed", "max_allowed", "target", "lower_bound",
                 "upper_bound", "uncapped_target"]
        sortcolumn: "container_name"
    fields:
      container_name:
        header: "Name:"
        path: "containerName"
        type: "str"
      controlled_resources:
        header: "Resources:"
        path: "controlledResources"
        default: ["<unset>"]
        type: "raw"
        formatter: "list"
      lower_bound:
        header: "Lower Bound:"
        paths:
          - path: ["lowerBound"]
            pathtype: "key_value"
            default: ["<unset>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "keyvalue"
      max_allowed:
        header: "Max:"
        paths:
          - path: "maxAllowed"
            pathtype: "key_value"
            default: ["<unset>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "keyvalue"
      min_allowed:
        header: "Min:"
        paths:
          - path: "minAllowed"
            pathtype: "key_value"
            default: ["<unset>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "keyvalue"
      target:
        header: "Target:"
        paths:
          - path: ["target"]
            pathtype: "key_value"
            default: ["<unset>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "keyvalue"
      type:
        header: "Type:"
        path: "type"
        type: "str"
      uncapped_target:
        header: "Uncapped Target:"
        paths:
          - path: ["uncappedTarget"]
            pathtype: "key_value"
            default: ["<unset>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "keyvalue"
      upper_bound:
        header: "Upper Bound:"
        paths:
          - path: ["upperBound"]
            pathtype: "key_value"
            default: ["<unset>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "keyvalue"
  shortcuts:
    "Container Recommendations":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "List container recommendations"
      widget: "windowwidget"
      title: "Container Recommendations:"
      headers: ["Name:", "Mem Low:", "Mem High:", "Mem Target:",
                "Mem Uncapped:", "CPU Low:", "CPU High:",
                "CPU Target:", "CPU Uncapped:"]
      itemgetter: "get_list_fields"
      itemgetter_args:
        path: "status#recommendation#containerRecommendations"
        fields:
          - "containerName"
          - "lowerBound#memory"
          - "upperBound#memory"
          - "target#memory"
          - "uncappedTarget#memory"
          - "lowerBound#cpu"
          - "upperBound#cpu"
          - "target#cpu"
          - "uncappedTarget#cpu"
      # Not supported for now
      sortcolumn: "cidr"
    "Open target reference":
      key: "r"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for target reference"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind_path: "spec#targetRef#kind"
        api_version_path: "spec#targetRef#apiVersion"
        name_path: "spec#targetRef#name"
        namespace_path: "metadata#namespace"
