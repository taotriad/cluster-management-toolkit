---
kind: "ImageStream"
api_family: "image.openshift.io"
default_command: "imagestreams.image.openshift.io"
command:
  - "imagestream.image.openshift.io"
  - "imagestreams.openshift"
  - "imagestream.openshift"
  - "osimagestreams"
  - "osimagestream"
  - "osimgstreams"
  - "osimgstream"
listview:
  name: "Image Streams"
  group: "OpenShift"
  field_indexes:
    Wide:
      fields: ["namespace", "name", "controller",
               "public_image_repository", "tags", "age"]
      sortcolumn: "namespace"
    Normal:
      fields: ["namespace", "name", "age"]
      sortcolumn: "namespace"
  fields:
    controller:
      header: "Controller:"
      paths:
        - path: "metadata#ownerReferences"
          pathtype: "items"
          subpaths:
            - "kind"
            - "apiVersion"
            - "name"
          when:
            - key: "controller"
              eq: true
          type: ["kind", "api_group", "name"]
          default: ["<none>"]
      formatter: "list"
      formatting:
        field_colors:
          - type: "kind"
          - type: "api_group"
          - type: "generic"
        field_separators:
          - type: "kind_api_group"
          - type: "kind"
    public_image_repository:
      header: "Public Image Repository:"
      path: "status#publicDockerImageRepository"
      type: "str"
    tags:
      header: "Tags:"
      paths:
        - path: "status#tags"
          pathtype: "items"
          subpaths:
            - "tag"
          default: ["<none>"]
      type: "raw"
      formatter: "list"
      formatting:
        field_colors:
          - type: "version"
infoview:
  name: "Image Stream Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["controller", "lookup_policy", "tags",
                 "public_image_repository", "image_repository"]
    rows:
      controller:
        header: [["C", ["main", "infoheader_shortcut"]],
                 ["ontroller:", ["main", "infoheader"]]]
        paths:
          - path: "metadata#ownerReferences"
            pathtype: "items"
            subpaths:
              - "kind"
              - "apiVersion"
              - "name"
            when:
              - key: "controller"
                eq: true
            type: ["kind", "api_group", "name"]
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
      image_repository:
        header: [["Docker Image Repository:", ["main", "infoheader"]]]
        path: "status#dockerImageRepository"
        default: "<unset>"
        type: "str"
      lookup_policy:
        header: [["Lookup Policy:", ["main", "infoheader"]]]
        path: "spec#lookupPolicy#local"
        default: "<unset>"
        type: "bool"
      public_image_repository:
        header: [["Public Docker Image Repository:", ["main", "infoheader"]]]
        path: "status#publicDockerImageRepository"
        default: "<unset>"
        type: "str"
      tags:
        header: [["Tags:", ["main", "infoheader"]]]
        paths:
          - path: "status#tags"
            pathtype: "items"
            subpaths:
              - "tag"
            default: ["<none>"]
        type: "raw"
        formatter: "list"
        formatting:
          field_colors:
            - type: "version"
  listpad:
    listgetter: "listgetter_path"
    listgetter_args:
      path: "spec#tags"
    infogetter: "generic_infogetter"
    on_activation:
      call: "resourceinfodispatch"
      kind: "__ImageStreamSub"
      api_family: "image.openshift.io"
    field_indexes:
      Normal:
        fields: ["kind", "image_name", "import_mode", "scheduled",
                 "tag", "reference_policy", "generation"]
        sortcolumn: "name"
    fields:
      image_name:
        header: "Name:"
        path: "from#name"
        type: "str"
      generation:
        header: "Generation:"
        path: "generation"
        type: "int"
        formatter: "numerical"
        align: "right"
      kind:
        header: "Kind:"
        path: "from#kind"
        type: "str"
        formatting:
          field_colors:
            - type: "kind"
      import_mode:
        header: "Import Mode:"
        path: "importPolicy#importMode"
        type: "str"
      reference_policy:
        header: "Reference Policy:"
        path: "referencePolicy#type"
        type: "str"
      scheduled:
        header: "Scheduled:"
        path: "importPolicy#scheduled"
        default: "<unset>"
        type: "bool"
      tag:
        header: "Tag:"
        path: "name"
        type: "str"
        formatting:
          field_colors:
            - type: "version"
  shortcuts:
    "Open controller":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for controller"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        namespace_path: "metadata#namespace"
        owner_reference_path: "metadata#ownerReferences"
