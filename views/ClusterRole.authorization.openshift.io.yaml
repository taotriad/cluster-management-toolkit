---
kind: "ClusterRole"
api_family: "authorization.openshift.io"
default_command: "clusterroles.authorization.openshift.io"
command:
  - "clusterrole.authorization.openshift.io"
  - "clrroles.openshift"
  - "clrrole.openshift"
  - "clr.openshift"
  - "osclusterroles"
  - "osclusterrole"
  - "osclrroles"
  - "osclrrole"
  - "osclr"
listview:
  name: "Cluster Roles"
  group: "Authorization & Access Control"
  field_indexes:
    Normal:
      fields: ["name", "controller", "rules", "age"]
  fields:
    controller:
      header: "Controller:"
      paths:
        - path: "metadata#ownerReferences"
          pathtype: "items"
          subpaths:
            - "kind"
            - "apiVersion"
            - "name"
          when:
            - key: "controller"
              eq: true
          type: ["kind", "api_group", "name"]
          default: ["<none>"]
      formatter: "list"
      formatting:
        field_colors:
          - type: "kind"
          - type: "api_group"
          - type: "generic"
        field_separators:
          - type: "kind_api_group"
          - type: "kind"
    rules:
      header: "Rules:"
      path: "rules"
      type: "len"
      formatter: "numerical"
      align: "right"
  actions:
    actionlist:
      "Delete resource":
        description: "Delete resource"
        category: "Resource Level"
        confirm: true
        actionfunc: "delete_resource"
infoview:
  name: "Cluster Role Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["controller",
                 "aggregation_rule_header",
                 "aggregation_rule_cluster_role_label_selector"]
    rows:
      aggregation_rule_header:
        header: [["Aggregation Rule:", ["main", "infoheader"]]]
      aggregation_rule_cluster_role_label_selector:
        header: [["  Cluster Role La", ["main", "infoheader"]],
                 ["b", ["main", "infoheader_shortcut"]],
                 ["el Selector:", ["main", "infoheader"]]]
        paths:
          - path: ["aggregationRule#clusterRoleSelectors"]
            pathtype: "selectors"
            default: ["<none>"]
        formatter: "list"
      controller:
        header: [["C", ["main", "infoheader_shortcut"]],
                 ["ontroller:", ["main", "infoheader"]]]
        paths:
          - path: "metadata#ownerReferences"
            pathtype: "items"
            subpaths:
              - "kind"
              - "apiVersion"
              - "name"
            when:
              - key: "controller"
                eq: true
            type: ["kind", "api_group", "name"]
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
  listpad:
    listgetter: "listgetter_policy_rules"
    infogetter: "generic_infogetter"
    field_indexes:
      Wide:
        fields: ["resource", "api_group",
                 "verbs_all", "verbs_get", "verbs_list",
                 "verbs_watch", "verbs_create", "verbs_update",
                 "verbs_patch", "verbs_delete", "verbs_misc",
                 "non_resource_urls", "resource_names"]
        sortcolumn: "api_group"
      Normal:
        fields: ["resource", "api_group", "verbs",
                 "non_resource_urls", "resource_names"]
        sortcolumn: "api_group"
    fields:
      api_group:
        header: "API-Group:"
        path: "api_group"
        type: "str"
      non_resource_urls:
        header: "Non-Resource URLs:"
        path: "non_resource_urls"
        type: "raw"
        formatter: "list"
      resource:
        header: "Resource:"
        path: "resource"
        type: "str"
      resource_names:
        header: "Resource Names:"
        path: "resource_names"
        type: "raw"
        formatter: "list"
      verbs:
        header: "Verbs:"
        path: "verbs"
        type: "raw"
        formatter: "list"
      verbs_all:
        header: "All:"
        path: "verbs_all"
        type: "bool"
        formatter: "value_mapper"
        formatting:
          mapping:
            substitutions:
              "True":
                context: "strings"
                type: "positive_check"
              "False":
                context: "strings"
                type: "negative_ballot"
      verbs_create:
        header: "Create:"
        path: "verbs_create"
        type: "bool"
        formatter: "value_mapper"
        formatting:
          mapping:
            substitutions:
              "True":
                context: "strings"
                type: "positive_check"
              "False":
                context: "strings"
                type: "negative_ballot"
      verbs_delete:
        header: "Delete:"
        path: "verbs_delete"
        type: "bool"
        formatter: "value_mapper"
        formatting:
          mapping:
            substitutions:
              "True":
                context: "strings"
                type: "positive_check"
              "False":
                context: "strings"
                type: "negative_ballot"
      verbs_get:
        header: "Get:"
        path: "verbs_get"
        type: "bool"
        formatter: "value_mapper"
        formatting:
          mapping:
            substitutions:
              "True":
                context: "strings"
                type: "positive_check"
              "False":
                context: "strings"
                type: "negative_ballot"
      verbs_list:
        header: "List:"
        path: "verbs_list"
        type: "bool"
        formatter: "value_mapper"
        formatting:
          mapping:
            substitutions:
              "True":
                context: "strings"
                type: "positive_check"
              "False":
                context: "strings"
                type: "negative_ballot"
      verbs_misc:
        header: "Other:"
        path: "verbs_misc"
        type: "raw"
        formatter: "list"
      verbs_patch:
        header: "Patch:"
        path: "verbs_patch"
        type: "bool"
        formatter: "value_mapper"
        formatting:
          mapping:
            substitutions:
              "True":
                context: "strings"
                type: "positive_check"
              "False":
                context: "strings"
                type: "negative_ballot"
      verbs_update:
        header: "Update:"
        path: "verbs_update"
        type: "bool"
        formatter: "value_mapper"
        formatting:
          mapping:
            substitutions:
              "True":
                context: "strings"
                type: "positive_check"
              "False":
                context: "strings"
                type: "negative_ballot"
      verbs_watch:
        header: "Watch:"
        path: "verbs_watch"
        type: "bool"
        formatter: "value_mapper"
        formatting:
          mapping:
            substitutions:
              "True":
                context: "strings"
                type: "positive_check"
              "False":
                context: "strings"
                type: "negative_ballot"
  shortcuts:
    "Open controller":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for controller"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        namespace_path: "metadata#namespace"
        owner_reference_path: "metadata#ownerReferences"
