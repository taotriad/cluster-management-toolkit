---
kind: "ResourceClaimTemplate"
api_family: "resource.k8s.io"
default_command: "resourceclaimtemplates"
command:
  - "resclaimtemplates"
  - "resclaimtemplate"
  - "resclaimtmpls"
  - "resclaimtmpl"
listview:
  name: "Resource Claim Templates"
  group: "Dynamic Resource Allocation"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "requests", "age"]
      sortcolumn: "namespace"
  fields:
    requests:
      header: "Requests:"
      path: "spec#spec#devices#requests"
      type: "len"
      formatter: "numerical"
      align: "right"
infoview:
  name: "Resource Claim Template Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["device_requests"]
    rows:
      device_requests:
        header: [["Device Re", ["main", "infoheader"]],
                 ["q", ["main", "infoheader_shortcut"]],
                 ["uests:", ["main", "infoheader"]]]
        paths:
          - path: "spec#spec#devices#requests"
            pathtype: "items"
            subpaths:
              - "name"
        default: "<none>"
        formatter: "list"
  shortcuts:
    "Show device requests":
      key: "q"
      read_only: true
      helptext: "Show device requests"
      widget: "windowwidget"
      title: "Device requests:"
      headers: ["Name:", "Device Class:", "Allocation Mode:", "Count:"]
      selectable: true
      itemgetter: "get_list_fields"
      itemgetter_args:
        path: "spec#spec#devices#requests"
        pass_ref: true
        fields:
          - "name"
          - "exactly#deviceClassName"
          - "exactly#allocationMode"
          - "exactly#count"
      # Not supported for now
      sortcolumn: "name"
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "Device requests"
        _named_title: true
        _name_path: "name"
        _pass_selected_obj: true
