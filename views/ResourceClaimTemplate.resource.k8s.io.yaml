---
kind: "ResourceClaimTemplate"
api_family: "resource.k8s.io"
default_command: "resourceclaimtemplates"
command:
  - "resclaimtemplates"
  - "resclaimtemplate"
  - "resclaimtmpls"
  - "resclaimtmpl"
listview:
  name: "Resource Claim Templates"
  group: "Dynamic Resource Allocation"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "requests", "age"]
      sortcolumn: "namespace"
  fields:
    requests:
      header: "Requests:"
      path: "spec#spec#devices#requests"
      type: "len"
      formatter: "numerical"
      align: "right"
infoview:
  name: "Resource Claim Template Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["device_requests"]
    rows:
      device_requests:
        header: [["Device Re", ["main", "infoheader"]],
                 ["q", ["main", "infoheader_shortcut"]],
                 ["uests:", ["main", "infoheader"]]]
        paths:
          - path: "spec#spec#devices#requests"
            pathtype: "items"
            subpaths:
              - "name"
        default: "<none>"
        formatter: "list"
  listpad:
    listgetter: "listgetter_path"
    listgetter_args:
      path: "spec#spec#devices#requests"
    infogetter: "generic_infogetter"
    field_indexes:
      Normal:
        fields: ["name", "device_class", "allocation_mode",
                 "admin_access", "count", "selectors"]
    fields:
      admin_access:
        header: "Admin Access:"
        path: "exactly#adminAccess"
        default: false
        type: "bool"
      allocation_mode:
        header: "Allocation Mode:"
        path: "exactly#allocationMode"
        default: "<unset>"
        type: "str"
      count:
        header: "Count:"
        path: "exactly#deviceClassName"
        default: "<unset>"
        type: "str"
      device_class:
        header: "Device Class:"
        path: "exactly#count"
        default: "<unset>"
        type: "int"
        formatter: "numerical"
        align: "right"
      name:
        header: "Name:"
        path: "name"
        default: "<unset>"
        type: "str"
      selectors:
        header: "Selectors:"
        paths:
          - path: ["exactly#selectors"]
            pathtype: "selectors"
            default: "<none>"
        type: "str"
