---
kind: "ResourceClaimTemplate"
api_family: "resource.k8s.io"
default_command: "resourceclaimtemplates"
command:
  - "resclaimtemplates"
  - "resclaimtemplate"
  - "resclaimtmpls"
  - "resclaimtmpl"
listview:
  name: "Resource Claim Templates"
  group: "Dynamic Resource Allocation"
  field_indexes:
    Wide:
      fields: ["namespace", "name", "requests", "age"]
      sortcolumn: "namespace"
    Normal:
      fields: ["namespace", "name", "requests_count", "age"]
      sortcolumn: "namespace"
  fields:
    requests:
      header: "Requests:"
      paths:
        - path: "spec#spec#devices#requests"
          pathtype: "items"
          subpaths:
            - "name"
          default: ["<none>"]
      formatter: "list"
    requests_count:
      header: "Requests:"
      path: "spec#spec#devices#requests"
      type: "len"
      formatter: "numerical"
      align: "right"
infoview:
  name: "Resource Claim Template Info"
  infopad:
  listpad:
    listgetter: "listgetter_path"
    listgetter_args:
      path: "spec#spec#devices#requests"
    infogetter: "generic_infogetter"
    field_indexes:
      Normal:
        fields: ["name", "device_class", "allocation_mode",
                 "admin_access", "count", "selectors", "tolerations"]
    fields:
      admin_access:
        header: "Admin Access:"
        paths:
          - path: ["exactly#adminAcccess", null]
        default: false
        type: "bool"
      allocation_mode:
        header: "Allocation Mode:"
        paths:
          - path: ["exactly#allocationMode", "firstAvailable#allocationMode"]
            pathtype: "value"
        default: "<unset>"
        type: "str"
      count:
        header: "Count:"
        paths:
          - path: ["exactly#count", "firstAvailable#count"]
            pathtype: "value"
        default: "<unset>"
        type: "int"
        formatter: "numerical"
        align: "right"
      device_class:
        header: "Device Class:"
        paths:
          - path: ["exactly#deviceClassName", "firstAvailable#deviceClassName"]
            pathtype: "value"
        default: "<unset>"
        type: "str"
      name:
        header: "Name:"
        path: "name"
        default: "<unset>"
        type: "str"
      selectors:
        header: "Selectors:"
        paths:
          - path: ["exactly#tolerations", "firstAvailable#selectors"]
            pathtype: "selectors"
            default: "<none>"
        type: "str"
      tolerations:
        header: "Tolerations:"
        paths:
          - path: ["exactly#tolerations", "firstAvailable#tolerations"]
            pathtype: "toleration"
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "operator"
            - type: "value"
            - type: "effect"
            - type: "timeout"
          field_separators:
            - type: "space"
            - type: "no_pad"
            - type: "keyvalue"
            - type: "timeout"
          field_formatters:
            - ""
            - ""
            - ""
            - ""
            - "numerical_with_units"
