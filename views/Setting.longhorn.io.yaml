---
kind: "Setting"
api_family: "longhorn.io"
default_command: "settings.longhorn.io"
command:
  - "lhsettings"
  - "lhsetting"
listview:
  name: "Settings"
  group: "Storage & Backups"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "applied", "age", "value"]
  fields:
    applied:
      header: "Applied:"
      path: "status#applied"
      default: "<unset>"
      type: "bool"
    value:
      header: "Value:"
      path: "value"
      fallback_on_empty: true
      default: "<empty>"
      type: "str"
      formatter: "list"
      formatting:
        field_prefixes:
          -
            - type: "quote"
        field_suffixes:
          -
            - type: "quote"
  actions:
    actionlist:
      "Delete resource":
        description: "Delete resource"
        category: "Resource Level"
        confirm: true
        actionfunc: "delete_resource"
infoview:
  name: "Setting Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["applied"]
    rows:
      applied:
        header: [["Applied:", ["main", "infoheader"]]]
        path: "status#applied"
        default: "<unset>"
        type: "bool"
  logpad:
    infogetter: "logpad_msg_getter"
    infogetter_args:
      path: "value"
    timestamps: false
