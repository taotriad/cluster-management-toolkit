---
kind: "Storage"
api_family: "operator.openshift.io"
default_command: "storages.operator.openshift.io"
command:
  - "storages.operator"
  - "storage.operator"
  - "storages"
  - "storage"
listview:
  name: "Storages"
  group: "OpenShift"
  field_indexes:
    Normal:
      fields: ["name", "age"]
infoview:
  name: "Storage Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["loglevel", "operator_loglevel",
                 "management_state", "version"]
    rows:
      loglevel:
        header: [["Loglevel:", ["main", "infoheader"]]]
        path: "spec#logLevel"
        type: "str"
      management_state:
        header: [["Management State:", ["main", "infoheader"]]]
        path: "spec#managementState"
        type: "str"
      operator_loglevel:
        header: [["Operator Loglevel:", ["main", "infoheader"]]]
        path: "spec#operatorLogLevel"
        type: "str"
      version:
        header: [["Version:", ["main", "infoheader"]]]
        path: "status#version"
        type: "raw"
        formatting:
          field_colors:
            - type: "version"
  shortcuts:
    "View observed configuration":
      key: "o"
      read_only: true
      helptext: "Show observed configuration"
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "Observed Configuration"
        _pass_obj: true
        path: "spec#observedConfig"
