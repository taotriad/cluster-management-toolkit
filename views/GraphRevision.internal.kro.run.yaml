---
kind: "GraphRevision"
api_family: "internal.kro.run"
default_command: "graphrevisions"
command:
  - "graphrevs"
  - "graphrev"
listview:
  name: "Graph Revisions"
  group: "API & Extendability"
  field_indexes:
    Wide:
      fields: ["name", "rgd", "revision", "hash", "ready", "age",
               "topological_order"]
    Normal:
      fields: ["name", "rgd", "revision", "ready", "age"]
  fields:
    hash:
      header: "Hash:"
      path: "metadata#labels#kro.run/graph-revision-hash"
      default: "<unset>"
      type: "str"
      formatter: "hex"
    ready:
      header: "Ready:"
      paths:
        - path: "status#conditions"
          pathtype: "items"
          subpath: "status"
          when:
            - key: "type"
              eq: "Ready"
          default: "<unknown>"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            "True":
              field_colors:
                - context: "main"
                  type: "status_ok"
            "False":
              field_colors:
                - context: "main"
                  type: "status_not_ok"
            "<unknown>":
              field_colors:
                - context: "main"
                  type: "status_unknown"
    revision:
      header: "Revision:"
      path: "spec#revision"
      default: "<unset>"
      type: "int"
      formatter: "numerical"
      align: "right"
    rgd:
      header: "RGD:"
      path: "spec#snapshot#name"
      default: "<unset>"
      type: "str"
    topological_order:
      header: "Topological Order:"
      path: "status#topologicalOrder"
      default: ["<none>"]
      type: "raw"
      formatter: "list"
infoview:
  name: "Resource Graph Definition Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["rgd", "hash", "topological_order", "revision", "ready"]
    rows:
      hash:
        header: [["Hash:", ["main", "infoheader"]]]
        path: "metadata#labels#kro.run/graph-revision-hash"
        default: "<unset>"
        type: "str"
        formatter: "hex"
      ready:
        header: [["Ready:", ["main", "infoheader"]]]
        paths:
          - path: "status#conditions"
            pathtype: "items"
            subpath: "status"
            when:
              - key: "type"
                eq: "Ready"
            default: "<unknown>"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              "True":
                field_colors:
                  - context: "main"
                    type: "status_ok"
              "False":
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
              "<unknown>":
                field_colors:
                  - context: "main"
                    type: "status_unknown"
      revision:
        header: [["Revision:", ["main", "infoheader"]]]
        path: "spec#revision"
        default: "<unset>"
        type: "int"
        formatter: "numerical"
      rgd:
        header: [["Resource Graph Definition:", ["main", "infoheader"]]]
        path: "spec#snapshot#name"
        default: "<unset>"
        type: "str"
      topological_order:
        header: [["T", ["main", "infoheader_shortcut"]],
                 ["opological Order:", ["main", "infoheader"]]]
        path: "status#topologicalOrder"
        default: ["<none>"]
        type: "raw"
        formatter: "list"
  shortcuts:
    "Show Topological Order":
      key: "t"
      modifier: "shift"
      read_only: true
      helptext: "Show topological order"
      widget: "windowwidget"
      widget_args:
        title: "Topological Order:"
        itemgetter: "get_list_as_list"
        itemgetter_args:
          path: "status#topologicalOrder"
