---
kind: "ClusterOperator"
api_family: "config.openshift.io"
default_command: "clusteroperators"
command:
  - "clusteroperators.config"
  - "clusteroperator.config"
listview:
  name: "Cluster Operators"
  group: "OpenShift"
  field_indexes:
    Wide:
      fields: ["name", "controller",
               "version", "available", "progressing", "degraded", "age"]
    Normal:
      fields: ["name", "version", "available", "progressing", "degraded", "age"]
  fields:
    available:
      header: "Available:"
      paths:
        - path: "status#conditions"
          pathtype: "items"
          subpath: "status"
          when:
            - key: "type"
              eq: "Available"
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            "True":
              field_colors:
                - context: "main"
                  type: "status_ok"
            "False":
              field_colors:
                - context: "main"
                  type: "status_not_ok"
    controller:
      header: "Controller:"
      paths:
        - path: "metadata#ownerReferences"
          pathtype: "items"
          subpaths:
            - "kind"
            - "apiVersion"
            - "name"
          when:
            - key: "controller"
              eq: true
          type: ["kind", "api_group", "name"]
          default: ["<none>"]
      formatter: "list"
      formatting:
        field_colors:
          - type: "kind"
          - type: "api_group"
          - type: "generic"
        field_separators:
          - type: "kind_api_group"
          - type: "kind"
    degraded:
      header: "Degraded:"
      paths:
        - path: "status#conditions"
          pathtype: "items"
          subpath: "status"
          when:
            - key: "type"
              eq: "Degraded"
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            "True":
              field_colors:
                - context: "main"
                  type: "status_not_ok"
            "False":
              field_colors:
                - context: "main"
                  type: "status_ok"
    progressing:
      header: "Progressing:"
      paths:
        - path: "status#conditions"
          pathtype: "items"
          subpath: "status"
          when:
            - key: "type"
              eq: "Progressing"
      type: "str"
    version:
      header: "Version:"
      paths:
        - path: "status#versions"
          pathtype: "items"
          subpath: "version"
          when:
            - key: "name"
              eq: "operator"
          default: ["<unset>"]
      type: "str"
      formatting:
        field_colors:
          - type: "version"
infoview:
  name: "Cluster Operator Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["controller"]
    rows:
      controller:
        header: [["C", ["main", "infoheader_shortcut"]],
                 ["ontroller:", ["main", "infoheader"]]]
        paths:
          - path: "metadata#ownerReferences"
            pathtype: "items"
            subpaths:
              - "kind"
              - "apiVersion"
              - "name"
            when:
              - key: "controller"
                eq: true
            type: ["kind", "api_group", "name"]
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
  listpad:
    on_activation:
      call: "resourceinfodispatch_with_lookup"
      kind_path: "resource"
      api_family_path: "group"
      name_path: "name"
      namespace_path: "namespace"
    listgetter: "listgetter_path"
    listgetter_args:
      path: "status#relatedObjects"
    infogetter: "generic_infogetter"
    field_indexes:
      Normal:
        fields: ["resource", "api_group", "namespace", "name"]
    fields:
      api_group:
        header: "API-Group:"
        path: "group"
        type: "str"
        formatting:
          field_colors:
            - type: "api_group"
      name:
        header: "Name:"
        path: "name"
        type: "str"
      namespace:
        header: "Namespace:"
        path: "namespace"
        type: "str"
        formatting:
          field_colors:
            - type: "namespace"
      resource:
        header: "Resource:"
        path: "resource"
        type: "str"
  shortcuts:
    "Open controller":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for controller"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        namespace_path: "metadata#namespace"
        owner_reference_path: "metadata#ownerReferences"
    "List versions":
      key: "v"
      read_only: true
      helptext: "List versions"
      widget: "windowwidget"
      title: "Versions:"
      selectable: true
      headers: ["Name:", "Version:"]
      itemgetter: "get_list_fields"
      itemgetter_args:
        path: "status#versions"
        fields:
          - "name"
          - "version"
      # Not supported for now
      sortcolumn: "resource"
