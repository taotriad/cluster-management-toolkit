---
kind: "ServiceAccount"
default_command: "serviceaccounts"
command:
  - "sa"
listview:
  name: "Service Accounts"
  group: "Authorization & Access Control"
  field_indexes:
    Wide:
      fields: ["namespace", "name", "controller", "automount", "age"]
      sortcolumn: "namespace"
    Normal:
      fields: ["namespace", "name", "automount", "age"]
      sortcolumn: "namespace"
  fields:
    automount:
      header: "Automount:"
      path: "automountServiceAccountToken"
      default: false
      type: "bool"
    controller:
      header: "Controller:"
      paths:
        - path: "metadata#ownerReferences"
          pathtype: "items"
          subpaths:
            - "kind"
            - "apiVersion"
            - "name"
          when:
            - key: "controller"
              eq: true
          type: ["kind", "api_group", "name"]
          default: ["<none>"]
      formatter: "list"
      formatting:
        field_colors:
          - type: "kind"
          - type: "api_group"
          - type: "generic"
        field_separators:
          - type: "kind_api_group"
          - type: "kind"
  actions:
    actionlist:
      "Delete resource":
        description: "Delete resource"
        category: "Resource Level"
        confirm: true
        actionfunc: "delete_resource"
infoview:
  name: "Service Account Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["controller", "automount"]
    rows:
      automount:
        header: [["Automount Service Account Token:",
                  ["main", "infoheader"]]]
        path: "automountServiceAccountToken"
        default: false
        type: "bool"
      controller:
        header: [["C", ["main", "infoheader_shortcut"]],
                 ["ontroller:", ["main", "infoheader"]]]
        paths:
          - path: "metadata#ownerReferences"
            pathtype: "items"
            subpaths:
              - "kind"
              - "apiVersion"
              - "name"
            when:
              - key: "controller"
                eq: true
            type: ["kind", "api_group", "name"]
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
  listpad:
    listgetter: "listgetter_path"
    listgetter_args:
      path: ""
    infogetter: "get_sas_info"
    on_activation:
      call: "resourceinfodispatch_with_lookup"
      kind_path: "kind"
      api_version_path: "apiVersion"
      name_path: "metadata#name"
      namespace_path: "metadata#namespace"
    field_indexes:
      Normal:
        fields: ["namespace", "name", "kind", "type"]
        sortcolumn: "type"
    fields:
      kind:
        header: "Kind:"
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
          field_separators:
            - type: "kind_api_group"
      type:
        header: "Type:"
        path: "type"
        default: "<unset>"
        type: "str"
  shortcuts:
    "Open controller":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for controller"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        namespace_path: "metadata#namespace"
        owner_reference_path: "metadata#ownerReferences"
