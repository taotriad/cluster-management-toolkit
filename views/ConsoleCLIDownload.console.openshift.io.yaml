---
kind: "ConsoleCLIDownload"
api_family: "console.openshift.io"
default_command: "consoleclidownloads"
listview:
  name: "Console CLI Downloads"
  group: "OpenShift"
  field_indexes:
    Normal:
      fields: ["name", "display_name", "age"]
  fields:
    display_name:
      header: "Display Name:"
      path: "spec#displayName"
      type: "str"
infoview:
  name: "Console CLI Download Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["display_name", "controller"]
    rows:
      controller:
        header: [["C", ["main", "infoheader_shortcut"]],
                 ["ontroller:", ["main", "infoheader"]]]
        paths:
          - path: "metadata#ownerReferences"
            pathtype: "items"
            subpaths:
              - "kind"
              - "apiVersion"
              - "name"
            when:
              - key: "controller"
                eq: true
            type: ["kind", "api_group", "name"]
        default: "<none>"
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
      display_name:
        header: [["Display Name:", ["main", "infoheader"]]]
        path: "spec#displayName"
        type: "str"
  logpad:
    timestamps: false
    infogetter: "logpad_msg_getter"
    infogetter_args:
      path: "spec#description"
  shortcuts:
    "Open controller":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for controller"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        namespace_path: "metadata#namespace"
        owner_reference_path: "metadata#ownerReferences"
    "Show Download Links":
      key: "d"
      modifier: "shift"
      read_only: true
      helptext: "Show download links"
      widget: "windowwidget"
      title: "Download links:"
      headers: ["Description:", "URL:"]
      selectable: false
      itemgetter: "get_list_fields"
      itemgetter_args:
        path: "spec#links"
        fields:
          - "text"
          - "href"
      # Not supported for now
      sortcolumn: "text"
