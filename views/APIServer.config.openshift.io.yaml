---
kind: "APIServer"
api_family: "config.openshift.io"
default_command: "apiservers.config.openshift.io"
command:
  - "apiservers.config"
  - "apiserver.config"
listview:
  name: "API Servers"
  group: "OpenShift"
  field_indexes:
    Normal:
      fields: ["name", "age"]
infoview:
  name: "API Server Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["client_ca", "audit_profile",
                 "encryption_type", "tls_security_profile"]
    rows:
      audit_profile:
        header: [["Audit Profile:", ["main", "infoheader"]]]
        path: "spec#audit#profile"
        default: "<unset>"
        type: "str"
      client_ca:
        header: [["Client C", ["main", "infoheader"]],
                 ["A", ["main", "infoheader_shortcut"]],
                 [":", ["main", "infoheader"]]]
        path: "spec#clientCA#name"
        default: "<none>"
        type: "str"
      encryption_type:
        header: [["Encryption Type:", ["main", "infoheader"]]]
        path: "spec#encryption#type"
        default: "<default>"
        type: "str"
      tls_security_profile:
        header: [["TLS Security Profile:", ["main", "infoheader"]]]
        path: "spec#tlsSecurityProfile#type"
        default: "<default>"
        type: "str"
  shortcuts:
    "Additional CORS Allowed Origins":
      key: "o"
      read_only: true
      helptext: "List additional CORS allowed origins"
      widget: "windowwidget"
      title: "CORS allowed origins:"
      selectable: true
      itemgetter: "get_list_as_list"
      itemgetter_args:
        paths: ["spec#additionalCORSAllowedOrigins"]
      # Not supported for now
      sortcolumn: "origin"
    "Client CA":
      key: "a"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for client CA"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        namespace: "openshift-config"
        name_path: "spec#clientCA#name"
        kind: "ConfigMap"
    "View serving certs":
      key: "s"
      modifier: "shift"
      read_only: true
      helptext: "View serving TLS certificates"
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "Service TLS certificates"
        _pass_obj: true
        path: "spec#servingCerts"
