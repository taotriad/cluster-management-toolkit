---
kind: "HorizontalPodAutoscaler"
api_family: "autoscaling"
default_command: "horizontalpodautoscalers"
command:
  - "hpa"
listview:
  name: "Horizontal Pod Autoscalers"
  group: "Scheduling & Scaling"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "reference", "minpods",
               "maxpods", "replicas", "age"]
      sortcolumn: "namespace"
  fields:
    maxpods:
      header: "Max Pods:"
      path: "spec#maxReplicas"
      type: "int"
      formatter: "numerical"
      align: "right"
    minpods:
      header: "Min Pods:"
      path: "spec#minReplicas"
      type: "int"
      formatter: "numerical"
      align: "right"
    reference:
      header: "Reference:"
      paths:
        - path: [["spec#scaleTargetRef#kind"],
                 ["spec#scaleTargetRef#apiVersion"],
                 ["spec#scaleTargetRef#name"]]
          pathtype: "tuple"
          type: ["kind", "api_group", "name"]
      formatter: "list"
      formatting:
        field_colors:
          - type: "kind"
          - type: "api_group"
          - type: "generic"
        field_separators:
          - type: "kind_api_group"
          - type: "kind"
    replicas:
      header: "Replicas:"
      path: "status#currentReplicas"
      type: "int"
      formatter: "numerical"
      align: "right"
infoview:
  name: "Horizontal Pod Autoscaler Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["min_replicas", "max_replicas",
                 "scale_target_reference", "status"]
    rows:
      max_replicas:
        header: [["Max Replicas:", ["main", "infoheader"]]]
        path: "spec#maxReplicas"
        type: "raw"
        formatter: "numerical"
      min_replicas:
        header: [["Min Replicas:", ["main", "infoheader"]]]
        path: "spec#minReplicas"
        type: "raw"
        formatter: "numerical"
      scale_target_reference:
        header: [["S", ["main", "infoheader_shortcut"]],
                 ["cale Target Reference:", ["main", "infoheader"]]]
        paths:
          - path: [["spec#scaleTargetRef#kind"],
                   ["spec#scaleTargetRef#apiVersion"],
                   ["spec#scaleTargetRef#name"]]
            pathtype: "tuple"
            type: ["kind", "api_group", "name"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
      status:
        header: [["Status:", ["main", "infoheader"]]]
        paths:
          - path: [["status#currentReplicas"], ["status#desiredReplicas"]]
            pathtype: "tuple"
            default: [0, 0]
        formatter: "list"
        formatting:
          field_colors:
            - type: "numerical"
            - type: "numerical"
          separators:
            - type: "fraction"
  listpad:
    listgetter: "listgetter_path"
    listgetter_args:
      path: "spec#metrics"
    infogetter: "generic_infogetter"
    infogetter_args:
      _extra_data:
        namespace: ["metadata#namespace"]
    on_activation:
      call: "resourceinfodispatch_with_lookup"
      kind_path: "object#describedObject#kind"
      api_version_path: "object#describedObject#apiVersion"
      name_path: "object#describedObject#name"
      namespace_path: "_extra_data#namespace"
    field_indexes:
      Normal:
        fields: ["metrics_type", "name", "target_type",
                 "target_average_percentage", "target_average_value",
                 "target_value", "described_object", "selector"]
        sortcolumn: "name"
    fields:
      described_object:
        header: "Described Object:"
        paths:
          - path: [["object#describedObject#kind"],
                   ["object#describedObject#apiVersion"],
                   ["object#describedObject#name"]]
            pathtype: "tuple"
            type: ["kind", "api_group", "name"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
      metrics_type:
        header: "Type:"
        path: "type"
        type: "str"
      name:
        header: "Name:"
        paths:
          - path: ["resource#name", "pods#metric#name",
                   "object#metric#name", "external#metric#name"]
            pathtype: "value"
        type: "str"
      selector:
        header: "Selector:"
        paths:
          - path: ["external#metric#selector"]
            pathtype: "selectors"
            default: ["<none>"]
        formatter: "list"
      target_type:
        header: "Target Type:"
        paths:
          - path: ["external#target#type",
                   "object#target#type",
                   "pods#target#type",
                   "resource#target#type"]
        type: "str"
      target_average_percentage:
        header: "Target Average %:"
        paths:
          - path: ["containerResource#target#averageUtilization",
                   "external#target#averageUtilization",
                   "object#target#averageUtilization",
                   "resource#target#averageUtilization",
                   "pods#target#averageUtilization"]
        default: "<none>"
        type: "int"
        formatter: "numerical"
        formatting:
          unit: "%"
        align: "right"
      target_average_value:
        header: "Target Average:"
        paths:
          - path: ["containerResource#target#averageValue",
                   "external#target#averageValue",
                   "object#target#averageValue",
                   "resource#target#averageValue",
                   "pods#target#averageValue"]
            default: "<none>"
        type: "int"
        formatter: "numerical"
        align: "right"
      target_value:
        header: "Target Value:"
        paths:
          - path: ["containerResource#target#value",
                   "external#target#value",
                   "object#target#value",
                   "resource#target#value",
                   "pods#target#value"]
            default: "<none>"
        type: "int"
        formatter: "numerical"
        align: "right"
  shortcuts:
    "Scale Target Reference":
      key: "s"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for scale target reference"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind_path: "spec#scaleTargetRef#kind"
        api_version_path: "spec#scaleTargetRef#apiVersion"
        name_path: "spec#scaleTargetRef#name"
        namespace_path: "metadata#namespace"
