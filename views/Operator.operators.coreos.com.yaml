---
kind: "Operator"
api_family: "operators.coreos.com"
default_command: "operators"
listview:
  name: "Operators"
  group: "API & Extendability"
  field_indexes:
    Normal:
      fields: ["name", "references", "age"]
  fields:
    references:
      header: "References:"
      path: "status#components#refs"
      type: "len"
      formatter: "numerical"
      align: "right"
infoview:
  name: "Operator Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["label_selector"]
    rows:
      label_selector:
        header: [["Set-based Selector:", ["main", "infoheader"]]]
        paths:
          - path: "status#components#labelSelector#matchExpressions"
            pathtype: "match_expression"
            default: "<none>"
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "operator"
            - type: "value"
          field_separators:
            - type: "space"
            - type: "no_pad"
  shortcuts:
    "List References":
      key: "r"
      modifier: "shift"
      read_only: true
      helptext: "List references"
      title: "References:"
      widget: "windowwidget"
      headers: ["Kind:", "API-version:", "Namespace:", "Name:"]
      selectable: true
      itemgetter: "get_list_fields"
      itemgetter_args:
        path: "status#components#refs"
        fields:
          - "kind"
          - "apiVersion"
          - "namespace"
          - "name"
      # This isn't supported for now
      sortcolumn: "name"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        kind_path: 0
        api_version_path: 1
        namespace_path: 2
        name_path: 3
