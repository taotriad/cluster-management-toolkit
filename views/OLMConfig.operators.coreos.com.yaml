---
kind: "OLMConfig"
api_family: "operators.coreos.com"
default_command: "olmconfigs"
command:
  - "olmconfs"
  - "olmconf"
listview:
  name: "OLM Configs"
  group: "API & Extendability"
  field_indexes:
    Normal:
      fields: ["name", "age"]
infoview:
  name: "OLM Config Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["disable_copied_csvs", "package_server_sync_interval"]
    rows:
      disable_copied_csvs:
        header: [["Disable Copied CSVs:", ["main", "infoheader"]]]
        path: "spec#features#disableCopiedCSVs"
        default: false
        type: "bool"
      package_server_sync_interval:
        header: [["Package Server Sync Interval:", ["main", "infoheader"]]]
        path: "spec#features#packageServerSyncInterval"
        default: "12h"
        type: "str"
        formatter: "numerical"
  shortcuts:
    "Owner References":
      key: "o"
      modifier: "shift"
      read_only: true
      helptext: "List Owner References"
      widget: "windowwidget"
      title: "Owner References:"
      selectable: true
      headers: ["Kind:", "API-Version:", "Name:"]
      itemgetter: "get_list_fields"
      itemgetter_args:
        path: "metadata#ownerReferences"
        fields:
          - "kind"
          - "apiVersion"
          - "name"
      # This isn't supported for now
      sortcolumn: "kind"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind_path: 0
        api_version_path: 1
        name_path: 2
        _parent_namespace_path: "metadata#namespace"
