---
kind: "Proxy"
api_family: "config.openshift.io"
default_command: "proxies.config.openshift.io"
command:
  - "proxies.config"
  - "proxy.config"
listview:
  name: "Proxies"
  group: "OpenShift"
  field_indexes:
    Normal:
      fields: ["name", "age"]
infoview:
  name: "Proxy Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["http_proxy", "https_proxy", "no_proxy", "trusted_ca"]
    rows:
      http_proxy:
        header: [["HTTP Proxy:", ["main", "infoheader"]]]
        paths:
          - path: ["status#httpProxy", "spec#httpProxy"]
            pathtype: "value"
        formatter: "address"
      https_proxy:
        header: [["HTTPS Proxy:", ["main", "infoheader"]]]
        paths:
          - path: ["status#httpsProxy", "spec#httpProxy"]
            pathtype: "value"
        formatter: "address"
      no_proxy:
        header: [["No Proxy:", ["main", "infoheader"]]]
        paths:
          - path: ["status#noProxy", "spec#httpProxy"]
            pathtype: "value"
        type: "str"
      trusted_ca:
        header: [["Trusted CA:", ["main", "infoheader"]]]
        paths:
          - path: "spec#trustedCA#name"
            pathtype: "value"
            type: "str"
            fallback_on_empty: true
            default: "<empty>"
