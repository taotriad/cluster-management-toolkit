---
kind: "Management"
api_family: "k0rdent.mirantis.com"
default_command: "managements.k0rdent.mirantis.com"
command:
  - "mgmnts.k0rdent"
  - "mgmnt.k0rdent"
listview:
  name: "Managements"
  group: "K0rdent"
  field_indexes:
    Normal:
      fields: ["name", "release", "ready", "age"]
  fields:
    ready:
      header: "Ready:"
      paths:
        - path: "status#conditions"
          pathtype: "items"
          subpath: "status"
          when:
            - key: "type"
              eq: "Ready"
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            "True":
              field_colors:
                - context: "main"
                  type: "status_ok"
            "False":
              field_colors:
                - context: "main"
                  type: "status_not_ok"
    release:
      header: "Release:"
      paths:
        - path: ["status#release", "spec#release"]
          pathtype: "value"
      default: "<unset>"
      type: "str"
infoview:
  name: "Management Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["providers", "available_providers", "release", "ready"]
    rows:
      available_providers:
        header: [["A", ["main", "infoheader_shortcut"]],
                 ["vailable Providers:", ["main", "infoheader"]]]
        path: "status#availableProviders"
        type: "raw"
        formatter: "list"
      providers:
        header: [["P", ["main", "infoheader_shortcut"]],
                 ["roviders:", ["main", "infoheader"]]]
        paths:
          - path: "spec#providers"
            pathtype: "items"
            subpaths:
              - "name"
        formatter: "list"
      ready:
        header: [["Ready:", ["main", "infoheader"]]]
        paths:
          - path: "status#conditions"
            pathtype: "items"
            subpath: "status"
            when:
              - key: "type"
                eq: "Ready"
        type: "str"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              "True":
                field_colors:
                  - context: "main"
                    type: "status_ok"
              "False":
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
      release:
        header: [["Release:", ["main", "infoheader"]]]
        paths:
          - path: ["status#release", "spec#release"]
            pathtype: "value"
        default: "<unset>"
        type: "str"
  listpad:
    listgetter: "listgetter_dict_list"
    listgetter_args:
      path: "status#components"
    infogetter: "generic_infogetter"
    field_indexes:
      Normal:
        fields: ["component", "template", "success", "exposed_providers"]
        sortcolumn: "data"
    fields:
      component:
        header: "Component:"
        path: "key"
        default: "<unset>"
        type: "str"
      exposed_providers:
        header: "Exposed Providers:"
        path: "value#exposedProviders"
        default: "<unset>"
        type: "raw"
        formatter: "list"
      success:
        header: "Success:"
        path: "value#success"
        default: "<unset>"
        type: "bool"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              "False":
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
              "True":
                field_colors:
                  - context: "main"
                    type: "status_ok"
      template:
        header: "Template:"
        path: "value#template"
        default: "<unset>"
        type: "str"
  shortcuts:
    "List CAPI Contracts":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "List CAPI contracts"
      widget: "windowwidget"
      title: "CAPI Contracts:"
      itemgetter: "get_dict_list"
      itemgetter_args:
        path: "status#capiContracts"
        fields:
          - "key"
          - "value"
    "List Available Providers":
      key: "a"
      modifier: "shift"
      read_only: true
      helptext: "List available providers"
      widget: "windowwidget"
      title: "Available Providers:"
      itemgetter: "get_list_as_list"
      itemgetter_args:
        path: "status#availableProviders"
    "List Providers":
      key: "p"
      modifier: "shift"
      read_only: true
      helptext: "List providers"
      widget: "windowwidget"
      title: "Providers:"
      itemgetter: "get_list_fields"
      itemgetter_args:
        path: "spec#providers"
        fields:
          - "name"
