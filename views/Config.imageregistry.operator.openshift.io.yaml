---
kind: "Config"
api_family: "imageregistry.operator.openshift.io"
default_command: "configs.imageregistry.operator.openshift.io"
command:
  - "configs.imageregistry"
  - "config.imageregistry"
  - "confs.imgreg"
  - "conf.imgreg"
listview:
  name: "Configs"
  group: "OpenShift"
  field_indexes:
    Normal:
      fields: ["name", "desired_replicas", "ready_replicas", "age"]
  fields:
    desired_replicas:
      header: "Desired Replicas:"
      path: "spec#replicas"
      type: "int"
      formatter: "numerical"
      align: "right"
    ready_replicas:
      header: "Ready Replicas:"
      paths:
        - path: ["status#readyReplicas", "spec#replicas"]
          pathtype: "comparison"
          default: [0, 0]
      formatter: "value_mapper"
      formatting:
        mapping:
          ranges:
            - min: 0
              max: 1
              field_colors:
                - context: "main"
                  type: "status_ok"
            - default: true
              field_colors:
                - context: "main"
                  type: "status_not_ok"
      align: "right"
infoview:
  name: "Config Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["http_secret", "default_route", "proxy_header",
                 "proxy_http_proxy", "proxy_https_proxy", "proxy_no_proxy",
                 "loglevel", "operator_loglevel", "management_state",
                 "node_label_selector",
                 "storage_header", "storage_managed",
                 "storage_management_state", "storage_pvc_claim",
                 "rollout_strategy", "desired_replicas", "ready_replicas"]
    rows:
      default_route:
        header: [["Default Route:", ["main", "infoheader"]]]
        path: "spec#defaultRoute"
        type: "str"
      desired_replicas:
        header: [["Desired Replicas:", ["main", "infoheader"]]]
        path: "spec#replicas"
        type: "int"
        formatter: "numerical"
      http_secret:
        header: [["HTTP Secret:", ["main", "infoheader"]]]
        path: "spec#httpSecret"
        type: "str"
      loglevel:
        header: [["Loglevel:", ["main", "infoheader"]]]
        path: "spec#logLevel"
        type: "str"
      management_state:
        header: [["Management State:", ["main", "infoheader"]]]
        path: "spec#managementState"
        type: "str"
      node_label_selector:
        header: [["Node La", ["main", "infoheader"]],
                 ["b", ["main", "infoheader_shortcut"]],
                 ["el Selector:", ["main", "infoheader"]]]
        paths:
          - path: ["spec#nodeSelector"]
            pathtype: "key_value"
            default: ["<unset>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "selector"
      proxy_header:
        header: [["Proxy:", ["main", "infoheader"]]]
      proxy_http_proxy:
        header: [["  HTTP Proxy:", ["main", "infoheader"]]]
        path: "spec#proxy#httpProxy"
        type: "str"
        default: "<none>"
      proxy_https_proxy:
        header: [["  HTTPS Proxy:", ["main", "infoheader"]]]
        path: "spec#proxy#httpsProxy"
        type: "str"
        default: "<none>"
      proxy_no_proxy:
        header: [["  No Proxy:", ["main", "infoheader"]]]
        path: "spec#proxy#noProxy"
        type: "str"
        default: "<none>"
      operator_loglevel:
        header: [["Operator Loglevel:", ["main", "infoheader"]]]
        path: "spec#operatorLogLevel"
        type: "str"
      ready_replicas:
        header: [["Ready Replicas:", ["main", "infoheader"]]]
        path: "status#readyReplicas"
        type: "int"
        formatter: "numerical"
      rollout_strategy:
        header: [["Rollout Strategy:", ["main", "infoheader"]]]
        path: "spec#rolloutStrategy"
        type: "str"
      storage_header:
        header: [["Storage:", ["main", "infoheader"]]]
      storage_managed:
        header: [["  Managed:", ["main", "infoheader"]]]
        path: "status#storageManaged"
        type: "str"
      storage_management_state:
        header: [["  Management State:", ["main", "infoheader"]]]
        path: "status#storage#managementState"
        type: "str"
      storage_pvc_claim:
        header: [["  ", ["main", "infoheader"]],
                 ["P", ["main", "infoheader_shortcut"]],
                 ["ersistent Volume Claim:", ["main", "infoheader"]]]
        path: "status#storage#pvc#claim"
        type: "str"
  shortcuts:
    "List generations":
      key: "g"
      read_only: true
      helptext: "List generations"
      widget: "windowwidget"
      title: "Generations:"
      selectable: true
      headers: ["Resource:", "Group:", "Namespace:", "Name:"]
      itemgetter: "get_list_fields"
      itemgetter_args:
        path: "status#generations"
        fields:
          - "resource"
          - "group"
          - "namespace"
          - "name"
      # Not supported for now
      sortcolumn: "resource"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        kind_path: 0
        api_group_path: 1
        namespace_path: 2
        name_path: 3
    "Node Label Selector":
      key: "b"
      read_only: true
      helptext: "Show Node label selector"
      widget: "windowwidget"
      title: "Node Label Selector:"
      headers: ["Key:", "Value:"]
      itemgetter: "get_key_value"
      itemgetter_args:
        path: "spec#nodeSelector"
    "Persistent Volume Claim":
      key: "p"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for Persistent Volume Claim"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind: "PersistentVolumeClaim"
        name_path: "status#storage#pvc#claim"
        namespace: "openshift-image-registry"
