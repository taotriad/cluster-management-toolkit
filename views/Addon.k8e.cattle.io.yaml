---
kind: "Addon"
api_family: "k8e.cattle.io"
default_command: "addons.k8e.cattle.io"
command:
  - "k8eaddons"
  - "k8eaddon"
listview:
  name: "Addons"
  group: "K8E"
  field_indexes:
    Wide:
      fields: ["namespace", "name", "age", "source"]
      sortcolumn: "namespace"
    Normal:
      fields: ["namespace", "name", "age"]
      sortcolumn: "namespace"
  fields:
    source:
      header: "Source:"
      path: "spec#source"
      default: "<unset>"
      type: "str"
      formatting:
        field_colors:
          - type: "path"
infoview:
  name: "Addon Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["source", "checksum"]
    rows:
      source:
        header: [["Source:", ["main", "infoheader"]]]
        path: "spec#source"
        default: "<unset>"
        type: "str"
        formatting:
          field_colors:
            - type: "path"
      checksum:
        header: [["Checksum:", ["main", "infoheader"]]]
        path: "spec#checksum"
        default: "<unset>"
        type: "str"
        formatter: "hex"
