---
kind: "__PodLogViewer"
default_command: "podlogviewer"
command:
  - "podlogs"
  - "podlog"
listview:
  name: "Pod Log Viewer"
  group: "Administration"
  listgetter: "get_pod_containers_list"
  on_activation:
    call: null
  check_availability: "is_cluster_reachable"
  labels: null
  field_indexes:
    Normal:
      fields: ["namespace", "name", "type", "container", "status",
               "node_name", "image"]
      sortcolumn: "namespace"
  fields:
    container:
      header: "Container:"
      path: "container"
      type: "str"
    image:
      header: "Image:"
      path: "image"
      type: "str"
    name:
      header: "Pod Name:"
      path: "name"
      type: "str"
    namespace:
      header: "Pod Namespace:"
      path: "namespace"
      type: "str"
      formatting:
        field_colors:
          - type: "namespace"
    node_name:
      header: "Node:"
      path: "node_name"
      type: "host"
      default: "<none>"
      formatting:
        field_colors:
          - type: "host"
    status:
      header: "Status:"
      datagetter: "datagetter_container_status"
      generator: "generator_status"
    type:
      header: "Type:"
      path: "container_type"
      type: "str"
      formatting:
        field_colors:
          - type: "kind"
  actions:
    actionlist:
      "View Logs":
        description: "View logs for tagged resources interleaved"
        actionfunc: "action_view_pod_logs"
  shortcuts:
    "Open Pod":
      key: "p"
      modifier: "shift"
      read_only: true
      helptext: "Open info for selected Pod"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_selected: true
        namespace_path: "namespace"
        name_path: "name"
        kind: "Pod"
    "View Log":
      key: "enter"
      read_only: true
      helptext: "View log for selected resource"
      action: "call"
      action_call: "view_pod_logs"
      action_args:
        _pass_selected: true
    # Overrides:
    "Edit resource": null
    "View YAML dump": null
