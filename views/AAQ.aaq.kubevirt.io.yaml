---
kind: "AAQ"
api_family: "aaq.kubevirt.io"
default_command: "aaqs"
listview:
  name: "AAQs"
  group: "Policy"
  field_indexes:
    Normal:
      fields: ["name", "phase", "age"]
  fields:
    phase:
      header: "Phase:"
      path: "status#phase"
      default: "<unset>"
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            Deleting:
              field_colors:
                - context: "main"
                  type: "status_pending"
            Deleted:
              field_colors:
                - context: "main"
                  type: "status_done"
            Deployed:
              field_colors:
                - context: "main"
                  type: "status_done"
            Deploying:
              field_colors:
                - context: "main"
                  type: "status_pending"
            Error:
              field_colors:
                - context: "main"
                  type: "status_not_ok"
            Upgrading:
              field_colors:
                - context: "main"
                  type: "status_pending"
infoview:
  name: "AAQ Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["image_pull_policy", "infrastructure_header",
                 "infrastructure_node_label_selector",
                 "infrastructure_tolerations",
                 "workload_header",
                 "workload_node_label_selector",
                 "configuration_header",
                 "configuration_vmi_counting_mode",
                 "version_header",
                 "version_observed",
                 "version_operator",
                 "version_target",
                 "phase"]
    rows:
      configuration_header:
        header: [["Configuration:", ["main", "infoheader"]]]
      configuration_vmi_counting_mode:
        header: [["  VMI Counting Mode:", ["main", "infoheader"]]]
        path: "spec#configuration#vmiCalculatorConfiguration#configName"
        default: "<unset>"
        type: "str"
      image_pull_policy:
        header: [["Image Pull Policy:", ["main", "infoheader"]]]
        path: "spec#imagePullPolicy"
        default: "<unset>"
        type: "str"
      infrastructure_header:
        header: [["Infrastructure:", ["main", "infoheader"]]]
      infrastructure_node_label_selector:
        header: [["  Node La", ["main", "infoheader"]],
                 ["b", ["main", "infoheader_shortcut"]],
                 ["el Selector:", ["main", "infoheader"]]]
        paths:
          - path: ["spec#infra#nodeSelector"]
            pathtype: "key_value"
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "selector"
      infrastructure_tolerations:
        header: [["  Tolera", ["main", "infoheader"]],
                 ["t", ["main", "infoheader_shortcut"]],
                 ["ions:", ["main", "infoheader"]]]
        paths:
          - path: "spec#infra#tolerations"
            pathtype: "match_expression"
            default: "<none>"
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "operator"
            - type: "value"
          field_separators:
            - type: "space"
            - type: "no_pad"
      phase:
        header: [["Phase:", ["main", "infoheader"]]]
        path: "status#phase"
        default: "<unset>"
        type: "str"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              Deleting:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              Deleted:
                field_colors:
                  - context: "main"
                    type: "status_done"
              Deployed:
                field_colors:
                  - context: "main"
                    type: "status_done"
              Deploying:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              Error:
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
              Upgrading:
                field_colors:
                  - context: "main"
                    type: "status_pending"
      version_header:
        header: [["Version:", ["main", "infoheader"]]]
      version_observed:
        header: [["  Observed:", ["main", "infoheader"]]]
        path: "status#observedVersion"
        default: "<unset>"
        type: "str"
        formatting:
          field_colors:
            - type: "version"
      version_operator:
        header: [["  Operator:", ["main", "infoheader"]]]
        path: "status#operatorVersion"
        default: "<unset>"
        type: "str"
        formatting:
          field_colors:
            - type: "version"
      version_target:
        header: [["  Target:", ["main", "infoheader"]]]
        path: "status#targetVersion"
        default: "<unset>"
        type: "str"
        formatting:
          field_colors:
            - type: "version"
      workload_header:
        header: [["Workload:", ["main", "infoheader"]]]
      workload_node_label_selector:
        header: [["  No", ["main", "infoheader"]],
                 ["d", ["main", "infoheader_shortcut"]],
                 ["e Label Selector:", ["main", "infoheader"]]]
        paths:
          - path: ["spec#workload#nodeSelector"]
            pathtype: "key_value"
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "selector"
  shortcuts:
    "Infrastructure Node Label Selector":
      key: "b"
      read_only: true
      helptext: "Show Infrastructure Node label selector"
      widget: "windowwidget"
      title: "Node Label Selector:"
      headers: ["Key:", "Value:"]
      itemgetter: "get_key_value"
      itemgetter_args:
        path: "spec#infra#nodeSelector"
    "Workload Node Label Selector":
      key: "d"
      read_only: true
      helptext: "Show Workload Node label selector"
      widget: "windowwidget"
      title: "Workload Node Label Selector:"
      headers: ["Key:", "Value:"]
      itemgetter: "get_key_value"
      itemgetter_args:
        path: "spec#workload#nodeSelector"
    "Show Infrastructure tolerations":
      key: "t"
      read_only: true
      helptext: "Show Infrastructure tolerations"
      title: "Infrastructure Tolerations:"
      widget: "windowwidget"
      headers: ["Key:", "Operator:", "Value:", "Effect:", "Timeout:"]
      itemgetter: "get_tolerations"
      itemgetter_args:
        path: ["spec#infra#tolerations"]
      # This isn't supported for now
      sortcolumn: "key"
