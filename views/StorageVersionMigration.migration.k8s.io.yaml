---
kind: "StorageVersionMigration"
api_family: "migration.k8s.io"
default_command: "storageversionmigrations"
listview:
  name: "Storage Version Migrations"
  group: "Storage & Backups"
  field_indexes:
    Normal:
      fields: ["name", "controller", "age"]
  fields:
    controller:
      header: "Controller:"
      paths:
        - path: "metadata#ownerReferences"
          pathtype: "items"
          subpaths:
            - "kind"
            - "apiVersion"
            - "name"
          when:
            - key: "controller"
              eq: true
          type: ["kind", "api_group", "name"]
          default: ["<none>"]
      formatter: "list"
      formatting:
        field_colors:
          - type: "kind"
          - type: "api_group"
          - type: "generic"
        field_separators:
          - type: "kind_api_group"
          - type: "kind"
infoview:
  name: "Storage Version Migration Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["controller", "resource", "api_group", "version"]
    rows:
      api_group:
        header: [["API-Group:", ["main", "infoheader"]]]
        path: "spec#resource#group"
        type: "str"
        formatting:
          field_colors:
            - type: "api_group"
      controller:
        header: [["C", ["main", "infoheader_shortcut"]],
                 ["ontroller:", ["main", "infoheader"]]]
        paths:
          - path: "metadata#ownerReferences"
            pathtype: "items"
            subpaths:
              - "kind"
              - "apiVersion"
              - "name"
            when:
              - key: "controller"
                eq: true
            type: ["kind", "api_group", "name"]
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
      resource:
        header: [["Resource:", ["main", "infoheader"]]]
        path: "spec#resource#resource"
        type: "str"
      version:
        header: [["Version:", ["main", "infoheader"]]]
        path: "spec#resource#version"
        type: "str"
        formatting:
          field_colors:
            - type: "version"
  shortcuts:
    "Open controller":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for controller"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        namespace_path: "metadata#namespace"
        owner_reference_path: "metadata#ownerReferences"
