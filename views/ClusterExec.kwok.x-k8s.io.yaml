---
kind: "ClusterExec"
api_family: "kwok.x-k8s.io"
default_command: "clusterexecs.kwok.x-k8s.io"
command:
  - "clrexecs.kwok"
  - "clrexec.kwok"
  - "kwokclrexecs"
  - "kwokclrexec"
listview:
  name: "Cluster Execs"
  group: "Cluster Configuration"
  field_indexes:
    Normal:
      fields: ["name", "age"]
infoview:
  name: "Cluster Exec Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["selector_header",
                 "selector_match_names", "selector_match_namespaces"]
    rows:
      selector_header:
        header: [["Selector:", ["main", "infoheader"]]]
      selector_match_names:
        header: [["  Match Names:", ["main", "infoheader"]]]
        path: "spec#selector#matchNames"
        default: ["ALL"]
        type: "raw"
        formatter: "list"
      selector_match_namespaces:
        header: [["  Match Namespaces:", ["main", "infoheader"]]]
        path: "spec#selector#matchNamespaces"
        default: ["ALL"]
        type: "raw"
        formatter: "list"
        formatting:
          field_colors:
            - type: "namespace"
  listpad:
    listgetter: "listgetter_path"
    listgetter_args:
      path: "spec#execs"
    infogetter: "generic_infogetter"
    field_indexes:
      Normal:
        fields: ["containers", "workdir", "envs"]
    fields:
      containers:
        header: "Containers:"
        path: "containers"
        default: ["ALL"]
        type: "raw"
        formatter: "list"
      envs:
        header: "Environment Variables:"
        paths:
          - path: "local#envs"
            pathtype: "items"
            subpaths:
              - "name"
              - "value"
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "selector"
      workdir:
        header: "Work Dir:"
        path: "local#workDir"
        default: "<none>"
        type: "str"
        formatting:
          field_colors:
            - type: "path"
