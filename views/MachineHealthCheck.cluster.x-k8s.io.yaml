---
kind: "MachineHealthCheck"
api_family: "cluster.x-k8s.io"
default_command: "machinehealthchecks.cluster.x-k8s.io"
command:
  - "x-mhcs"
  - "x-mhc"
listview:
  name: "Machine Health Checks"
  group: "Cluster Configuration"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "cluster",
               "expected_machines", "current_healthy", "age"]
      sortcolumn: "namespace"
  fields:
    cluster:
      header: "Cluster:"
      path: "spec#clusterName"
      type: "str"
    current_healthy:
      header: "Current Healthy:"
      path: "status#currentHealthy"
      default: "0"
      type: "int"
      formatter: "numerical"
      align: "right"
    expected_machines:
      header: "Expected Machines:"
      path: "status#expectedMachines"
      type: "int"
      formatter: "numerical"
      align: "right"
infoview:
  name: "Machine Health Check Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["cluster", "label_selector", "set_based_selector",
                 "targets", "expected_machines", "current_healthy",
                 "remediations_allowed", "node_startup_timeout",
                 "unhealthy_node_conditions"]
    rows:
      cluster:
        header: [["Cl", ["main", "infoheader"]],
                 ["u", ["main", "infoheader_shortcut"]],
                 ["ster:", ["main", "infoheader"]]]
        paths:
          - path: "metadata#ownerReferences"
            pathtype: "items"
            subpaths:
              - "kind"
              - "apiVersion"
              - "name"
            when:
              - key: "kind"
                eq: "Cluster"
            type: ["kind", "api_group", "name"]
        default: "<none>"
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
      current_healthy:
        header: [["Current Healthy:", ["main", "infoheader"]]]
        path: "status#currentHealthy"
        default: "0"
        type: "int"
        formatter: "numerical"
      expected_machines:
        header: [["Expected Machines:", ["main", "infoheader"]]]
        path: "status#expectedMachines"
        type: "int"
        formatter: "numerical"
      label_selector:
        header: [["La", ["main", "infoheader"]],
                 ["b", ["main", "infoheader_shortcut"]],
                 ["el Selector:", ["main", "infoheader"]]]
        paths:
          - path: ["spec#selector#matchLabels"]
            pathtype: "key_value"
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "selector"
      node_startup_timeout:
        header: [["Node Startup Timeout:", ["main", "infoheader"]]]
        path: "spec#checks#nodeStartupTimeoutSeconds"
        default: 600
        type: "int"
        formatter: "numerical"
        formatting:
          unit: "s"
      remediations_allowed:
        header: [["Remediations Allowed:", ["main", "infoheader"]]]
        path: "status#remediationsAllowed"
        default: "<unset>"
        type: "int"
        formatter: "numerical"
      set_based_selector:
        header: [["Set-based Selector:", ["main", "infoheader"]]]
        paths:
          - path: "spec#selector#matchExpressions"
            pathtype: "match_expression"
            default: "<none>"
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "operator"
            - type: "value"
          field_separators:
            - type: "space"
            - type: "no_pad"
      targets:
        header: [["T", ["main", "infoheader_shortcut"]],
                 ["argets:", ["main", "infoheader"]]]
        path: "status#targets"
        default: ["<none>"]
        type: "raw"
        formatter: "list"
      unhealthy_node_conditions:
        header: [["U", ["main", "infoheader_shortcut"]],
                 ["nhealthy Node Conditions:", ["main", "infoheader"]]]
        paths:
          - path: "spec#checks#unhealthyNodeConditions"
            pathtype: "items"
            subpaths:
              - "type"
              - "status"
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "generic"
            - type: "generic"
          field_separators:
            - type: "keyvalue"
  shortcuts:
    "Label Selector":
      key: "b"
      read_only: true
      helptext: "Show label selector"
      widget: "windowwidget"
      title: "Label Selector:"
      headers: ["Key:", "Value:"]
      itemgetter: "get_key_value"
      itemgetter_args:
        path: "spec#selector#matchLabels"
    "List Target Machines":
      key: "t"
      modifier: "shift"
      read_only: true
      helptext: "List target Machines"
      widget: "windowwidget"
      title: "Machines:"
      selectable: true
      itemgetter: "get_list_as_list"
      itemgetter_args:
        path: "status#targets"
      # Not supported for now
      sortcolumn: "name"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        kind: "Machine"
        api_family: "cluster.x-k8s.io"
        _parent_namespace_path: "metadata#namespace"
        name_path: 0
    "List Unhealthy Node Conditions":
      key: "u"
      modifier: "shift"
      read_only: true
      helptext: "List unhealthy node conditions"
      widget: "windowwidget"
      title: "Unhealthy Node Conditions:"
      headers: ["Type:", "Status:", "Timeout (Seconds):"]
      itemgetter: "get_list_fields"
      itemgetter_args:
        path: "spec#checks#unhealthyNodeConditions"
        fields:
          - "type"
          - "status"
          - "timeoutSeconds"
    "Open Cluster":
      key: "u"
      read_only: true
      helptext: "Open info page for cluster"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind: "Cluster"
        api_group: "cluster.x-k8s.io"
        namespace_path: "metadata#namespace"
        owner_reference_path: "metadata#ownerReferences"
