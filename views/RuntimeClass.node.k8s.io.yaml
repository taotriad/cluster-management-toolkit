---
kind: "RuntimeClass"
api_family: "node.k8s.io"
default_command: "runtimeclasses"
listview:
  name: "Runtime Classes"
  group: "Policy"
  field_indexes:
    Normal:
      fields: ["name", "handler", "age"]
  fields:
    handler:
      header: "Handler:"
      path: "handler"
      type: "str"
infoview:
  name: "Runtime Class Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["handler", "node_label_selector"]
    rows:
      handler:
        header: [["Handler:", ["main", "infoheader"]]]
        path: "handler"
        type: "str"
      node_label_selector:
        header: [["Node La", ["main", "infoheader"]],
                 ["b", ["main", "infoheader_shortcut"]],
                 ["el Selector:", ["main", "infoheader"]]]
        paths:
          - path: ["scheduling#nodeSelector"]
            pathtype: "key_value"
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "selector"
  listpad:
    listgetter: "listgetter_dict_list"
    listgetter_args:
      path: "overhead#podFixed"
    infogetter: "generic_infogetter"
    field_indexes:
      Normal:
        fields: ["resource", "overhead"]
        sortcolumn: "resource"
    fields:
      resource:
        header: "Resource:"
        path: "key"
        type: "str"
      overhead:
        header: "Overhead:"
        path: "value"
        type: "raw"
        formatter: "numerical"
        align: "right"
  shortcuts:
    "Node Label Selector":
      key: "b"
      read_only: true
      helptext: "Show Node label selector"
      widget: "windowwidget"
      title: "Node Label Selector:"
      headers: ["Key:", "Value:"]
      itemgetter: "get_key_value"
      itemgetter_args:
        path: "scheduling#nodeSelector"
    "Show tolerations":
      key: "t"
      read_only: true
      helptext: "Show tolerations"
      widget: "windowwidget"
      headers: ["Key:", "Operator:", "Value:", "Effect:", "Timeout:"]
      # This isn't supported for now
      sortcolumn: "key"
      itemgetter: "get_pod_tolerations"
