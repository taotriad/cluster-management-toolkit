---
kind: "ClusterResourceSet"
api_family: "addons.cluster.x-k8s.io"
default_command: "clusterresourcesets"
command:
  - "clrressets"
  - "clrresset"
listview:
  name: "Cluster Resource Sets"
  group: "Cluster Configuration"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "age"]
      sortcolumn: "namespace"
infoview:
  name: "Cluster Resource Set Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["cluster_label_selector", "resources", "strategy"]
    rows:
      cluster_label_selector:
        header: [["Cluster La", ["main", "infoheader"]],
                 ["b", ["main", "infoheader_shortcut"]],
                 ["el Selector:", ["main", "infoheader"]]]
        paths:
          - path: ["spec#clusterSelector#matchLabels"]
            pathtype: "key_value"
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "selector"
      resources:
        header: [["R", ["main", "infoheader_shortcut"]],
                 ["esources:", ["main", "infoheader"]]]
        paths:
          - path: "spec#resources"
            pathtype: "items"
            subpaths:
              - "kind"
              - "name"
            type: ["kind", "name"]
        default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "generic"
          field_separators:
            - type: "kind"
      strategy:
        header: [["Strategy:", ["main", "infoheader"]]]
        path: "spec#strategy"
        default: "<unset>"
        type: "str"
  shortcuts:
    "Cluster Label Selector":
      key: "b"
      read_only: true
      helptext: "Show cluster label selector"
      widget: "windowwidget"
      title: "Cluster Label Selector:"
      headers: ["Key:", "Value:"]
      itemgetter: "get_key_value"
      itemgetter_args:
        path: "spec#clusterSelector#matchLabels"
    "List Resources":
      key: "r"
      modifier: "shift"
      read_only: true
      helptext: "List sesources"
      widget: "windowwidget"
      title: "Resources:"
      itemgetter: "get_list_fields"
      itemgetter_args:
        path: "spec#resources"
        fields:
          - "kind"
          - "name"
      # This isn't supported for now
      sortcolumn: "kind"
      selectable: true
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        kind_path: 0
        name_path: 1
        _parent_namespace_path: "metadata#namespace"
