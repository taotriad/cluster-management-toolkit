---
kind: "CredentialsRequest"
api_family: "cloudcredential.openshift.io"
default_command: "credentialsrequests"
listview:
  name: "Credentials Requests"
  group: "OpenShift"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "provisioned", "age"]
      sortcolumn: "namespace"
  fields:
    provisioned:
      header: "Provisioned:"
      path: "status#provisioned"
      type: "bool"
infoview:
  name: "Credential Request Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["controller", "provider_spec", "secret",
                 "service_accounts", "provisioned", "last_sync_generation"]
    rows:
      controller:
        header: [["C", ["main", "infoheader_shortcut"]],
                 ["ontroller:", ["main", "infoheader"]]]
        paths:
          - path: "metadata#ownerReferences"
            pathtype: "items"
            subpaths:
              - "kind"
              - "apiVersion"
              - "name"
            when:
              - key: "controller"
                eq: true
            type: ["kind", "api_group", "name"]
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
      last_sync_generation:
        header: [["Last Sync Generation:", ["main", "infoheader"]]]
        path: "status#lastSyncGeneration"
        type: "int"
        formatter: "numerical"
      provider_spec:
        header: [["P", ["main", "infoheader_shortcut"]],
                 ["rovider Spec:", ["main", "infoheader"]]]
        paths:
          - path: [["spec#providerSpec#kind"], ["spec#providerSpec#apiVersion"]]
            pathtype: "tuple"
            type: ["kind", "api_group"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
          field_separators:
            - type: "kind_api_group"
      provisioned:
        header: [["Provisioned:", ["main", "infoheader"]]]
        path: "status#provisioned"
        type: "bool"
      secret:
        header: [["S", ["main", "infoheader_shortcut"]],
                 ["ecret:", ["main", "infoheader"]]]
        paths:
          - path: [["spec#secretRef#namespace"], ["spec#secretRef#name"]]
            pathtype: "tuple"
        formatter: "list"
        formatting:
          field_colors:
            - type: "namespace"
            - type: "generic"
          field_separators:
            - type: "namespace"
      service_accounts:
        header: [["Service ", ["main", "infoheader"]],
                 ["A", ["main", "infoheader_shortcut"]],
                 ["ccounts:", ["main", "infoheader"]]]
        path: "spec#serviceAccountNames"
        default: ["<none>"]
        type: "raw"
        formatter: "list"
  shortcuts:
    "Open controller":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for controller"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        namespace_path: "metadata#namespace"
        owner_reference_path: "metadata#ownerReferences"
    "View provider spec":
      key: "p"
      modifier: "shift"
      read_only: true
      helptext: "View provider spec"
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "Provider Spec"
        _pass_obj: true
        path: "spec#providerSpec"
    "Open Secret":
      key: "s"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for Secret"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind: "Secret"
        namespace_path: "spec#secretRef#namespace"
        name_path: "spec#secretRef#name"
    "Service Accounts":
      key: "a"
      modifier: "shift"
      read_only: true
      helptext: "List Service Accounts"
      title: "Service Accounts:"
      widget: "windowwidget"
      selectable: true
      itemgetter: "get_list_as_list"
      itemgetter_args:
        path: "spec#serviceAccountNames"
      # This isn't supported for now
      sortcolumn: "name"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        kind: "ServiceAccount"
        _parent_namespace_path: "metadata#namespace"
        name_path: 0
