---
kind: "Certificate"
api_family: "networking.internal.knative.dev"
default_command: "certificates.networking.internal.knative.dev"
command:
  - "kncertificates"
  - "kncerts"
  - "kncert"
listview:
  name: "Certificates"
  group: "Knative"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "age", "ready", "reason"]
      sortcolumn: "namespace"
  fields:
    ready:
      header: "Ready:"
      paths:
        - path: "status#conditions"
          pathtype: "items"
          subpath: "status"
          when:
            - key: "type"
              eq: "Ready"
          default: ["<unset>"]
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            "True":
              field_colors:
                - context: "main"
                  type: "status_ok"
            "False":
              field_colors:
                - context: "main"
                  type: "status_not_ok"
            "<unset>":
              field_colors:
                - context: "types"
                  type: "unset"
    reason:
      header: "Reason:"
      paths:
        - path: "status#conditions"
          pathtype: "items"
          subpath: "message"
          when:
            - key: "type"
              eq: "Ready"
      type: "str"
infoview:
  name: "Certificates Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["dns_names", "certificate"]
    rows:
      dns_names:
        header: [["D", ["main", "infoheader_shortcut"]],
                 ["NS Names:", ["main", "infoheader"]]]
        path: "spec#dnsNames"
        default: ["<unset>"]
        type: "raw"
        formatter: "list"
      certificate:
        header: [["Certi", ["main", "infoheader"]],
                 ["f", ["main", "infoheader_shortcut"]],
                 ["icate:", ["main", "infoheader"]]]
        path: "spec#secretName"
        default: "<none>"
        type: "str"
  shortcuts:
    "List DNS Names":
      key: "d"
      modifier: "shift"
      read_only: true
      helptext: "List DNS names"
      widget: "windowwidget"
      widget_args:
        title: "DNS Names:"
        itemgetter: "get_list_as_list"
        itemgetter_args:
          path: "spec#dnsNames"
        # This isn't supported for now
        sortcolumn: "name"
    "Open Certificate":
      key: "f"
      read_only: true
      helptext: "Open info page for certificate"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind: "Secret"
        name_path: "spec#secretName"
        namespace_path: "metadata#namespace"
