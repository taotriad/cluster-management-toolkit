---
kind: "__PrometheusRuleData"
api_family: "monitoring.coreos.com"
default_command: "__"
infoview:
  name: "Prometheus Rule Data"
  annotations: null
  labels: null
  infopad:
    name_path: ""
    creation_timestamp_path: ""
    row_indexes:
      Normal:
        fields: ["name", "group", "labels", "rule_type", "duration",
                 "runbook_url", "description", "summary", "message"]
    rows:
      description:
        header: [["D", ["main", "infoheader_shortcut"]],
                 ["escription:", ["main", "infoheader"]]]
        path: "annotations#description"
        default: "<none>"
        type: "str"
      duration:
        header: [["Duration:", ["main", "infoheader"]]]
        path: "for"
        default: "<unset>"
        type: "str"
        formatter: "numerical"
      group:
        header: [["Group:", ["main", "infoheader"]]]
        path: "_extra_data#group"
        default: "<unset>"
        type: "str"
      labels:
        header: [["Labe", ["main", "infoheader"]],
                 ["l", ["main", "infoheader_shortcut"]],
                 ["s:", ["main", "infoheader"]]]
        paths:
          - path: ["labels"]
            pathtype: "key_value"
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "selector"
      message:
        header: [["Message:", ["main", "infoheader"]]]
        path: "annotations#message"
        default: "<none>"
        type: "str"
      name:
        header: [["Name:", ["main", "infoheader"]]]
        path: "_extra_data#name"
        default: "<unset>"
        type: "str"
      rule_type:
        header: [["Rule Type:", ["main", "infoheader"]]]
        path: "_extra_data#rtype"
        default: "<unset>"
        type: "str"
      runbook_url:
        header: [["Runbook ", ["main", "infoheader"]],
                 ["U", ["main", "infoheader_shortcut"]],
                 ["RL:", ["main", "infoheader"]]]
        path: "annotations#runbook_url"
        default: "<none>"
        type: "str"
        formatting:
          field_colors:
            - type: "url"
      summary:
        header: [["S", ["main", "infoheader_shortcut"]],
                 ["ummary:", ["main", "infoheader"]]]
        path: "annotations#summary"
        default: "<none>"
        type: "str"
  logpad:
    infogetter: "logpad_formatted"
    infogetter_args:
      formatter: "format_promql"
      path: "expr"
    timestamps: false
  shortcuts:
    # __PrometheusRuleData has no JSON/YAML,
    # last applied configuration, or events
    "Last Applied Configuration": null
    "Show Events": null
    "View YAML dump": null
    "Description":
      key: "d"
      modifier: "shift"
      read_only: true
      helptext: "Show description"
      widget: "windowwidget"
      title: "Description:"
      itemgetter: "get_strings_from_string"
      itemgetter_args:
        path: "annotations#description"
        # If the data is one single line we reformat it.
        wrap_lines: true
    "Summary":
      key: "s"
      modifier: "shift"
      read_only: true
      helptext: "Show summary"
      widget: "windowwidget"
      title: "Summary:"
      itemgetter: "get_strings_from_string"
      itemgetter_args:
        path: "annotations#summary"
        # If the data is one single line we reformat it.
        wrap_lines: true
    "Labels":
      key: "l"
      read_only: true
      helptext: "Show labels"
      widget: "windowwidget"
      title: "Labels:"
      headers: ["Key:", "Value:"]
      itemgetter: "get_key_value"
      itemgetter_args:
        path: "labels"
    "Open Runbook URL":
      key: "u"
      modifier: "shift"
      read_only: true
      helptext: "Open Runbook URI in browser"
      action: "execute"
      action_args:
        command: ["xdg-open",
                  ["annotations#runbook_url"]]
