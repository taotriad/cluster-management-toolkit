---
kind: "Console"
api_family: "operator.openshift.io"
default_command: "consoles.operator.openshift.io"
listview:
  name: "Consoles"
  group: "OpenShift"
  field_indexes:
    Normal:
      fields: ["name", "ready_replicas", "age"]
  fields:
    ready_replicas:
      header: "Ready Replicas:"
      path: "status#readyReplicas"
      type: "int"
      formatter: "numerical"
      align: "right"
infoview:
  name: "Console Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["plugins", "loglevel", "operator_loglevel",
                 "management_state", "ready_replicas"]
    rows:
      loglevel:
        header: [["Loglevel:", ["main", "infoheader"]]]
        path: "spec#logLevel"
        default: "<unset>"
        type: "str"
      management_state:
        header: [["Management State:", ["main", "infoheader"]]]
        path: "spec#managementState"
        default: "<unset>"
        type: "str"
      operator_loglevel:
        header: [["Operator Loglevel:", ["main", "infoheader"]]]
        path: "spec#operatorLogLevel"
        default: "<unset>"
        type: "str"
      plugins:
        header: [["P", ["main", "infoheader_shortcut"]],
                 ["lugins:", ["main", "infoheader"]]]
        path: "spec#plugins"
        default: ["<none>"]
        type: "raw"
        formatter: "list"
      ready_replicas:
        header: [["Ready Replicas:", ["main", "infoheader"]]]
        path: "status#readyReplicas"
        default: "<unset>"
        type: "int"
        formatter: "numerical"
  logpad:
    infogetter: "logpad_formatted"
    infogetter_args:
      path: "spec#observedConfig"
      formatter: "format_yaml"
    timestamps: false
  shortcuts:
    "List plugins":
      key: "p"
      modifier: "shift"
      read_only: true
      helptext: "List plugins"
      widget: "windowwidget"
      widget_args:
        title: "Plugins:"
        itemgetter: "get_list_as_list"
        itemgetter_args:
          path: "spec#plugins"
    "List generations":
      key: "g"
      read_only: true
      helptext: "List generations"
      widget: "windowwidget"
      widget_args:
        title: "Generations:"
        headers: ["Resource:", "Group:", "Namespace:", "Name:"]
        selectable: true
        itemgetter: "get_list_fields"
        itemgetter_args:
          path: "status#generations"
          fields:
            - "resource"
            - "group"
            - "namespace"
            - "name"
        # Not supported for now
        sortcolumn: "resource"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        kind_path: 0
        api_group_path: 1
        namespace_path: 2
        name_path: 3
    "View customization":
      key: "z"
      read_only: true
      helptext: "Show customization"
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "Customization"
        _pass_obj: true
        path: "spec#customization"
    "View observed configuration":
      key: "o"
      read_only: true
      helptext: "Show observed configuration"
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "Observed Configuration"
        _pass_obj: true
        path: "spec#observedConfig"
