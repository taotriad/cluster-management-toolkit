---
kind: "ImagePruner"
api_family: "imageregistry.operator.openshift.io"
default_command: "imagepruners"
listview:
  name: "Image Pruners"
  group: "OpenShift"
  field_indexes:
    Normal:
      fields: ["name", "suspended", "age"]
  fields:
    suspended:
      header: "Suspended:"
      path: "spec#suspend"
      default: false
      type: "bool"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            "False":
              field_colors:
                - context: "main"
                  type: "status_ok"
            "True":
              field_colors:
                - context: "main"
                  type: "status_pending"
  actions:
    actionlist:
      "Resume resource":
        description: "Resume resource"
        category: "Resource Level"
        actionfunc: "patch_resource"
        extravars:
          action_str: "Resuming"
          args:
            patch:
              spec:
                suspend: false
            strategic_merge: true
      "Suspend resource":
        description: "Suspend resource"
        category: "Resource Level"
        actionfunc: "patch_resource"
        extravars:
          action_str: "Suspending"
          args:
            patch:
              spec:
                suspend: true
            strategic_merge: true
infoview:
  name: "Image Pruner Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["successful_jobs_history_limit",
                 "failed_jobs_history_limit",
                 "ignore_invalid_image_references",
                 "keep_tag_revisions",
                 "loglevel", "schedule", "suspended"]
    rows:
      failed_jobs_history_limit:
        header: [["Failed Jobs History Limit:", ["main", "infoheader"]]]
        path: "spec#failedJobsHistoryLimit"
        type: "int"
        formatter: "numerical"
      ignore_invalid_image_references:
        header: [["Ignore Invalid Image References:", ["main", "infoheader"]]]
        path: "spec#ignoreInvalidImageReferences"
        type: "bool"
      keep_tag_revisions:
        header: [["Keep Tag Revisions:", ["main", "infoheader"]]]
        path: "spec#keepTagRevisions"
        type: "int"
        formatter: "numerical"
      loglevel:
        header: [["Loglevel:", ["main", "infoheader"]]]
        path: "spec#logLevel"
        type: "str"
      schedule:
        header: [["Schedule:", ["main", "infoheader"]]]
        path: "spec#schedule"
        default: "<unset>"
        fallback_on_empty: true
        type: "str"
      successful_jobs_history_limit:
        header: [["Successful Jobs History Limit:", ["main", "infoheader"]]]
        path: "spec#successfulJobsHistoryLimit"
        type: "int"
        formatter: "numerical"
      suspended:
        header: [["Suspended:", ["main", "infoheader"]]]
        path: "spec#suspend"
        type: "bool"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              "False":
                field_colors:
                  - context: "main"
                    type: "status_ok"
              "True":
                field_colors:
                  - context: "main"
                    type: "status_pending"
