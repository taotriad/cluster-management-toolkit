---
kind: "AntreaAgentInfo"
api_family: "crd.antrea.io"
default_command: "antreaagentinfos"
command:
  - "aai"
listview:
  name: "Antrea Agent Infos"
  group: "Antrea"
  field_indexes:
    Normal:
      fields: ["name", "healthy", "last_heartbeat",
               "version", "node_name", "subnets", "age"]
  fields:
    healthy:
      header: "Healthy:"
      paths:
        - path: "agentConditions"
          pathtype: "items"
          subpath: "status"
          when:
            - key: "type"
              eq: "AgentHealthy"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            "True":
              field_colors:
                - context: "main"
                  type: "status_ok"
            "False":
              field_colors:
                - context: "main"
                  type: "status_not_ok"
            "Unknown":
              field_colors:
                - context: "main"
                  type: "status_unknown"
    last_heartbeat:
      header: "Last Heartbeat:"
      paths:
        - path: "agentConditions"
          pathtype: "items"
          subpath: "lastHeartbeatTime"
          when:
            - key: "type"
              eq: "AgentHealthy"
          type: "timestamp"
      formatter: "timestamp"
    node_name:
      header: "Node:"
      path: "nodeRef#name"
      type: "host"
      formatting:
        field_colors:
          - type: "host"
    subnets:
      header: "Subnets:"
      path: "nodeSubnets"
      type: "raw"
      formatter: "address"
    version:
      header: "Version:"
      path: "version"
      type: "str"
      formatting:
        field_colors:
          - type: "version"
infoview:
  name: "Antrea Agent Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["node_name", "pod", "node_subnets",
                 "node_port_local_port_range",
                 "network_info_header",
                 "network_info_pod_mtu",
                 "network_info_transport_interface",
                 "network_info_transport_interface_ips",
                 "network_info_transport_interface_mtu",
                 "api_port", "version"]
    rows:
      api_port:
        header: [["API Port:", ["main", "infoheader"]]]
        path: "apiPort"
        type: "int"
        formatter: "numerical"
        formatting:
          field_colors:
            - type: "port"
      network_info_header:
        header: [["Network Info:", ["main", "infoheader"]]]
      network_info_pod_mtu:
        header: [["  Pod MTU:", ["main", "infoheader"]]]
        path: "networkInfo#podMTU"
        type: "int"
        formatter: "numerical"
      network_info_transport_interface:
        header: [["  Transport Interface:", ["main", "infoheader"]]]
        path: "networkInfo#transportInterface"
        default: "<unset>"
        type: "str"
      network_info_transport_interface_ips:
        header: [["  ", ["main", "infoheader"]],
                 ["T", ["main", "infoheader_shortcut"]],
                 ["ransport Interface IPs:", ["main", "infoheader"]]]
        path: "networkInfo#transportInterfaceIPs"
        type: "raw"
        formatter: "address"
      network_info_transport_interface_mtu:
        header: [["  Transport Interface MTU:", ["main", "infoheader"]]]
        path: "networkInfo#transportInterfaceMTU"
        type: "int"
        formatter: "numerical"
      node_name:
        header: [["No", ["main", "infoheader"]],
                 ["d", ["main", "infoheader_shortcut"]],
                 ["e:", ["main", "infoheader"]]]
        path: "nodeRef#name"
        type: "host"
        formatting:
          field_colors:
            - type: "host"
      node_port_local_port_range:
        header: [["Node Port Local Port Range:", ["main", "infoheader"]]]
        path: "nodePortLocalPortRange"
        type: "str"
        formatter: "numerical"
        formatting:
          field_colors:
            - type: "port"
            - type: "port"
      node_subnets:
        header: [["Node Subnet", ["main", "infoheader"]],
                 ["s", ["main", "infoheader_shortcut"]],
                 [":", ["main", "infoheader"]]]
        path: "nodeSubnets"
        type: "raw"
        formatter: "address"
      pod:
        header: [["P", ["main", "infoheader_shortcut"]],
                 ["od:", ["main", "infoheader"]]]
        paths:
          - path: [["podRef#namespace"], ["podRef#name"]]
            pathtype: "tuple"
        formatter: "list"
        formatting:
          field_colors:
            - type: "namespace"
            - type: "generic"
          field_separators:
            - type: "namespace"
      version:
        header: [["Version:", ["main", "infoheader"]]]
        path: "version"
        type: "str"
        formatting:
          field_colors:
            - type: "version"
  logpad:
    infogetter: "logpad_formatted"
    infogetter_args:
      formatter: "format_yaml"
      path: "ovsInfo"
    timestamps: false
  shortcuts:
    "Network Policy Controller":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "View network policy controller info"
      action: "call"
      action_call: "view_yaml"
      action_args:
        _pass_obj: true
        title: "Network Policy Controller Info"
        path: "networkPolicyControllerInfo"
    "Node":
      key: "d"
      read_only: true
      helptext: "Open info page for Node"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind_path: "nodeRef#kind"
        name_path: "nodeRef#name"
    "Pod":
      key: "p"
      modifier: "shift"
      helptext: "Open info page for Pod"
      read_only: true
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind_path: "podRef#kind"
        name_path: "podRef#name"
        namespace_path: "podRef#namespace"
    "Show Resource Conditions":
      key: "c"
      helptext: "Show resource conditions"
      read_only: true
      widget: "windowwidget"
      title: "Conditions:"
      headers: ["Type:", "Status:", "Last Heartbeat:"]
      itemgetter: "get_list_fields"
      itemgetter_args:
        path: "agentConditions"
        fields:
          - "type"
          - "status"
          - "lastHeartbeatTime"
        override_types: ["", "", "timestamp"]
    "Show Node subnets":
      key: "s"
      read_only: true
      helptext: "List Node subnets"
      widget: "windowwidget"
      title: "Node subnets:"
      itemgetter: "get_list_as_list"
      itemgetter_args:
        path: "nodeSubnets"
    "Show Transport Interface IPs":
      key: "t"
      modifier: "shift"
      read_only: true
      helptext: "List transport interface IPS"
      widget: "windowwidget"
      title: "Transport Interface IPs:"
      itemgetter: "get_list_as_list"
      itemgetter_args:
        path: "networkInfo#transportInterfaceIPs"
