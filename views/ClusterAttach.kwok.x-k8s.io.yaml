---
kind: "ClusterAttach"
api_family: "kwok.x-k8s.io"
default_command: "clusterattaches.kwok.x-k8s.io"
command:
  - "clrattaches.kwok"
  - "clrattach.kwok"
  - "kwokclrattaches"
  - "kwokclrattach"
listview:
  name: "Cluster Attaches"
  group: "Cluster Configuration"
  field_indexes:
    Normal:
      fields: ["name", "age"]
infoview:
  name: "Cluster Attach Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["selector_header",
                 "selector_match_names", "selector_match_namespaces"]
    rows:
      selector_header:
        header: [["Selector:", ["main", "infoheader"]]]
      selector_match_names:
        header: [["  Match Names:", ["main", "infoheader"]]]
        path: "spec#selector#matchNames"
        default: ["ALL"]
        type: "raw"
        formatter: "list"
      selector_match_namespaces:
        header: [["  Match Namespaces:", ["main", "infoheader"]]]
        path: "spec#selector#matchNamespaces"
        default: ["ALL"]
        type: "raw"
        formatter: "list"
        formatting:
          field_colors:
            - type: "namespace"
  listpad:
    listgetter: "listgetter_path"
    listgetter_args:
      path: "spec#attaches"
    infogetter: "generic_infogetter"
    field_indexes:
      Normal:
        fields: ["containers", "logs_file"]
    fields:
      containers:
        header: "Containers:"
        path: "containers"
        default: ["ALL"]
        type: "raw"
        formatter: "list"
      logs_file:
        header: "Logs File:"
        path: "logsFile"
        default: "<none>"
        type: "str"
        formatting:
          field_colors:
            - type: "path"
