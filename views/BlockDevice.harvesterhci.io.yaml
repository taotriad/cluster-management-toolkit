---
kind: "BlockDevice"
api_family: "harvesterhci.io"
default_command: "blockdevices"
command:
  - "blkdevs"
  - "blkdev"
listview:
  name: "Block Devices"
  group: "Harvester"
  field_indexes:
    Wide:
      fields: ["namespace", "name", "node", "type", "path", "mountpoint",
               "state", "phase", "age"]
      sortcolumn: "namespace"
    Normal:
      fields: ["namespace", "name", "state", "phase", "age"]
      sortcolumn: "namespace"
  fields:
    mountpoint:
      header: "Mountpoint:"
      path: "spec#fileSystem#mountPoint"
      fallback_on_empty: true
      default: "<none>"
      type: "str"
      formatting:
        field_colors:
          - type: "path"
    node:
      header: "Node:"
      path: "spec#nodeName"
      default: "<unset>"
      type: "str"
    path:
      header: "Path:"
      path: "spec#devPath"
      default: "<unset>"
      type: "str"
      formatting:
        field_colors:
          - type: "path"
    phase:
      header: "Phase:"
      path: "status#provisionPhase"
      default: "<unset>"
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            "Provisioned":
              field_colors:
                - context: "main"
                  type: "status_done"
            "Unprovisioning":
              field_colors:
                - context: "main"
                  type: "status_pending"
            "Unprovisioned":
              field_colors:
                - context: "main"
                  type: "status_done"
    state:
      header: "State:"
      path: "status#state"
      default: "<unset>"
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            "Active":
              field_colors:
                - context: "main"
                  type: "status_ok"
            "Inactive":
              field_colors:
                - context: "main"
                  type: "status_pending"
            "Unknown":
              field_colors:
                - context: "main"
                  type: "status_ignored"
    type:
      header: "Type:"
      path: "status#deviceStatus#details#deviceType"
      default: "<unset>"
      type: "str"
infoview:
  name: "Block Device Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["node", "type", "path", "mountpoint", "provision",
                 "state", "phase"]
    rows:
      mountpoint:
        header: [["Mountpoint:", ["main", "infoheader"]]]
        path: "spec#fileSystem#mountPoint"
        fallback_on_empty: true
        default: "<none>"
        type: "str"
        formatting:
          field_colors:
            - type: "path"
      node:
        header: [["No", ["main", "infoheader"]],
                 ["d", ["main", "infoheader_shortcut"]],
                 ["e:", ["main", "infoheader"]]]
        path: "spec#nodeName"
        default: "<unset>"
        type: "str"
      path:
        header: [["Path:", ["main", "infoheader"]]]
        path: "spec#devPath"
        default: "<unset>"
        type: "str"
        formatting:
          field_colors:
            - type: "path"
      phase:
        header: [["Phase:", ["main", "infoheader"]]]
        path: "status#provisionPhase"
        default: "<unset>"
        type: "str"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              "Provisioned":
                field_colors:
                  - context: "main"
                    type: "status_done"
              "Unprovisioning":
                field_colors:
                  - context: "main"
                    type: "status_pending"
              "Unprovisioned":
                field_colors:
                  - context: "main"
                    type: "status_done"
      provision:
        header: [["Provision:", ["main", "infoheader"]]]
        path: "spec#provision"
        default: "<unset>"
        type: "bool"
      state:
        header: [["State:", ["main", "infoheader"]]]
        path: "status#state"
        default: "<unset>"
        type: "str"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              "Active":
                field_colors:
                  - context: "main"
                    type: "status_ok"
              "Inactive":
                field_colors:
                  - context: "main"
                    type: "status_pending"
              "Unknown":
                field_colors:
                  - context: "main"
                    type: "status_ignored"
      type:
        header: [["Type:", ["main", "infoheader"]]]
        path: "status#deviceStatus#details#deviceType"
        default: "<unset>"
        type: "str"
  logpad:
    infogetter: "logpad_formatted"
    infogetter_args:
      formatter: "format_yaml"
      path: "status#deviceStatus"
    timestamps: false
  shortcuts:
    "Open Node":
      key: "d"
      read_only: true
      helptext: "Open info page for Node"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind: "Node"
        name_path: "spec#nodeName"
