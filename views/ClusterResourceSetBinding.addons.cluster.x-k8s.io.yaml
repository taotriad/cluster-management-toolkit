---
kind: "ClusterResourceSetBinding"
api_family: "addons.cluster.x-k8s.io"
default_command: "clusterresourcesetbindings"
command:
  - "clrressetbindings"
  - "clrressetbinding"
listview:
  name: "Cluster Resource Set Bindings"
  group: "Cluster Configuration"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "age"]
      sortcolumn: "namespace"
infoview:
  name: "Cluster Resource Set Binding Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["cluster", "cluster_resource_sets"]
    rows:
      cluster:
        header: [["Cl", ["main", "infoheader"]],
                 ["u", ["main", "infoheader_shortcut"]],
                 ["ster:", ["main", "infoheader"]]]
        path: "spec#clusterName"
        default: "<unset>"
        type: "str"
      cluster_resource_sets:
        header: [["Cluster Re", ["main", "infoheader"]],
                 ["s", ["main", "infoheader_shortcut"]],
                 ["ource Sets:", ["main", "infoheader"]]]
        paths:
          - path: "spec#bindings"
            pathtype: "items"
            subpaths:
              - "clusterResourceSetName"
            default: ["<none>"]
        formatter: "list"
  listpad:
    listgetter: "listgetter_path"
    listgetter_args:
      path: "spec#bindings"
    infogetter: "generic_infogetter"
    infogetter_args:
      _extra_data:
        namespace: ["metadata#namespace"]
    on_activation:
      call: "resourceinfodispatch_with_lookup"
      kind: "ClusterResourceSet"
      api_family: "addons.cluster.x-k8s.io"
      namespace_path: "_extra_data#namespace"
      name_path: "clusterResourceSetName"
    field_indexes:
      Normal:
        fields: ["cluster_resource_set", "resources"]
        sortcolumn: "cluster_resource_set"
    fields:
      cluster_resource_set:
        header: "Cluster Resource Set:"
        path: "clusterResourceSetName"
        default: "<unset>"
        type: "str"
      resources:
        header: "Resources:"
        paths:
          - path: "resources"
            pathtype: "items"
            subpaths:
              - "kind"
              - "name"
            type: ["kind", "name"]
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "generic"
          field_separators:
            - type: "kind"
  shortcuts:
    "Open Cluster":
      key: "u"
      read_only: true
      helptext: "Open info page for Cluster"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind: "Cluster"
        api_family: "cluster.x-k8s.io"
        name_path: "spec#clusterName"
        namespace_path: "metadata#namespace"
    "List Cluster Resource Sets":
      key: "s"
      read_only: true
      helptext: "List Cluster Resource Sets"
      widget: "windowwidget"
      title: "Cluster Resource Sets:"
      itemgetter: "get_list_fields"
      itemgetter_args:
        path: "spec#bindings"
        fields:
          - "clusterResourceSetName"
      # This isn't supported for now
      sortcolumn: "name"
      selectable: true
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        kind: "ClusterResourceSet"
        api_family: "addons.cluster.x-k8s.io"
        name_path: 0
        _parent_namespace_path: "metadata#namespace"
