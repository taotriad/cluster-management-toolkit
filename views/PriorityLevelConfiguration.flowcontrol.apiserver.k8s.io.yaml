---
kind: "PriorityLevelConfiguration"
api_family: "flowcontrol.apiserver.k8s.io"
default_command: "prioritylevelconfigurations"
command:
  - "priolevelconfs"
  - "priolevelconf"
listview:
  name: "Priority Level Configurations"
  group: "Scheduling & Scaling"
  field_indexes:
    Wide:
      fields: ["name", "controller", "priority_type",
               "nominal_concurrency_shares",
               "queues", "hand_size", "queue_length_limit", "age"]
    Normal:
      fields: ["name", "priority_type", "nominal_concurrency_shares",
               "queues", "hand_size", "queue_length_limit", "age"]
  fields:
    controller:
      header: "Controller:"
      paths:
        - path: "metadata#ownerReferences"
          pathtype: "items"
          subpaths:
            - "kind"
            - "apiVersion"
            - "name"
          when:
            - key: "controller"
              eq: true
          type: ["kind", "api_group", "name"]
          default: ["<none>"]
      formatter: "list"
      formatting:
        field_colors:
          - type: "kind"
          - type: "api_group"
          - type: "generic"
        field_separators:
          - type: "kind_api_group"
          - type: "kind"
    hand_size:
      header: "Hand Size:"
      path: "spec#limited#limitResponse#queuing#handSize"
      type: "raw"
      formatter: "numerical"
      align: "right"
    nominal_concurrency_shares:
      header: "Nominal Concurrency Shares:"
      paths:
        - path: ["spec#limited#nominalConcurrencyShares",
                 "spec#limited#assuredConcurrencyShares"]
          pathtype: "value"
      formatter: "numerical"
      align: "right"
    priority_type:
      header: "Priority Type:"
      path: "spec#type"
      type: "str"
    queue_length_limit:
      header: "Queue Length List:"
      path: "spec#limited#limitResponse#queuing#queueLengthLimit"
      type: "raw"
      formatter: "numerical"
      align: "right"
    queues:
      header: "Queues:"
      path: "spec#limited#limitResponse#queuing#queues"
      type: "raw"
      formatter: "numerical"
      align: "right"
  actions:
    actionlist:
      "Delete resource":
        description: "Delete resource"
        category: "Resource Level"
        confirm: true
        actionfunc: "delete_resource"
infoview:
  name: "Priority Level Configuration Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["controller", "priority_type",
                 "nominal_concurrency_shares", "queues",
                 "hand_size", "queue_length_limit", "queues"]
    rows:
      controller:
        header: [["C", ["main", "infoheader_shortcut"]],
                 ["ontroller:", ["main", "infoheader"]]]
        paths:
          - path: "metadata#ownerReferences"
            pathtype: "items"
            subpaths:
              - "kind"
              - "apiVersion"
              - "name"
            when:
              - key: "controller"
                eq: true
            type: ["kind", "api_group", "name"]
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
      hand_size:
        header: [["Hand Size:", ["main", "infoheader"]]]
        path: "spec#limited#limitResponse#queuing#handSize"
        default: "<unset>"
        type: "raw"
        formatter: "numerical"
      nominal_concurrency_shares:
        header: [["Nominal Concurrency Shares:", ["main", "infoheader"]]]
        paths:
          - path: "spec#limited#assuredConcurrencyShares"
            pathtype: "value"
            default: "<unset>"
        formatter: "numerical"
      priority_type:
        header: [["Priority Type:", ["main", "infoheader"]]]
        path: "spec#type"
        type: "str"
      queue_length_limit:
        header: [["Queue Length List:", ["main", "infoheader"]]]
        path: "spec#limited#limitResponse#queuing#queueLengthLimit"
        default: "<unset>"
        type: "raw"
        formatter: "numerical"
      queues:
        header: [["Queues:", ["main", "infoheader"]]]
        path: "spec#limited#limitResponse#queuing#queues"
        default: "<unset>"
        type: "raw"
        formatter: "numerical"
  shortcuts:
    "Open controller":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for controller"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        namespace_path: "metadata#namespace"
        owner_reference_path: "metadata#ownerReferences"
