---
kind: "CatalogSource"
api_family: "operators.coreos.com"
default_command: "catalogsources"
command:
  - "catsrcs"
  - "catsrc"
listview:
  name: "Catalog Sources"
  group: "API & Extendability"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "display_name",
               "source_type", "publisher", "priority", "age"]
      sortcolumn: "priority"
  fields:
    display_name:
      header: "Display Name:"
      path: "spec#displayName"
      type: "str"
    priority:
      header: "Priority:"
      path: "spec#priority"
      default: "<unset>"
      type: "int"
      formatter: "numerical"
      align: "right"
    publisher:
      header: "Publisher:"
      path: "spec#publisher"
      type: "str"
    source_type:
      header: "Source Type:"
      path: "spec#sourceType"
      type: "str"
infoview:
  name: "Catalogue Source Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["display_name", "image", "publisher",
                 "source_type", "priority"]
    rows:
      display_name:
        header: [["Display Name:", ["main", "infoheader"]]]
        path: "spec#displayName"
        type: "str"
      image:
        header: [["Image:", ["main", "infoheader"]]]
        paths:
          - path: "spec#image"
            pathtype: "regex"
            regex: "^([^:]+):(.*)"
        formatter: "list"
        formatting:
          field_colors:
            - type: "generic"
            - type: "version"
          field_separators:
            - type: "version"
      priority:
        header: [["Priority:", ["main", "infoheader"]]]
        path: "spec#priority"
        default: "<unset>"
        type: "int"
        formatter: "numerical"
      publisher:
        header: [["Publisher:", ["main", "infoheader"]]]
        path: "spec#publisher"
        type: "str"
      source_type:
        header: [["Source Type:", ["main", "infoheader"]]]
        path: "spec#sourceType"
        type: "str"
  shortcuts:
    "gRPC Pod Config":
      key: "g"
      helptext: "Show gRPC Pod Config"
      read_only: true
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "gRPC Pod Config"
        _pass_obj: true
        path: "spec#grpcPodConfig"
