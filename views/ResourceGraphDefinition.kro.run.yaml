---
kind: "ResourceGraphDefinition"
api_family: "kro.run"
default_command: "resourcegraphdefinitions"
command:
  - "resgraphdefs"
  - "resgraphdef"
  - "rgdefs"
  - "rgdef"
listview:
  name: "Resource Graph Definitions"
  group: "Workloads"
  field_indexes:
    Wide:
      fields: ["name", "kind", "state", "age", "topological_order"]
    Normal:
      fields: ["name", "kind", "state", "age"]
  fields:
    kind:
      header: "Kind:"
      paths:
        - path: [["spec#schema#kind"], ["spec#schema#group"]]
          pathtype: "tuple"
          type: ["kind", "kind"]
          default: ["<none>", ""]
      formatter: "list"
      formatting:
        field_colors:
          - type: "kind"
          - type: "api_group"
        field_separators:
          - type: "kind_api_group"
    state:
      header: "State:"
      path: "status#state"
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            "Active":
              field_colors:
                - context: "main"
                  type: "status_ok"
            "Inactive":
              field_colors:
                - context: "main"
                  type: "status_pending"
    topological_order:
      header: "Topological Order:"
      path: "status#topologicalOrder"
      default: ["<none>"]
      type: "raw"
      formatter: "list"
infoview:
  name: "Resource Graph Definition Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["kind", "topological_order", "state"]
    rows:
      kind:
        header: [["K", ["main", "infoheader_shortcut"]],
                 ["ind:", ["main", "infoheader"]]]
        paths:
          - path: [["spec#schema#kind"], ["spec#schema#group"]]
            pathtype: "tuple"
            type: ["kind", "kind"]
            default: ["<none>", ""]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
          field_separators:
            - type: "kind_api_group"
      state:
        header: [["State:", ["main", "infoheader"]]]
        path: "status#state"
        type: "str"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              "Active":
                field_colors:
                  - context: "main"
                    type: "status_ok"
              "Inactive":
                field_colors:
                  - context: "main"
                    type: "status_pending"
      topological_order:
        header: [["T", ["main", "infoheader_shortcut"]],
                 ["opological Order:", ["main", "infoheader"]]]
        path: "status#topologicalOrder"
        default: ["<none>"]
        type: "raw"
        formatter: "list"
  listpad:
    listgetter: "listgetter_path"
    listgetter_args:
      path: "spec#resources"
    infogetter: "generic_infogetter"
    on_activation:
      call: "resourceinfodispatch"
      kind: "__ResourceGraphDefinitionTemplate"
      api_family: "kro.run"
    field_indexes:
      Normal:
        fields: ["id", "name", "kind"]
        sortcolumn: "id"
    fields:
      id:
        header: "ID:"
        path: "id"
        type: "str"
      kind:
        header: "Kind:"
        paths:
          - path: [["template#kind"], ["template#group"]]
            pathtype: "tuple"
            type: ["kind", "api_group"]
            default: ["<none>", ""]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
          field_separators:
            - type: "kind_api_group"
      name:
        header: "Name:"
        path: "template#metadata#name"
        type: "str"
  shortcuts:
    "Show Instances":
      key: "k"
      modifier: "shift"
      read_only: true
      helptext: "Show instances"
      widget: "windowwidget"
      widget_args:
        title: "Instances:"
        headers: ["Namespace:", "Name:", "State:", "Age:"]
        selectable: true
        itemgetter: "get_kubernetes_objects"
        itemgetter_args:
          field_paths:
            - "metadata#namespace"
            - "metadata#name"
            - "status#state"
            - "metadata#creationTimestamp"
          kind_path: "spec#schema#kind"
          api_family_path: "spec#schema#group"
          api_version_path: "spec#schema#apiVersion"
          namespaced_resource: true
          guess_kind: false
      action: "call"
      action_call: "resourceinfodispatch_from_selection"
      action_args:
        kind: "__KROInstance"
        api_family: "kro.run"
    "Show Schema":
      key: "s"
      modifier: "shift"
      read_only: true
      helptext: "Show schema"
      action: "call"
      action_call: "view_yaml"
      action_args:
        title: "Schema"
        _pass_obj: true
        path: "spec#schema"
    "Show Topological Order":
      key: "t"
      modifier: "shift"
      read_only: true
      helptext: "Show topological order"
      widget: "windowwidget"
      widget_args:
        title: "Topological Order:"
        itemgetter: "get_list_as_list"
        itemgetter_args:
          path: "status#topologicalOrder"
