---
kind: "__ResourceView"
default_command: "__"
infoview:
  name: "Resource Viewer"
  logpad:
    infogetter: "get_themearrays"
    timestamps: false
  infoview_args:
    decoder:
      override_decoder: false
      decoder: "decode_base64"
    formatter_args:
      unfold_msg: false
      focus_mode: "Disabled"
      focus_filters:
        Disabled: []
        Partial:
          - ["metadata#annotations", "lastAppliedconfiguration"]
          - ["metadata", "generation"]
          - ["metadata", "managedFields"]
          - ["metadata", "resourceVersion"]
          - ["metadata", "uid"]
          - ["status", "observedGeneration"]
        Full:
          - ["metadata#annotations",
             "kubectl.kubernetes.io/last-applied-configuration"]
          - ["metadata", "creationTimestamp"]
          - ["metadata", "finalizers"]
          - ["metadata", "generation"]
          - ["metadata", "managedFields"]
          - ["metadata", "ownerReferences"]
          - ["metadata", "resourceVersion"]
          - ["metadata", "uid"]
          - "status"
  statusmsg:
    - ["Decode Base64: ", ["var", "decoder#override_decoder"]]
    - ["Formatter: ", ["var", "formatter"]]
    - ["Unfold Message: ", ["var", "formatter_args#unfold_msg"]]
    - ["Focus Mode: ", ["var", "formatter_args#focus_mode"]]
  shortcuts:
    # __ResourceView has no last applied configuration or events,
    # and is a YAML-viewer so cannot view itself...
    "Show Events": null
    "Last Applied Configuration": null
    "View YAML dump": null
    "Owner References": null
    "Export Data":
      key: "e"
      modifier: "shift"
      read_only: false
      widget: "inputbox"
      helptext: "Export to file"
      inputtitle: "Export to file:"
      confirm: "path_exists"
      confirmtitle: "File already exists; overwrite?:"
      action: "call"
      action_call: "export_data"
      action_args:
        _pass_result: true
        _pass_obj: true
        _extra_args:
          raw_export: true
          base_path: ""
    "Focus Mode":
      key: "f"
      read_only: true
      helptext: "Cycle Focus Mode (JSON/YAML only)"
      action: "cycle_var"
      action_args:
        var: "formatter_args#focus_mode"
        var_options:
          - "Disabled"
          - "Partial"
          - "Full"
      force_update: true
    "Toggle Base64":
      key: "&"
      read_only: true
      helptext: "Toggle (attempted) Base64 decode on/off"
      action: "toggle_var"
      action_args:
        var: "decoder#override_decoder"
      force_update: true
    "Toggle message unfolding":
      key: "f"
      modifier: "shift"
      read_only: true
      helptext: "Toggle message unfolding"
      action: "toggle_var"
      action_args:
        var: "formatter_args#unfold_msg"
      force_update: true
