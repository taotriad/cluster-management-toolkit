---
kind: "__ServiceMonitorEndpoint"
api_family: "monitoring.coreos.com"
default_command: "__"
infoview:
  name: "Service Monitor Endpoint Info"
  infopad:
    name_path: null
    row_indexes:
      Normal:
        fields: ["enable_http2", "honor_labels", "honor_timestamps",
                 "authorization_header",
                 "authorization_authorization_header_credentials_header",
                 "authorization_authorization_header_credentials_type",
                 "authorization_authorization_header_credentials_key",
                 "authorization_authorization_header_credentials_name",
                 "authorization_authorization_header_credentials_optional",
                 "authorization_basic_auth_header",
                 "authorization_basic_auth_password_header",
                 "authorization_basic_auth_password_key",
                 "authorization_basic_auth_password_name",
                 "authorization_basic_auth_password_optional",
                 "authorization_basic_auth_username_header",
                 "authorization_basic_auth_username_key",
                 "authorization_basic_auth_username_name",
                 "authorization_basic_auth_username_optional",
                 "authorization_bearer_token_file",
                 "path", "port", "scheme",
                 "scrape_timeout", "interval", "tls_config_header",
                 "tls_config_insecure_skip_verify",
                 "tls_config_server_name", "tls_config_ca_header",
                 "tls_config_ca_file", "tls_config_ca_secret_header",
                 "tls_config_ca_secret_name", "tls_config_ca_secret_key",
                 "tls_config_ca_secret_optional"]
    rows:
      authorization_authorization_header_credentials_header:
        header: [["  Authorization Header Credentials:",
                  ["main", "infoheader"]]]
      authorization_authorization_header_credentials_key:
        header: [["      Key:", ["main", "infoheader"]]]
        # TODO: Add shortcut to secret
        path: "authorization#credentials#key"
        default: "<unset>"
        type: "str"
      authorization_authorization_header_credentials_name:
        header: [["      Name:", ["main", "infoheader"]]]
        path: "authorization#credentials#name"
        default: "<unset>"
        type: "str"
      authorization_authorization_header_credentials_optional:
        header: [["      Optional:", ["main", "infoheader"]]]
        path: "authorization#credentials#optional"
        default: "<unset>"
        type: "bool"
      authorization_authorization_header_credentials_type:
        header: [["    Type:",
                  ["main", "infoheader"]]]
        path: "authorization#type"
        default: "<unset>"
        type: "str"
      authorization_basic_auth_header:
        header: [["  Basic Authentication:", ["main", "infoheader"]]]
      authorization_basic_auth_password_header:
        header: [["    Password:", ["main", "infoheader"]]]
      authorization_basic_auth_password_key:
        header: [["      Key:", ["main", "infoheader"]]]
        # TODO: Add shortcut to secret
        path: "basicAuth#password#key"
        default: "<unset>"
        type: "str"
      authorization_basic_auth_password_name:
        header: [["      Name:", ["main", "infoheader"]]]
        path: "basicAuth#password#name"
        default: "<unset>"
        type: "str"
      authorization_basic_auth_password_optional:
        header: [["      Optional:", ["main", "infoheader"]]]
        path: "basicAuth#password#optional"
        default: "<unset>"
        type: "bool"
      authorization_basic_auth_username_header:
        header: [["    Username:", ["main", "infoheader"]]]
      authorization_basic_auth_username_key:
        header: [["      Key:", ["main", "infoheader"]]]
        # TODO: Add shortcut to secret
        path: "basicAuth#username#key"
        default: "<unset>"
        type: "str"
      authorization_basic_auth_username_name:
        header: [["      Name:", ["main", "infoheader"]]]
        path: "basicAuth#username#name"
        default: "<unset>"
        type: "str"
      authorization_basic_auth_username_optional:
        header: [["      Optional:", ["main", "infoheader"]]]
        path: "basicAuth#username#optional"
        default: "<unset>"
        type: "bool"
      authorization_header:
        header: [["Authorization:", ["main", "infoheader"]]]
      authorization_bearer_token_file:
        header: [["  Bearer Token File (Deprecated):", ["main", "infoheader"]]]
        path: "bearerTokenFile"
        default: "<unset>"
        type: "str"
        formatting:
          field_colors:
            - type: "path"
      authorization_bearer_token_secret_header:
        header: [["    Username:", ["main", "infoheader"]]]
      authorization_bearer_token_secret_key:
        header: [["      Key:", ["main", "infoheader"]]]
        # TODO: Add shortcut to secret
        path: "bearerTokenSecret#key"
        default: "<unset>"
        type: "str"
      authorization_bearer_token_secret_name:
        header: [["      Name:", ["main", "infoheader"]]]
        path: "bearerTokenSecret#name"
        default: "<unset>"
        type: "str"
      authorization_bearer_token_secret_optional:
        header: [["      Optional:", ["main", "infoheader"]]]
        path: "bearerTokenSecret#optional"
        default: "<unset>"
        type: "bool"
      enable_http2:
        header: [["Enable HTTP2:", ["main", "infoheader"]]]
        path: "enableHttp2"
        default: "<unset>"
        type: "bool"
      honor_labels:
        header: [["Honor Labels:", ["main", "infoheader"]]]
        path: "honorLabels"
        default: "<unset>"
        type: "bool"
      honor_timestamps:
        header: [["Honor Timestamps:", ["main", "infoheader"]]]
        path: "honorLabels"
        default: "<unset>"
        type: "bool"
      interval:
        header: [["Interval:", ["main", "infoheader"]]]
        path: "interval"
        default: "<unset>"
        type: "str"
        formatter: "numerical"
      path:
        header: [["Path:", ["main", "infoheader"]]]
        path: "path"
        default: "<unset>"
        type: "str"
        formatting:
          field_colors:
            - type: "path"
      port:
        header: [["Port:", ["main", "infoheader"]]]
        path: "port"
        default: "<unset>"
        type: "str"
        formatting:
          field_colors:
            - type: "service"
      scheme:
        header: [["Scheme:", ["main", "infoheader"]]]
        path: "scheme"
        default: "<unset>"
        type: "str"
        formatting:
          field_colors:
            - type: "service"
      scrape_timeout:
        header: [["Scrape Timeout:", ["main", "infoheader"]]]
        path: "scrapeTimeout"
        default: "<unset>"
        type: "str"
        formatter: "numerical"
      tls_config_header:
        header: [["TLS Config:", ["main", "infoheader"]]]
      tls_config_ca_file:
        header: [["    File:", ["main", "infoheader"]]]
        path: "tlsConfig#caFile"
        default: "<unset>"
        type: "str"
        formatting:
          field_colors:
            - type: "path"
      tls_config_ca_header:
        header: [["  CA:", ["main", "infoheader"]]]
      tls_config_ca_secret_header:
        header: [["    Secret:", ["main", "infoheader"]]]
      tls_config_ca_secret_key:
        header: [["      Key:", ["main", "infoheader"]]]
        path: "tlsConfig#ca#secret#key"
        default: "<unset>"
        type: "str"
        formatting:
          field_colors:
            - type: "path"
      tls_config_ca_secret_name:
        header: [["      Name:", ["main", "infoheader"]]]
        path: "tlsConfig#ca#secret#name"
        default: "<unset>"
        type: "str"
        formatting:
          field_colors:
            - type: "path"
      tls_config_ca_secret_optional:
        header: [["      Optional:", ["main", "infoheader"]]]
        path: "tlsConfig#ca#secret#optional"
        default: "<unset>"
        type: "bool"
      tls_config_insecure_skip_verify:
        header: [["  Insecure Skip Verify:", ["main", "infoheader"]]]
        path: "tlsConfig#insecureSkipVerify"
        default: "<unset>"
        type: "bool"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              "False":
                field_colors:
                  - context: "main"
                    type: "status_ok"
              "True":
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
              "<unset>":
                field_colors:
                  - context: "types"
                    type: "unset"
      tls_config_server_name:
        header: [["  Server Name:", ["main", "infoheader"]]]
        path: "tlsConfig#serverName"
        default: "<unset>"
        type: "str"
