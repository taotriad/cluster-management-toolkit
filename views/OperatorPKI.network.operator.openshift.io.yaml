---
kind: "OperatorPKI"
api_family: "network.operator.openshift.io"
default_command: "operatorpkis"
listview:
  name: "Operator PKIs"
  group: "OpenShift"
  field_indexes:
    Wide:
      fields: ["namespace", "name", "controller", "target_certificate", "age"]
      sortcolumn: "namespace"
    Normal:
      fields: ["namespace", "name", "target_certificate", "age"]
      sortcolumn: "namespace"
  fields:
    controller:
      header: "Controller:"
      paths:
        - path: "metadata#ownerReferences"
          pathtype: "items"
          subpaths:
            - "kind"
            - "apiVersion"
            - "name"
          when:
            - key: "controller"
              eq: true
          type: ["kind", "api_group", "name"]
      default: "<none>"
      formatter: "list"
      formatting:
        field_colors:
          - type: "kind"
          - type: "api_group"
          - type: "generic"
        field_separators:
          - type: "kind_api_group"
          - type: "kind"
    target_certificate:
      header: "Target Certificate:"
      path: "spec#targetCert#commonName"
      default: "<unset>"
      type: "str"
infoview:
  name: "Operator PKI Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["controller", "target_certificate"]
    rows:
      controller:
        header: [["C", ["main", "infoheader_shortcut"]],
                 ["ontroller:", ["main", "infoheader"]]]
        paths:
          - path: "metadata#ownerReferences"
            pathtype: "items"
            subpaths:
              - "kind"
              - "apiVersion"
              - "name"
            when:
              - key: "controller"
                eq: true
            type: ["kind", "api_group", "name"]
        default: "<none>"
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
      target_certificate:
        header: [["Target Certificate:", ["main", "infoheader"]]]
        path: "spec#targetCert#commonName"
        default: "<unset>"
        type: "str"
  shortcuts:
    "Open controller":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for controller"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        namespace_path: "metadata#namespace"
        owner_reference_path: "metadata#ownerReferences"
