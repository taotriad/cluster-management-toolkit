---
kind: "ClusterPolicy"
api_family: "nvidia.com"
default_command: "clusterpolicies.nvidia"
command:
  - "clusterpolicy.nvidia"
  - "clrpols.nvidia"
  - "clrpol.nvidia"
  - "clrpols.nv"
  - "clrpol.nv"
  - "nvclusterpolicies"
  - "nvclusterpolicy"
  - "nvclusterpols"
  - "nvclusterpol"
  - "nvclrpols"
  - "nvclrpol"
listview:
  name: "Cluster Policies"
  group: "Accelerators"
  field_indexes:
    Normal:
      fields: ["name", "state", "age"]
  fields:
    state:
      header: "State:"
      path: "status#state"
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            ignored:
              field_colors:
                - context: "main"
                  type: "status_ok"
            notReady:
              field_colors:
                - context: "main"
                  type: "status_not_ok"
            ready:
              field_colors:
                - context: "main"
                  type: "status_ok"
infoview:
  name: "Cluster Policy Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["daemon_sets_header", "daemon_sets_label_selector",
                 "priority_class", "state"]
    rows:
      daemon_sets_header:
        header: [["Daemon Sets:", ["main", "infoheader"]]]
      daemon_sets_label_selector:
        header: [["  La", ["main", "infoheader"]],
                 ["b", ["main", "infoheader_shortcut"]],
                 ["el Selector:", ["main", "infoheader"]]]
        paths:
          - path: ["spec#daemonsets#labels"]
            pathtype: "key_value"
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "key"
            - type: "value"
          field_separators:
            - type: "selector"
      priority_class:
        header: [["  ", ["main", "infoheader"]],
                 ["P", ["main", "infoheader_shortcut"]],
                 ["riority Class:", ["main", "infoheader"]]]
        path: "spec#daemonsets#priorityClassName"
        type: "str"
      state:
        header: [["State:", ["main", "infoheader"]]]
        path: "status#state"
        default: "<unset>"
        type: "str"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              ignored:
                field_colors:
                  - context: "main"
                    type: "status_ignored"
              notReady:
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
              ready:
                field_colors:
                  - context: "main"
                    type: "status_ok"
              "<unset>":
                field_colors:
                  - context: "main"
                    type: "status_ignored"
  logpad:
    infogetter: "logpad_formatted"
    infogetter_args:
      formatter: "format_yaml"
      path: "spec"
    timestamps: false
  shortcuts:
    "Label Selector":
      key: "b"
      read_only: true
      helptext: "Show label selector"
      widget: "windowwidget"
      title: "Label Selector:"
      headers: ["Key:", "Value:"]
      itemgetter: "get_key_value"
      itemgetter_args:
        path: "spec#daemonsets#labels"
    "Priority Class":
      key: "p"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for Priority Class"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind: "PriorityClass"
        api_family: "scheduling.k8s.io"
        name_path: "spec#daemonsets#priorityClassName"
