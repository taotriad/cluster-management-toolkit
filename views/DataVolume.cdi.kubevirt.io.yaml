---
kind: "DataVolume"
api_family: "cdi.kubevirt.io"
default_command: "datavolumes"
command:
  - "datavols"
  - "datavol"
listview:
  name: "Data Volumes"
  group: "Storage & Backups"
  field_indexes:
    Normal:
      fields: ["namespace", "name", "progress", "restarts", "phase", "age"]
      sortcolumn: "namespace"
  fields:
    phase:
      header: "Phase:"
      path: "status#phase"
      default: "<unset>"
      type: "str"
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            CloneFailed:
              field_colors:
                - context: "main"
                  type: "status_not_ok"
            CloneFromSnapshotSourceInProgress:
              field_colors:
                - context: "main"
                  type: "status_pending"
            CloneInProgress:
              field_colors:
                - context: "main"
                  type: "status_pending"
            CloneScheduled:
              field_colors:
                - context: "main"
                  type: "status_pending"
            CloneSucceeded:
              field_colors:
                - context: "main"
                  type: "status_ok"
            CSICloneInProgress:
              field_colors:
                - context: "main"
                  type: "status_pending"
            ExpansionInProgress:
              field_colors:
                - context: "main"
                  type: "status_pending"
            Failed:
              field_colors:
                - context: "main"
                  type: "status_not_ok"
            NamespaceTransferInProgress:
              field_colors:
                - context: "main"
                  type: "status_pending"
            ImportFailed:
              field_colors:
                - context: "main"
                  type: "status_not_ok"
            ImportInProgress:
              field_colors:
                - context: "main"
                  type: "status_pending"
            ImportScheduled:
              field_colors:
                - context: "main"
                  type: "status_pending"
            ImportSucceeded:
              field_colors:
                - context: "main"
                  type: "status_ok"
            Paused:
              field_colors:
                - context: "main"
                  type: "status_pending"
            Pending:
              field_colors:
                - context: "main"
                  type: "status_pending"
            PendingPopulation:
              field_colors:
                - context: "main"
                  type: "status_pending"
            PrepClaimInProgress:
              field_colors:
                - context: "main"
                  type: "status_pending"
            PVCBound:
              field_colors:
                - context: "main"
                  type: "status_ok"
            RebindInProgress:
              field_colors:
                - context: "main"
                  type: "status_pending"
            SmartClonePVCInProgress:
              field_colors:
                - context: "main"
                  type: "status_pending"
            SnapshotForSmartCloneInProgress:
              field_colors:
                - context: "main"
                  type: "status_pending"
            Succeeded:
              field_colors:
                - context: "main"
                  type: "status_ok"
            Unknown:
              field_colors:
                - context: "main"
                  type: "status_unknown"
            UploadFailed:
              field_colors:
                - context: "main"
                  type: "status_not_ok"
            UploadReady:
              field_colors:
                - context: "main"
                  type: "status_done"
            UploadScheduled:
              field_colors:
                - context: "main"
                  type: "status_pending"
            UploadSucceeded:
              field_colors:
                - context: "main"
                  type: "status_ok"
            WaitForFirstConsumer:
              field_colors:
                - context: "main"
                  type: "status_pending"
    progress:
      header: "Progress:"
      path: "status#progress"
      default: "<unset>"
      type: "str"
      formatter: "numerical"
      align: "right"
    restarts:
      header: "Restarts:"
      path: "status#restartCount"
      default: "<unset>"
      type: "int"
      formatter: "numerical"
      align: "right"
infoview:
  name: "Data Volume Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["persistent_volume_claim",
                 "source_header",
                 "source_http_header",
                 "source_http_uri",
                 "access_modes",
                 "volume_mode",
                 "progress", "restarts", "phase"]
    rows:
      access_modes:
        header: [["Access Modes:", ["main", "infoheader"]]]
        paths:
          - path: "spec#storage#accessModes"
            pathtype: "remap"
            substitutions:
              "ReadWriteOnce": "RWO"
              "ReadWriteOncePod": "RWOP"
              "ReadWriteMany": "RWM"
              "ReadOnlyMany": "ROX"
        type: "raw"
        formatter: "list"
      persistent_volume_claim:
        header: [["P", ["main", "infoheader_shortcut"]],
                 ["ersistent Volume Claim:", ["main", "infoheader"]]]
        path: "status#claimName"
        default: "<none>"
        type: "str"
      phase:
        header: [["Phase:", ["main", "infoheader"]]]
        path: "status#phase"
        default: "<unset>"
        type: "str"
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              CloneFailed:
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
              CloneFromSnapshotSourceInProgress:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              CloneInProgress:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              CloneScheduled:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              CloneSucceeded:
                field_colors:
                  - context: "main"
                    type: "status_ok"
              CSICloneInProgress:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              ExpansionInProgress:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              Failed:
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
              NamespaceTransferInProgress:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              ImportFailed:
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
              ImportInProgress:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              ImportScheduled:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              ImportSucceeded:
                field_colors:
                  - context: "main"
                    type: "status_ok"
              Paused:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              Pending:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              PendingPopulation:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              PrepClaimInProgress:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              PVCBound:
                field_colors:
                  - context: "main"
                    type: "status_ok"
              RebindInProgress:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              SmartClonePVCInProgress:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              SnapshotForSmartCloneInProgress:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              Succeeded:
                field_colors:
                  - context: "main"
                    type: "status_ok"
              Unknown:
                field_colors:
                  - context: "main"
                    type: "status_unknown"
              UploadFailed:
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
              UploadReady:
                field_colors:
                  - context: "main"
                    type: "status_done"
              UploadScheduled:
                field_colors:
                  - context: "main"
                    type: "status_pending"
              UploadSucceeded:
                field_colors:
                  - context: "main"
                    type: "status_ok"
              WaitForFirstConsumer:
                field_colors:
                  - context: "main"
                    type: "status_pending"
      progress:
        header: [["Progress:", ["main", "infoheader"]]]
        path: "status#progress"
        default: "<unset>"
        type: "str"
        formatter: "numerical"
      restarts:
        header: [["Restarts:", ["main", "infoheader"]]]
        path: "status#restartCount"
        default: "<unset>"
        type: "int"
        formatter: "numerical"
      source_header:
        header: [["Source:", ["main", "infoheader"]]]
      source_http_header:
        header: [["  HTTP:", ["main", "infoheader"]]]
      source_http_uri:
        header: [["    URI:", ["main", "infoheader"]]]
        path: "spec#source#http#url"
        default: "<unset>"
        type: "str"
        formatter: "address"
      volume_mode:
        header: [["Volume Mode:", ["main", "infoheader"]]]
        path: "spec#storage#volumeMode"
        default: "<unset>"
        type: "str"
  shortcuts:
    "Persistent Volume Claim":
      key: "p"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for Persistent Volume Claim"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind: "PersistentVolumeClaim"
        name_path: "status#claimName"
        namespace_path: "metadata#namespace"
    "Show storage resources":
      key: "r"
      modifier: "shift"
      read_only: true
      helptext: "Show storage resources"
      title: "Storage Resources:"
      widget: "windowwidget"
      headers: ["Request Type:", "Resource:"]
      itemgetter: "get_key_value"
      itemgetter_args:
        path: "spec#storage#resources"
        ignored_keys:
          - "claims"
      # This isn't supported for now
      sortcolumn: "requests"
