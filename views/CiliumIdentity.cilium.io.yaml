---
kind: "CiliumIdentity"
api_family: "cilium.io"
default_command: "ciliumidentities"
command:
  - "ciliumids"
  - "ciliumid"
listview:
  name: "Cilium Identities"
  group: "Cilium"
  field_indexes:
    Normal:
      fields: ["name", "age"]
infoview:
  name: "Cilium Identity Info"
  infopad: null
  listpad:
    listgetter: "listgetter_dict_list"
    listgetter_args:
      path: "security-labels"
    infogetter: "generic_infogetter"
    field_indexes:
      Normal:
        fields: ["label", "value"]
    fields:
      label:
        header: "Security Label:"
        path: "key"
        type: "str"
        formatting:
          field_colors:
            - type: "key"
      value:
        header: "Value:"
        path: "value"
        type: "str"
        formatting:
          field_colors:
            - type: "value"
