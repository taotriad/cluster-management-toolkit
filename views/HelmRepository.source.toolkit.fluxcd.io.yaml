---
kind: "HelmRepository"
api_family: "source.toolkit.fluxcd.io"
default_command: "helmrepositories.source.toolkit.fluxcd.io"
command:
  - "helmrepos.fluxcd"
  - "helmrepo.fluxcd"
  - "helmrepos.flux"
  - "helmrepo.flux"
listview:
  name: "Helm Repositories"
  group: "CI / CD"
  field_indexes:
    Wide:
      fields: ["namespace", "name", "url", "status", "ready", "age"]
      sortcolumn: "namespace"
    Normal:
      fields: ["namespace", "name", "status", "ready", "age"]
      sortcolumn: "namespace"
  fields:
    ready:
      header: "Ready:"
      paths:
        - path: "status#conditions"
          pathtype: "items"
          subpath: "status"
          when:
            - key: "type"
              eq: "Ready"
      default: "<unset>"
      type: "str"
    status:
      header: "Status:"
      paths:
        - path: "status#conditions"
          pathtype: "items"
          subpath: "reason"
          when:
            - key: "type"
              eq: "Ready"
      default: "<unset>"
      type: "str"
    url:
      header: "URL:"
      path: "spec#url"
      default: "<unset>"
      type: "str"
      formatter: "address"
infoview:
  name: "Helm Repository Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["provider", "type", "interval", "url"]
    rows:
      interval:
        header: [["Interval:", ["main", "infoheader"]]]
        path: "spec#interval"
        type: "str"
        formatter: "numerical"
      provider:
        header: [["Provider:", ["main", "infoheader"]]]
        path: "spec#provider"
        default: "<unset>"
        type: "str"
      type:
        header: [["Type:", ["main", "infoheader"]]]
        path: "spec#type"
        default: "<unset>"
        type: "str"
      url:
        header: [["URL:", ["main", "infoheader"]]]
        path: "spec#url"
        default: "<unset>"
        type: "str"
        formatter: "address"
