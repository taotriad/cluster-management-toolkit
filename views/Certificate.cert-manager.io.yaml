---
kind: "Certificate"
api_family: "cert-manager.io"
default_command: "certificates"
command:
  - "certs"
  - "cert"
listview:
  name: "Certificates"
  group: "Certificate Management"
  field_indexes:
    Wide:
      fields: ["namespace", "name", "controller", "secret_name",
               "issuer", "condition_ready", "age", "status_message"]
      sortcolumn: "namespace"
    Normal:
      fields: ["namespace", "name", "secret_name",
               "issuer", "condition_ready", "age", "status_message"]
      sortcolumn: "namespace"
  fields:
    condition_ready:
      header: "Ready:"
      paths:
        - path: "status#conditions"
          pathtype: "items"
          subpath: "status"
          when:
            - key: "type"
              eq: "Ready"
          default: ["<unknown>"]
      formatter: "value_mapper"
      formatting:
        mapping:
          mappings:
            "True":
              field_colors:
                - context: "main"
                  type: "status_ok"
            "False":
              field_colors:
                - context: "main"
                  type: "status_not_ok"
            "<unknown>":
              field_colors:
                - context: "main"
                  type: "status_unknown"
    controller:
      header: "Controller:"
      paths:
        - path: "metadata#ownerReferences"
          pathtype: "items"
          subpaths:
            - "kind"
            - "apiVersion"
            - "name"
          when:
            - key: "controller"
              eq: true
          type: ["kind", "api_group", "name"]
          default: ["<none>"]
      formatter: "list"
      formatting:
        field_colors:
          - type: "kind"
          - type: "api_group"
          - type: "generic"
        field_separators:
          - type: "kind_api_group"
          - type: "kind"
    issuer:
      header: "Issuer:"
      paths:
        - path: [["spec#issuerRef#kind"], ["spec#issuerRef#name"]]
          pathtype: "tuple"
          type: ["kind", "name"]
      formatter: "list"
      formatting:
        field_colors:
          - type: "kind"
          - type: "generic"
        field_separators:
          - type: "kind"
    secret_name:
      header: "Secret Name:"
      path: "spec#secretName"
      default: "<unset>"
      type: "str"
    status_message:
      header: "Status:"
      paths:
        - path: "status#conditions"
          pathtype: "items"
          subpath: "message"
          when:
            - key: "type"
              eq: "Ready"
          default: ""
  actions:
    actionlist:
      "Renew Certificate":
        description: "Renew Certificate"
        category: "Resource Level"
        metadata: [["(Requires ", ["windowwidget", "description"]],
                   ["cmctl", ["windowwidget", "highlight"]],
                   [")", ["windowwidget", "description"]]]
        confirm: true
        action: "execute"
        action_args:
          command: ["cmctl", "renew", "--namespace", <<<items.0>>>",
                    "<<<item.1>>>"]
          iterate: true
infoview:
  name: "Certificate Info"
  infopad:
    row_indexes:
      Normal:
        fields: ["controller", "common_name", "dns_names", "ip_addresses",
                 "issuer", "secret_name", "usages", "duration", "renew_before",
                 "renew_before_percentage", "valid_from", "valid_until",
                 "renewal_time",
                 "private_key_header", "private_key_algorithm",
                 "private_key_size", "private_key_encoding",
                 "private_key_rotation_policy",
                 "condition_ready", "status_message"]
    rows:
      common_name:
        header: [["Common Name:", ["main", "infoheader"]]]
        path: "spec#commonName"
        default: "<none>"
        type: "str"
      condition_ready:
        header: [["Ready:", ["main", "infoheader"]]]
        paths:
          - path: "status#conditions"
            pathtype: "items"
            subpath: "status"
            when:
              - key: "type"
                eq: "Ready"
            default: ["<unknown>"]
        formatter: "value_mapper"
        formatting:
          mapping:
            mappings:
              "True":
                field_colors:
                  - context: "main"
                    type: "status_ok"
              "False":
                field_colors:
                  - context: "main"
                    type: "status_not_ok"
              "<unknown>":
                field_colors:
                  - context: "main"
                    type: "status_unknown"
      controller:
        header: [["C", ["main", "infoheader_shortcut"]],
                 ["ontroller:", ["main", "infoheader"]]]
        paths:
          - path: "metadata#ownerReferences"
            pathtype: "items"
            subpaths:
              - "kind"
              - "apiVersion"
              - "name"
            when:
              - key: "controller"
                eq: true
            type: ["kind", "api_group", "name"]
            default: ["<none>"]
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "api_group"
            - type: "generic"
          field_separators:
            - type: "kind_api_group"
            - type: "kind"
      dns_names:
        header: [["DNS Names:", ["main", "infoheader"]]]
        paths:
          - path: ["spec#dnsNames"]
            pathtype: "list"
            default: ["<none>"]
        formatter: "list"
      duration:
        header: [["Duration:", ["main", "infoheader"]]]
        path: "spec#duration"
        default: "<unset>"
        type: "str"
        formatter: "numerical"
      ip_addresses:
        header: [["IP-", ["main", "infoheader"]],
                 ["A", ["main", "infoheader_shortcut"]],
                 ["ddresses:", ["main", "infoheader"]]]
        path: "spec#ipAddresses"
        default: ["<none>"]
        type: "raw"
        formatter: "address"
      issuer:
        header: [["I", ["main", "infoheader_shortcut"]],
                 ["ssuer:", ["main", "infoheader"]]]
        paths:
          - path: [["spec#issuerRef#kind"], ["spec#issuerRef#name"]]
            pathtype: "tuple"
        formatter: "list"
        formatting:
          field_colors:
            - type: "kind"
            - type: "generic"
          item_separator:
            type: "kind"
      private_key_algorithm:
        header: [["  Algorithm:", ["main", "infoheader"]]]
        path: "spec#privateKey#algorithm"
        default: "<unset>"
        type: "str"
      private_key_encoding:
        header: [["  Encoding:", ["main", "infoheader"]]]
        path: "spec#privateKey#encoding"
        default: "<unset>"
        type: "str"
      private_key_header:
        header: [["Private Key:", ["main", "infoheader"]]]
      private_key_rotation_policy:
        header: [["  Rotation Policy:", ["main", "infoheader"]]]
        path: "spec#privateKey#rotationPolicy"
        default: "<unset>"
        type: "str"
      private_key_size:
        header: [["  Size:", ["main", "infoheader"]]]
        path: "spec#privateKey#size"
        default: "<unset>"
        type: "int"
        formatter: "numerical"
      renewal_time:
        header: [["Renewal Time:", ["main", "infoheader"]]]
        path: "status#renewalTime"
        default: "<unset>"
        type: "timestamp"
        formatter: "timestamp"
      renew_before:
        header: [["Renew Before:", ["main", "infoheader"]]]
        path: "spec#renewBefore"
        default: "<unset>"
        type: "str"
        formatter: "numerical"
      renew_before_percentage:
        header: [["Renew Before (Percentage):", ["main", "infoheader"]]]
        path: "spec#renewBeforePercentage"
        default: "<unset>"
        type: "str"
        formatter: "numerical"
      secret_name:
        header: [["S", ["main", "infoheader_shortcut"]],
                 ["ecret Name:", ["main", "infoheader"]]]
        path: "spec#secretName"
        default: "<unset>"
        type: "str"
      status_message:
        header: [["Status:", ["main", "infoheader"]]]
        paths:
          - path: "status#conditions"
            pathtype: "items"
            subpath: "message"
            when:
              - key: "type"
                eq: "Ready"
            default: ["<unset>"]
      usages:
        header: [["Usages:", ["main", "infoheader"]]]
        path: "spec#usages"
        default: ["<unset>"]
        type: "raw"
        formatter: "list"
      valid_from:
        header: [["Valid From:", ["main", "infoheader"]]]
        path: "status#notBefore"
        default: "<unset>"
        type: "timestamp"
        formatter: "timestamp"
      valid_until:
        header: [["Valid Until:", ["main", "infoheader"]]]
        path: "status#notAfter"
        default: "<unset>"
        type: "timestamp"
        formatter: "timestamp"
  shortcuts:
    "Addresses":
      key: "a"
      modifier: "shift"
      read_only: true
      helptext: "List IP-Addresses"
      widget: "windowwidget"
      title: "IP-Addresses:"
      itemgetter: "get_list_as_list"
      itemgetter_args:
        path: "spec#ipAddresses"
      # Not supported for now
      sortcolumn: "name"
    "Open controller":
      key: "c"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for controller"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        namespace_path: "metadata#namespace"
        owner_reference_path: "metadata#ownerReferences"
    "Issuer":
      key: "i"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for Issuer"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind_path: "spec#issuerRef#kind"
        api_family: "cert-manager.io"
        name_path: "spec#issuerRef#name"
        namespace_path: "metadata#namespace"
    "Secret":
      key: "s"
      modifier: "shift"
      read_only: true
      helptext: "Open info page for Secret"
      action: "call"
      action_call: "resourceinfodispatch_with_lookup"
      action_args:
        _pass_obj: true
        kind: "Secret"
        name_path: "spec#secretName"
        namespace_path: "metadata#namespace"
