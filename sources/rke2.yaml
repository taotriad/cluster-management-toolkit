---
rke2:
  description: "RKE2"
  installed_version:
    function: "get_executable_version"
    executable: ["/opt/rke2/bin/rke2", "/usr/local/bin/rke2"]
    args: ["--version"]
    # yamllint disable-line rule:line-length
    version_regex: '^rke2 version v(\d+)(\.)(\d+)(\.)(\d+)(-rc\d+|)(\+)([a-z0-9]+).*'
  candidate_version:
    function: "get_github_version"
    args:
      url: "https://api.github.com/repos/rancher/rke2/releases?per_page=100"
      version_regex: 'v(\d+)(\.)(\d+)(\.)(\d+)(\+)([a-z0-9]+)$'
  changelog:
    from_body: true
    reformatter: "reformat_github_release_notes"
    dest: "rke2_changelog.md"
