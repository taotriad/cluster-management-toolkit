---
crc:
  description: "CRC"
  installed_version:
    function: "get_executable_version"
    executable: "crc"
    args: ["version"]
    version_regex: '^CRC version: (\d+)(\.)(\d+)(\.)(.+)$'
  candidate_version:
    function: "get_github_version"
    args:
      url: "https://api.github.com/repos/crc-org/crc/releases?per_page=100"
      version_regex: 'v(\d+)(\.)(\d+)(\.)(\d+)$'
  changelog:
    from_body: true
    reformatter: "reformat_github_release_notes"
    dest: "crc_changelog.md"
