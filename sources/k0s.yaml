---
k0s:
  description: "k0s"
  installed_version:
    function: "get_executable_version"
    executable: "/usr/bin/k0s"
    args: ["version"]
    version_regex: '^v(\d+)(\.)(\d+)(\.)(\d+)\+([a-z0-9.]+)$'
  candidate_version:
    function: "get_github_version"
    args:
      url: "https://api.github.com/repos/k0sproject/k0s/releases?per_page=100"
      version_regex: 'v(\d+)(\.)(\d+)(\.)(\d+)\+([a-z0-9.]+)$'
  changelog:
    from_body: true
    reformatter: "reformat_github_release_notes"
    dest: "k0s_changelog.md"
