---
kind:
  description: "kind"
  installed_version:
    function: "get_executable_version"
    executable: "/usr/bin/kind"
    args: ["version"]
    version_regex: '^kind v(\d+)(\.)(\d+)(\.)(\d+)'
  candidate_version:
    function: "get_github_version"
    args:
      # yamllint disable-line rule:line-length
      url: "https://api.github.com/repos/kubernetes-sigs/kind/releases?per_page=100"
      version_regex: 'v(\d+)(\.)(\d+)(\.)(\d+)'
  changelog:
    from_body: true
    dest: "kind_changelog.md"
