---
harvester:
  description: "Harvester"
  candidate_version:
    function: "get_github_version"
    args:
      # yamllint disable rule:line-length
      url: "https://api.github.com/repos/rancher/harvester/releases?per_page=100"
      version_regex: 'v(\d+)(\.)(\d+)(\.)(\d+)$'
  changelog:
    from_body: true
    reformatter: "reformat_github_release_notes"
    dest: "harvester_changelog.md"
